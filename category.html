<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunities | IMMONOVA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
  color:#7f6430;
}

.background{
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

.background::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.3;
}

.background::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 30% 20%,rgba(120,90,45,.08),transparent 16%),
    radial-gradient(circle at 66% 70%,rgba(120,90,45,.06),transparent 18%),
    repeating-radial-gradient(circle at center,rgba(120,90,45,.035) 0 1px,transparent 1px 4px);
  opacity:.06;
  mix-blend-mode:multiply;
}

.page{
  position:relative;
  z-index:2;
  max-width:1400px;
  margin:0 auto;
  padding:46px 28px 90px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:90px;
}

.logo{
  color:#a58139;
  text-decoration:none;
  font-size:22px;
  font-weight:300;
  letter-spacing:.35em;
}

.nav{
  display:flex;
  gap:14px;
  align-items:center;
}

.nav a,
.lang-toggle{
  padding:11px 24px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  backdrop-filter:blur(8px);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:10px;
  font-weight:500;
  letter-spacing:.18em;
  cursor:pointer;
  font-family:inherit;
}

.nav a:hover,
.lang-toggle:hover{
  background:#a58139;
  color:#fff;
}

.lang-wrap{
  position:relative;
}

.lang-menu{
  position:absolute;
  right:0;
  top:calc(100% + 10px);
  min-width:190px;
  border:1px solid rgba(165,129,57,.28);
  background:rgba(244,236,223,.96);
  backdrop-filter:blur(14px);
  box-shadow:0 24px 70px rgba(127,100,48,.10);
  display:none;
  z-index:30;
}

.lang-menu.open{
  display:block;
}

.lang-menu button{
  width:100%;
  padding:13px 16px;
  border:0;
  border-bottom:1px solid rgba(165,129,57,.12);
  background:transparent;
  color:#8f7643;
  text-align:left;
  font-family:inherit;
  font-size:11px;
  letter-spacing:.13em;
  text-transform:uppercase;
  cursor:pointer;
}

.lang-menu button:hover,
.lang-menu button.active{
  background:rgba(165,129,57,.12);
  color:#a58139;
}

.hero{
  text-align:center;
  margin-bottom:70px;
}

.kicker{
  color:#a58139;
  font-size:11px;
  letter-spacing:.28em;
  text-transform:uppercase;
  margin-bottom:18px;
}

h1{
  color:#a58139;
  font-size:clamp(40px,5vw,72px);
  font-weight:200;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:22px;
}

.hero p{
  max-width:780px;
  margin:0 auto;
  color:#8f7643;
  font-size:17px;
  line-height:1.8;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:28px;
}

.card{
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.10);
  min-height:260px;
  display:flex;
  overflow:hidden;
}

.card-content{
  flex:1;
  padding:34px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card-image{
  width:34%;
  min-width:210px;
  border-left:1px solid rgba(165,129,57,.14);
  position:relative;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.35),transparent 60%),
    rgba(165,129,57,.10);
  overflow:hidden;
}

.card-image img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.placeholder{
  width:100%;
  height:100%;
  min-height:260px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#a58139;
  font-size:13px;
  letter-spacing:.22em;
  text-transform:uppercase;
  line-height:1.8;
  padding:20px;
}

.card h2{
  color:#a58139;
  font-size:26px;
  font-weight:300;
  letter-spacing:.05em;
  margin-bottom:14px;
}

.meta{
  color:#a58139;
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-bottom:18px;
}

.desc{
  color:#80683a;
  font-size:15px;
  line-height:1.8;
  margin-bottom:28px;
}

.price{
  color:#a58139;
  font-size:14px;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:24px;
}

.card a{
  align-self:flex-start;
  padding:12px 24px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:10px;
  letter-spacing:.2em;
}

.card a:hover{
  background:#a58139;
  color:#fff;
}

.empty{
  grid-column:1 / -1;
  text-align:center;
  padding:90px 20px;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.10);
  color:#8f7643;
  line-height:1.8;
}

@media(max-width:1100px){
  .grid{
    grid-template-columns:1fr;
  }
}

@media(max-width:700px){
  .header{
    flex-direction:column;
    gap:22px;
    margin-bottom:60px;
  }

  .nav{
    flex-direction:column;
    width:100%;
  }

  .nav a,
  .lang-wrap,
  .lang-toggle{
    width:100%;
    text-align:center;
  }

  .lang-menu{
    position:relative;
    top:8px;
    width:100%;
  }

  .card{
    flex-direction:column;
  }

  .card-image{
    width:100%;
    min-width:0;
    height:230px;
    border-left:none;
    border-top:1px solid rgba(165,129,57,.14);
    order:2;
  }

  .card-content{
    order:1;
  }
}
</style>
</head>

<body>

<div class="background"></div>

<div class="page">

  <header class="header">
    <a href="index.html" class="logo">IMMONOVA</a>

    <nav class="nav">
      <a href="opportunities.html" data-i18n="nav_categories">Categories</a>
      <a href="index.html" data-i18n="nav_home">Home</a>
      <div class="lang-wrap">
        <button type="button" class="lang-toggle" id="langToggle">EN</button>
        <div class="lang-menu" id="langMenu">
          <button type="button" data-lang="it">Italiano</button>
          <button type="button" data-lang="en">English</button>
          <button type="button" data-lang="fr">Français</button>
          <button type="button" data-lang="de">Deutsch</button>
          <button type="button" data-lang="es">Español</button>
          <button type="button" data-lang="ar">العربية</button>
        </div>
      </div>
    </nav>
  </header>

  <section class="hero">
    <div class="kicker" data-i18n="kicker">Investment Segment</div>
    <h1 id="categoryTitle">Opportunities</h1>
    <p data-i18n="hero_text">
      Selected investment opportunities reserved for private investors,
      family offices and strategic partners.
    </p>
  </section>

  <section id="results" class="grid"></section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const params = new URLSearchParams(window.location.search);
const category = params.get("category");
const langParam = params.get("lang");

const I18N_STORAGE_KEY = "immonova_public_language";
const SUPPORTED_LANGS = ["it","en","fr","de","es","ar"];

let currentLang = normalizeLang(langParam || localStorage.getItem(I18N_STORAGE_KEY) || "en");
let loadedItems = [];
let translatedItemsCache = {};

const STATIC_I18N = {
  it:{
    nav_categories:"Categorie",
    nav_home:"Home",
    kicker:"Segmento d'investimento",
    hero_text:"Opportunità di investimento selezionate e riservate a investitori privati, family office e partner strategici.",
    default_title:"Opportunità",
    missing_category:"Categoria non selezionata.",
    load_error:"Errore nel caricamento delle opportunità.",
    no_results:"Nessuna opportunità pubblicata in questa categoria.\nNuove opportunità riservate saranno disponibili prossimamente.",
    reserved_value:"Valore riservato",
    request_access:"Richiedi accesso",
    view_opportunity:"Vedi opportunità",
    placeholder:"IMMONOVA\nOFF MARKET\nCONSULTING"
  },
  en:{
    nav_categories:"Categories",
    nav_home:"Home",
    kicker:"Investment Segment",
    hero_text:"Selected investment opportunities reserved for private investors, family offices and strategic partners.",
    default_title:"Opportunities",
    missing_category:"Category not selected.",
    load_error:"Error loading opportunities.",
    no_results:"No published opportunities in this category.\nNew reserved opportunities will be available soon.",
    reserved_value:"Reserved value",
    request_access:"Request Access",
    view_opportunity:"View Opportunity",
    placeholder:"IMMONOVA\nOFF MARKET\nCONSULTING"
  },
  fr:{
    nav_categories:"Catégories",
    nav_home:"Accueil",
    kicker:"Segment d'investissement",
    hero_text:"Opportunités d'investissement sélectionnées et réservées aux investisseurs privés, family offices et partenaires stratégiques.",
    default_title:"Opportunités",
    missing_category:"Catégorie non sélectionnée.",
    load_error:"Erreur lors du chargement des opportunités.",
    no_results:"Aucune opportunité publiée dans cette catégorie.\nDe nouvelles opportunités réservées seront bientôt disponibles.",
    reserved_value:"Valeur réservée",
    request_access:"Demander l'accès",
    view_opportunity:"Voir l'opportunité",
    placeholder:"IMMONOVA\nOFF MARKET\nCONSULTING"
  },
  de:{
    nav_categories:"Kategorien",
    nav_home:"Home",
    kicker:"Investmentsegment",
    hero_text:"Ausgewählte Investmentmöglichkeiten für private Investoren, Family Offices und strategische Partner.",
    default_title:"Opportunities",
    missing_category:"Keine Kategorie ausgewählt.",
    load_error:"Fehler beim Laden der Opportunities.",
    no_results:"In dieser Kategorie sind keine veröffentlichten Opportunities vorhanden.\nNeue reservierte Opportunities werden in Kürze verfügbar sein.",
    reserved_value:"Wert auf Anfrage",
    request_access:"Zugang anfordern",
    view_opportunity:"Opportunity ansehen",
    placeholder:"IMMONOVA\nOFF MARKET\nCONSULTING"
  },
  es:{
    nav_categories:"Categorías",
    nav_home:"Inicio",
    kicker:"Segmento de inversión",
    hero_text:"Oportunidades de inversión seleccionadas y reservadas para inversores privados, family offices y socios estratégicos.",
    default_title:"Oportunidades",
    missing_category:"Categoría no seleccionada.",
    load_error:"Error al cargar las oportunidades.",
    no_results:"No hay oportunidades publicadas en esta categoría.\nPróximamente estarán disponibles nuevas oportunidades reservadas.",
    reserved_value:"Valor reservado",
    request_access:"Solicitar acceso",
    view_opportunity:"Ver oportunidad",
    placeholder:"IMMONOVA\nOFF MARKET\nCONSULTING"
  },
  ar:{
    nav_categories:"الفئات",
    nav_home:"الرئيسية",
    kicker:"قطاع الاستثمار",
    hero_text:"فرص استثمارية مختارة ومخصصة للمستثمرين الخاصين والمكاتب العائلية والشركاء الاستراتيجيين.",
    default_title:"الفرص",
    missing_category:"لم يتم اختيار الفئة.",
    load_error:"حدث خطأ أثناء تحميل الفرص.",
    no_results:"لا توجد فرص منشورة في هذه الفئة.\nستتوفر فرص خاصة جديدة قريباً.",
    reserved_value:"القيمة سرية",
    request_access:"طلب الوصول",
    view_opportunity:"عرض الفرصة",
    placeholder:"IMMONOVA\nOFF MARKET\nCONSULTING"
  }
};

function normalizeLang(value){
  const lang = String(value || "en").trim().toLowerCase();
  return SUPPORTED_LANGS.includes(lang) ? lang : "en";
}

function t(key){
  return (STATIC_I18N[currentLang] && STATIC_I18N[currentLang][key]) || STATIC_I18N.en[key] || key;
}

function escapeHTML(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function encodeLangUrl(url){
  const separator = url.includes("?") ? "&" : "?";
  return url + separator + "lang=" + encodeURIComponent(currentLang);
}

function getCategoryDisplayName(){
  if(!category) return t("default_title");
  const fixed = {
    "Ville":{it:"Ville",en:"Villas",fr:"Villas",de:"Villen",es:"Villas",ar:"فلل"},
    "Hotel":{it:"Hotel",en:"Hotels",fr:"Hôtels",de:"Hotels",es:"Hoteles",ar:"فنادق"},
    "Resort":{it:"Resort",en:"Resorts",fr:"Resorts",de:"Resorts",es:"Resorts",ar:"منتجعات"},
    "Villaggi":{it:"Villaggi",en:"Villages",fr:"Villages",de:"Touristische Anlagen",es:"Complejos turísticos",ar:"قرى سياحية"},
    "Nuove Edificazioni":{it:"Nuove Edificazioni",en:"New Developments",fr:"Nouveaux développements",de:"Neubauprojekte",es:"Nuevos desarrollos",ar:"مشاريع جديدة"},
    "Off Market":{it:"Off Market",en:"Off Market",fr:"Off Market",de:"Off Market",es:"Off Market",ar:"خارج السوق"}
  };
  return fixed[category] && fixed[category][currentLang] ? fixed[category][currentLang] : category;
}

function applyStaticI18n(){
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    el.textContent = t(key);
  });

  document.getElementById("categoryTitle").textContent = getCategoryDisplayName();
  document.getElementById("langToggle").textContent = currentLang.toUpperCase();

  document.querySelectorAll("#langMenu button").forEach(btn => {
    btn.classList.toggle("active", btn.getAttribute("data-lang") === currentLang);
  });
}

function renderCover(item){
  if(item.cover_image){
    return `
      <div class="card-image">
        <img src="${escapeHTML(item.cover_image)}" alt="${escapeHTML(item.title || "IMMONOVA Opportunity")}">
      </div>
    `;
  }

  return `
    <div class="card-image">
      <div class="placeholder">
        ${escapeHTML(t("placeholder")).replaceAll("\n","<br>")}
      </div>
    </div>
  `;
}

async function translateText(text, targetLang){
  const original = String(text || "").trim();
  if(!original || targetLang === "it") return original;

  const cacheKey = targetLang + "::" + original;
  const localCached = sessionStorage.getItem("imn_translate_" + cacheKey);
  if(localCached) return localCached;

  try{
    const result = await client.functions.invoke("translate-public-content", {
      body:{
        text:original,
        target_language:targetLang,
        source_language:"it",
        context:"IMMONOVA luxury real estate investment website"
      }
    });

    if(result.error) throw result.error;

    const translated = result.data && (result.data.translated_text || result.data.translation || result.data.text);
    if(translated){
      sessionStorage.setItem("imn_translate_" + cacheKey, translated);
      return translated;
    }
  }catch(error){
    console.warn("Traduzione dinamica non disponibile:", error.message || error);
  }

  return original;
}

async function translateItem(item){
  if(currentLang === "it") return item;

  const key = currentLang + "::" + item.id;
  if(translatedItemsCache[key]) return translatedItemsCache[key];

  const translated = {...item};
  translated.title = await translateText(item.title || "", currentLang);
  translated.short_description = await translateText(item.short_description || "", currentLang);
  translated.location = await translateText(item.location || "", currentLang);
  translated.price = item.price || "";

  translatedItemsCache[key] = translated;
  return translated;
}

async function renderResults(){
  const results = document.getElementById("results");

  if(!category){
    results.innerHTML = `
      <div class="empty">
        ${escapeHTML(t("missing_category"))}
      </div>
    `;
    return;
  }

  if(!loadedItems || loadedItems.length === 0){
    results.innerHTML = `
      <div class="empty">
        ${escapeHTML(t("no_results")).replaceAll("\n","<br>")}
      </div>
    `;
    return;
  }

  results.innerHTML = `
    <div class="empty">
      ${currentLang === "it" ? "Caricamento opportunità..." : "Loading opportunities..."}
    </div>
  `;

  const translatedItems = [];
  for(let i = 0; i < loadedItems.length; i++){
    translatedItems.push(await translateItem(loadedItems[i]));
  }

  results.innerHTML = translatedItems.map(item => {
    const isOffMarket = String(item.category || "").toLowerCase() === "off market";
    const url = encodeLangUrl("opportunity.html?id=" + encodeURIComponent(item.id));

    return `
      <article class="card">
        <div class="card-content">
          <div>
            <div class="meta">${escapeHTML(item.location || "")}</div>
            <h2>${escapeHTML(item.title || "")}</h2>
            <p class="desc">${escapeHTML(item.short_description || "")}</p>
          </div>

          <div>
            <div class="price">${escapeHTML(item.price || t("reserved_value"))}</div>

            <a href="${url}">
              ${escapeHTML(isOffMarket ? t("request_access") : t("view_opportunity"))}
            </a>
          </div>
        </div>

        ${renderCover(item)}
      </article>
    `;
  }).join("");
}

async function loadCategory(){
  const results = document.getElementById("results");

  if(!category){
    loadedItems = [];
    await renderResults();
    return;
  }

  results.innerHTML = `
    <div class="empty">
      ${currentLang === "it" ? "Caricamento opportunità..." : "Loading opportunities..."}
    </div>
  `;

  const { data, error } = await client
    .from("opportunities")
    .select("*")
    .eq("published", true)
    .eq("category", category)
    .order("created_at", { ascending:false });

  if(error){
    results.innerHTML = `
      <div class="empty">
        ${escapeHTML(t("load_error"))}
      </div>
    `;
    return;
  }

  loadedItems = data || [];
  await renderResults();
}

function changeLanguage(lang){
  currentLang = normalizeLang(lang);
  localStorage.setItem(I18N_STORAGE_KEY, currentLang);

  const url = new URL(window.location.href);
  url.searchParams.set("lang", currentLang);
  window.history.replaceState({}, "", url.toString());

  applyStaticI18n();
  renderResults();
}

document.getElementById("langToggle").addEventListener("click", function(){
  document.getElementById("langMenu").classList.toggle("open");
});

document.querySelectorAll("#langMenu button").forEach(btn => {
  btn.addEventListener("click", function(){
    document.getElementById("langMenu").classList.remove("open");
    changeLanguage(this.getAttribute("data-lang"));
  });
});

document.addEventListener("click", function(event){
  const wrap = document.querySelector(".lang-wrap");
  if(wrap && !wrap.contains(event.target)){
    document.getElementById("langMenu").classList.remove("open");
  }
});

applyStaticI18n();
loadCategory();
</script>

</body>
</html>
