<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunities | IMMONOVA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
  color:#7f6430;
}

.background{
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

.background::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.3;
}

.background::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 30% 20%,rgba(120,90,45,.08),transparent 16%),
    radial-gradient(circle at 66% 70%,rgba(120,90,45,.06),transparent 18%),
    repeating-radial-gradient(circle at center,rgba(120,90,45,.035) 0 1px,transparent 1px 4px);
  opacity:.06;
  mix-blend-mode:multiply;
}

.page{
  position:relative;
  z-index:2;
  max-width:1400px;
  margin:0 auto;
  padding:46px 28px 90px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:90px;
}

.logo{
  color:#a58139;
  text-decoration:none;
  font-size:22px;
  font-weight:300;
  letter-spacing:.35em;
}

.nav{
  display:flex;
  gap:14px;
}

.nav a{
  padding:11px 24px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  backdrop-filter:blur(8px);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:10px;
  font-weight:500;
  letter-spacing:.18em;
}

.hero{
  text-align:center;
  margin-bottom:70px;
}

.kicker{
  color:#a58139;
  font-size:11px;
  letter-spacing:.28em;
  text-transform:uppercase;
  margin-bottom:18px;
}

h1{
  color:#a58139;
  font-size:clamp(40px,5vw,72px);
  font-weight:200;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:22px;
}

.hero p{
  max-width:780px;
  margin:0 auto;
  color:#8f7643;
  font-size:17px;
  line-height:1.8;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:28px;
}

.card{
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.10);
  min-height:260px;
  display:flex;
  overflow:hidden;
}

.card-content{
  flex:1;
  padding:34px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card-image{
  width:34%;
  min-width:210px;
  border-left:1px solid rgba(165,129,57,.14);
  position:relative;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.35),transparent 60%),
    rgba(165,129,57,.10);
  overflow:hidden;
}

.card-image img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.placeholder{
  width:100%;
  height:100%;
  min-height:260px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#a58139;
  font-size:13px;
  letter-spacing:.22em;
  text-transform:uppercase;
  line-height:1.8;
  padding:20px;
}

.card h2{
  color:#a58139;
  font-size:26px;
  font-weight:300;
  letter-spacing:.05em;
  margin-bottom:14px;
}

.meta{
  color:#a58139;
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-bottom:18px;
}

.desc{
  color:#80683a;
  font-size:15px;
  line-height:1.8;
  margin-bottom:28px;
}

.price{
  color:#a58139;
  font-size:14px;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:24px;
}

.card a{
  align-self:flex-start;
  padding:12px 24px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:10px;
  letter-spacing:.2em;
}

.empty{
  grid-column:1 / -1;
  text-align:center;
  padding:90px 20px;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.10);
  color:#8f7643;
  line-height:1.8;
}

@media(max-width:1100px){
  .grid{
    grid-template-columns:1fr;
  }
}

@media(max-width:700px){
  .header{
    flex-direction:column;
    gap:22px;
    margin-bottom:60px;
  }

  .nav{
    flex-direction:column;
    width:100%;
  }

  .nav a{
    text-align:center;
  }

  .card{
    flex-direction:column;
  }

  .card-image{
    width:100%;
    min-width:0;
    height:230px;
    border-left:none;
    border-top:1px solid rgba(165,129,57,.14);
    order:2;
  }

  .card-content{
    order:1;
  }
}
</style>
</head>

<body>

<div class="background"></div>

<div class="page">

  <header class="header">
    <a href="index.html" class="logo">IMMONOVA</a>

    <nav class="nav">
      <a href="opportunities.html">Categories</a>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <section class="hero">
    <div class="kicker">Investment Segment</div>
    <h1 id="categoryTitle">Opportunities</h1>
    <p>
      Selected investment opportunities reserved for private investors,
      family offices and strategic partners.
    </p>
  </section>

  <section id="results" class="grid"></section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const params = new URLSearchParams(window.location.search);
const category = params.get("category");

document.getElementById("categoryTitle").textContent =
  category || "Opportunities";

function escapeHTML(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function renderCover(item){
  if(item.cover_image){
    return `
      <div class="card-image">
        <img src="${escapeHTML(item.cover_image)}" alt="${escapeHTML(item.title || "IMMONOVA Opportunity")}">
      </div>
    `;
  }

  return `
    <div class="card-image">
      <div class="placeholder">
        IMMONOVA<br>
        OFF MARKET<br>
        CONSULTING
      </div>
    </div>
  `;
}

async function loadCategory(){
  const results = document.getElementById("results");

  if(!category){
    results.innerHTML = `
      <div class="empty">
        Categoria non selezionata.
      </div>
    `;
    return;
  }

  const { data, error } = await client
    .from("opportunities")
    .select("*")
    .eq("published", true)
    .eq("category", category)
    .order("created_at", { ascending:false });

  if(error){
    results.innerHTML = `
      <div class="empty">
        Errore nel caricamento delle opportunità.
      </div>
    `;
    return;
  }

  if(!data || data.length === 0){
    results.innerHTML = `
      <div class="empty">
        Nessuna opportunità pubblicata in questa categoria.<br>
        Nuove opportunità riservate saranno disponibili prossimamente.
      </div>
    `;
    return;
  }

  results.innerHTML = data.map(item => `
    <article class="card">
      <div class="card-content">
        <div>
          <div class="meta">${escapeHTML(item.location || "")}</div>
          <h2>${escapeHTML(item.title || "")}</h2>
          <p class="desc">${escapeHTML(item.short_description || "")}</p>
        </div>

        <div>
          <div class="price">${escapeHTML(item.price || "Valore riservato")}</div>

          <a href="opportunity.html?id=${encodeURIComponent(item.id)}">
            ${item.category === "Off Market" ? "Request Access" : "View Opportunity"}
          </a>
        </div>
      </div>

      ${renderCover(item)}
    </article>
  `).join("");
}

loadCategory();
</script>

</body>
</html>
