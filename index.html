<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IMMONOVA | Off Market Consulting</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
}

body {
  overflow: hidden;
  background: #f4ecdf;
  font-family: "Montserrat", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
}

/* SFONDO */
.background {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(circle at center, rgba(255,255,255,.72) 0%, rgba(255,255,255,.34) 38%, rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

.background::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(60deg, transparent 0 86px, rgba(188,149,78,.23) 87px, transparent 90px),
    repeating-linear-gradient(-60deg, transparent 0 86px, rgba(188,149,78,.22) 87px, transparent 90px),
    repeating-linear-gradient(0deg, transparent 0 148px, rgba(188,149,78,.13) 149px, transparent 152px);
  background-size: 230px 199px;
  opacity: .62;
}

.background::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 30% 20%, rgba(120,90,45,.08), transparent 16%),
    radial-gradient(circle at 66% 70%, rgba(120,90,45,.06), transparent 18%),
    repeating-radial-gradient(circle at center, rgba(120,90,45,.035) 0 1px, transparent 1px 4px);
  opacity: .38;
  mix-blend-mode: multiply;
}

/* PAGINA */
.landing {
  position: relative;
  z-index: 2;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.brand {
  position: relative;
  text-align: center;
  transform: translateY(-2vh);
}

/* LOGO */
.immonova {
  position: relative;
  display: inline-block;
  overflow: hidden;

  color: transparent;
  font-size: clamp(54px, 7vw, 126px);
  font-weight: 200;
  letter-spacing: 0.085em;
  line-height: 0.92;
  text-transform: uppercase;

  background: linear-gradient(
    90deg,
    #8f6f2c 0%,
    #c79c43 42%,
    #f1d27a 58%,
    #a77d31 100%
  );
  -webkit-background-clip: text;
  background-clip: text;

  opacity: 0;
  filter: blur(12px);
  clip-path: inset(0 50% 0 50%);

  animation:
    composeFromCenter 2.2s cubic-bezier(.19,1,.22,1) forwards,
    letterGlow 1.8s ease forwards 3.8s;
}

.logo-line {
  width: 0;
  height: 1px;
  margin: 14px auto 0;
  background: linear-gradient(
    to right,
    transparent,
    rgba(197,157,72,.88),
    transparent
  );
  opacity: 0;
  animation: lineReveal 1.1s ease forwards 2.25s;
}

.payoff {
  position: relative;
  display: block;
  margin-top: 13px;

  overflow: hidden;
  color: #a58139;
  font-size: clamp(10px, 1.35vw, 20px);
  font-weight: 700;
  letter-spacing: 0.025em;
  text-transform: uppercase;

  opacity: 0;
  filter: blur(10px);
  clip-path: inset(0 50% 0 50%);
  animation: composeFromCenter 1.6s cubic-bezier(.19,1,.22,1) forwards;
  animation-delay: 0.55s;
}

/* DISCOVER */
.discover {
  position: fixed;
  top: 38px;
  left: 50%;
  z-index: 5;
  transform: translateX(-50%) translateY(-14px);

  padding: 11px 34px;
  border: 1px solid rgba(165,129,57,.42);
  background: rgba(255,252,244,.22);
  backdrop-filter: blur(8px);

  color: #a58139;
  text-decoration: none;
  text-transform: uppercase;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.24em;

  opacity: 0;
  pointer-events: none;

  animation: discoverAppear 1s ease forwards;
  animation-delay: 9s;
}

@keyframes composeFromCenter {
  0% {
    opacity: 0;
    filter: blur(12px);
    clip-path: inset(0 50% 0 50%);
    transform: scale(.96);
  }

  70% {
    opacity: 1;
    filter: blur(2px);
  }

  100% {
    opacity: 1;
    filter: blur(0);
    clip-path: inset(0 0 0 0);
    transform: scale(1);
  }
}

@keyframes lineReveal {
  to {
    width: 76%;
    opacity: .72;
  }
}

@keyframes letterGlow {
  to {
    text-shadow:
      0 0 4px rgba(255,230,170,.22),
      0 0 10px rgba(255,220,145,.14),
      0 0 20px rgba(255,205,115,.08);
  }
}

@keyframes discoverAppear {
  to {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
}

@media (max-width: 700px) {
  .immonova {
    font-size: 48px;
    letter-spacing: 0.05em;
  }

  .payoff {
    font-size: 11px;
  }

  .discover {
    top: 26px;
    padding: 9px 24px;
    font-size: 10px;
  }
}
</style>
</head>

<body>

<div class="background"></div>

<a href="#" class="discover">Discover</a>

<main class="landing">
  <section class="brand" aria-label="IMMONOVA Off Market Consulting">
    <h1 class="immonova">IMMONOVΛ</h1>
    <div class="logo-line"></div>
    <span class="payoff">OFF MARKET • CONSULTING</span>
  </section>
</main>

</body>
</html>
