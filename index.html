<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMMONOVA</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background:
        linear-gradient(rgba(255, 250, 240, 0.18), rgba(255, 250, 240, 0.18)),
        url("immonova_background.png") center center / cover no-repeat;
    }

    .landing {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 54px;
    }

    .logo-area {
      position: relative;
      text-align: center;
      overflow: visible;
    }

    .logo {
      position: relative;
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;

      font-size: clamp(36px, 4.4vw, 66px);
      font-weight: 500;
      letter-spacing: 0.04em;
      line-height: 1;

      color: #b99143;
      text-transform: uppercase;

      opacity: 0;
      transform: translateX(24px);
      clip-path: inset(0 0 0 100%);

      animation: logoReveal 2.4s ease forwards;
    }

    @keyframes logoReveal {
      0% {
        opacity: 0;
        transform: translateX(24px);
        clip-path: inset(0 0 0 100%);
        filter: blur(10px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
        clip-path: inset(0 0 0 0);
        filter: blur(0);
      }
    }

    .subtitle {
      margin-top: 8px;
      font-size: clamp(9px, 1vw, 13px);
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #b99143;
      text-transform: uppercase;

      opacity: 0;
      transform: translateX(18px);
      clip-path: inset(0 0 0 100%);

      animation: subtitleReveal 1.4s ease forwards;
      animation-delay: 2.35s;
    }

    @keyframes subtitleReveal {
      0% {
        opacity: 0;
        transform: translateX(18px);
        clip-path: inset(0 0 0 100%);
        filter: blur(8px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
        clip-path: inset(0 0 0 0);
        filter: blur(0);
      }
    }

    .light {
      position: absolute;
      top: -22px;
      left: -180%;
      width: 160%;
      height: 95px;
      pointer-events: none;

      background: linear-gradient(
        105deg,
        transparent 0%,
        rgba(255, 255, 255, 0.1) 35%,
        rgba(255, 255, 255, 0.95) 48%,
        rgba(255, 223, 142, 1) 54%,
        rgba(255, 255, 255, 0.65) 60%,
        transparent 100%
      );

      filter: blur(2px);
      mix-blend-mode: screen;
      opacity: 0;

      animation: lightPass 1.7s ease forwards;
      animation-delay: 4s;
    }

    @keyframes lightPass {
      0% {
        left: -180%;
        opacity: 0;
      }

      15% {
        opacity: 1;
      }

      85% {
        opacity: 1;
      }

      100% {
        left: 125%;
        opacity: 0;
      }
    }

    .logo-area::after {
      content: "";
      position: absolute;
      inset: -10px -30px;
      opacity: 0;
      pointer-events: none;

      animation: finalGoldGlow 1.2s ease forwards;
      animation-delay: 5.1s;
    }

    @keyframes finalGoldGlow {
      to {
        opacity: 1;
        box-shadow:
          0 0 18px rgba(255, 219, 135, 0.28),
          0 0 48px rgba(255, 209, 104, 0.18);
      }
    }

    .logo-area.gold .logo,
    .logo-area.gold .subtitle {
      color: #d8ad55;
      text-shadow:
        0 0 6px rgba(255, 228, 162, 0.55),
        0 0 18px rgba(214, 170, 78, 0.35);
    }

    .discover {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(-18px);

      padding: 12px 34px;
      border: 1px solid rgba(185, 145, 67, 0.65);
      background: rgba(255, 250, 240, 0.34);
      backdrop-filter: blur(10px);

      color: #b99143;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.28em;

      opacity: 0;
      pointer-events: none;

      animation: discoverShow 1.2s ease forwards;
      animation-delay: 5s;
    }

    @keyframes discoverShow {
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
      }
    }

    .discover:hover {
      background: rgba(185, 145, 67, 0.12);
      box-shadow: 0 0 24px rgba(185, 145, 67, 0.25);
    }

    @media (max-width: 600px) {
      .landing {
        padding-top: 48px;
      }

      .logo {
        font-size: 36px;
      }

      .subtitle {
        font-size: 9px;
      }

      .discover {
        top: 22px;
        padding: 10px 26px;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <a href="#discover" class="discover">Discover</a>

  <main class="landing">
    <div class="logo-area" id="logoArea">
      <h1 class="logo">IMMONOVA</h1>
      <div class="subtitle">OFF MARKET • CONSULTING</div>
      <div class="light"></div>
    </div>
  </main>

  <script>
    setTimeout(() => {
      document.getElementById("logoArea").classList.add("gold");
    }, 5100);
  </script>
</body>
</html>
