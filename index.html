<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMMONOVA</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: "Montserrat", Arial, sans-serif;
  background:
    radial-gradient(circle at center, rgba(255,255,255,.62), rgba(247,241,230,.22)),
    url("immonova_background.png") center center / cover no-repeat;
}

/* CENTRO PAGINA */
.landing {
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-area {
  position: relative;
  text-align: center;
  transform: translateY(-10px);
}

/* CONTENITORE ANIMATO */
.logo-mask {
  position: relative;
  overflow: hidden;
  display: inline-block;
  opacity: 0;
  clip-path: inset(0 0 0 100%);
  filter: blur(7px);
  animation: revealRightToLeft 2.6s cubic-bezier(.22,.8,.22,1) forwards;
}

/* LOGO */
.logo-svg {
  width: min(620px, 82vw);
  height: auto;
  display: block;
}

/* ORO SCRITTA */
.logo-text {
  font-family: "Montserrat", Arial, sans-serif;
  font-weight: 300;
  letter-spacing: 7px;
  fill: #b89549;
}

.a-stroke {
  stroke: #b89549;
  stroke-width: 4.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
}

/* SOTTOLINEATURA */
.underline {
  width: 0;
  height: 1px;
  margin: 8px auto 0;
  background: linear-gradient(to right, transparent, #b89549, transparent);
  opacity: 0;
  animation: underlineIn 1s ease forwards;
  animation-delay: 2.5s;
}

/* SOTTOTITOLO */
.subtitle {
  margin-top: 8px;
  font-size: clamp(10px, .85vw, 13px);
  font-weight: 600;
  letter-spacing: .08em;
  color: #b89549;
  text-transform: uppercase;

  opacity: 0;
  clip-path: inset(0 0 0 100%);
  filter: blur(5px);
  animation: revealRightToLeft 1.4s ease forwards;
  animation-delay: 2.7s;
}

/* DISSOLVENZA DA DESTRA A SINISTRA */
@keyframes revealRightToLeft {
  to {
    opacity: 1;
    clip-path: inset(0 0 0 0);
    filter: blur(0);
  }
}

@keyframes underlineIn {
  to {
    width: 72%;
    opacity: .75;
  }
}

/* FASCIO DI LUCE ELEGANTE */
.logo-mask::after {
  content: "";
  position: absolute;
  top: -15%;
  left: -28%;
  width: 20%;
  height: 130%;
  background: linear-gradient(
    105deg,
    transparent 0%,
    rgba(255,255,255,.10) 35%,
    rgba(255,236,180,.42) 50%,
    rgba(255,255,255,.12) 65%,
    transparent 100%
  );
  filter: blur(8px);
  opacity: 0;
  mix-blend-mode: screen;
  animation: softLight 1.8s ease forwards;
  animation-delay: 4.35s;
}

@keyframes softLight {
  0% {
    left: -28%;
    opacity: 0;
  }

  35%, 65% {
    opacity: .75;
  }

  100% {
    left: 108%;
    opacity: 0;
  }
}

/* ORO FINALE MORBIDO */
.logo-area.gold .logo-text {
  fill: #c5a052;
}

.logo-area.gold .a-stroke {
  stroke: #c5a052;
}

.logo-area.gold .logo-mask,
.logo-area.gold .subtitle {
  text-shadow:
    0 0 4px rgba(255,225,160,.28),
    0 0 12px rgba(190,150,75,.16);
}

/* DISCOVER */
.discover {
  position: fixed;
  top: 32px;
  right: 38px;
  z-index: 10;

  padding: 11px 30px;
  border: 1px solid rgba(184,149,73,.5);
  background: rgba(247,241,230,.36);
  backdrop-filter: blur(8px);

  color: #b89549;
  text-decoration: none;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: .22em;
  font-weight: 500;

  opacity: 0;
  transform: translateY(-12px);
  pointer-events: none;

  animation: discoverIn 1s ease forwards;
  animation-delay: 10.9s;
}

@keyframes discoverIn {
  to {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
}

@media (max-width: 700px) {
  .logo-svg {
    width: 86vw;
  }

  .discover {
    top: 22px;
    right: 18px;
    padding: 9px 22px;
    font-size: 10px;
  }
}
</style>
</head>

<body>

<a href="#" class="discover">Discover</a>

<main class="landing">
  <div class="logo-area" id="logoArea">

    <div class="logo-mask">
      <svg class="logo-svg" viewBox="0 0 620 86" xmlns="http://www.w3.org/2000/svg">
        <text class="logo-text" x="0" y="64" font-size="70">IMMONOV</text>

        <!-- A senza trattino centrale -->
        <path class="a-stroke" d="M575 66 L600 18 L625 66" transform="translate(-20 0)" />
      </svg>
    </div>

    <div class="underline"></div>

    <div class="subtitle">OFF MARKET • CONSULTING</div>

  </div>
</main>

<script>
setTimeout(() => {
  document.getElementById("logoArea").classList.add("gold");
}, 6200);
</script>

</body>
</html>
