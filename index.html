<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IMMONOVA | Off Market Consulting</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}

body{
  overflow:hidden;
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
}

.background{
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

.background::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.82;
}

.background::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 30% 20%,rgba(120,90,45,.08),transparent 16%),
    radial-gradient(circle at 66% 70%,rgba(120,90,45,.06),transparent 18%),
    repeating-radial-gradient(circle at center,rgba(120,90,45,.035) 0 1px,transparent 1px 4px);
  opacity:.58;
  mix-blend-mode:multiply;
}

.landing{
  position:relative;
  z-index:2;
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.brand{
  position:relative;
  text-align:center;
  transform:translateY(-2vh);
}

.logo-wrap{
  display:inline-block;
  overflow:hidden;
  opacity:0;
  filter:blur(12px);
  clip-path:inset(0 50% 0 50%);
  animation:
    composeFromCenter 2.2s cubic-bezier(.19,1,.22,1) forwards,
    letterGlow 1.8s ease forwards 3.8s;
}

.logo-svg{
  width:min(840px,86vw);
  height:auto;
  display:block;
  overflow:visible;
}

.logo-fill{
  fill:none;
  stroke:url(#goldGradient);
  stroke-width:3.2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.logo-i{
  fill:url(#goldGradient);
}

.logo-line{
  width:0;
  height:1px;
  margin:14px auto 0;
  background:linear-gradient(to right,transparent,rgba(197,157,72,.88),transparent);
  opacity:0;
  animation:lineReveal 1.1s ease forwards 2.25s;
}

.payoff{
  display:block;
  margin-top:13px;
  color:#a58139;
  font-size:clamp(10px,1.35vw,20px);
  font-weight:700;
  letter-spacing:.025em;
  text-transform:uppercase;
  opacity:0;
  filter:blur(10px);
  clip-path:inset(0 50% 0 50%);
  animation:composeFromCenter 1.6s cubic-bezier(.19,1,.22,1) forwards;
  animation-delay:.55s;
}

.discover{
  position:fixed;
  top:152px;
  left:50%;
  z-index:5;
  transform:translateX(-50%) translateY(-14px);
  padding:11px 34px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  backdrop-filter:blur(8px);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:11px;
  font-weight:500;
  letter-spacing:.24em;
  opacity:0;
  pointer-events:none;
  animation:discoverAppear 1s ease forwards;
  animation-delay:7s;
}

@keyframes composeFromCenter{
  0%{opacity:0;filter:blur(12px);clip-path:inset(0 50% 0 50%);transform:scale(.96)}
  70%{opacity:1;filter:blur(2px)}
  100%{opacity:1;filter:blur(0);clip-path:inset(0 0 0 0);transform:scale(1)}
}

@keyframes lineReveal{
  to{width:76%;opacity:.72}
}

@keyframes letterGlow{
  to{
    filter:
      drop-shadow(0 0 3px rgba(255,230,170,.22))
      drop-shadow(0 0 8px rgba(255,220,145,.12));
  }
}

@keyframes discoverAppear{
  to{
    opacity:1;
    transform:translateX(-50%) translateY(0);
    pointer-events:auto;
  }
}

@media(max-width:700px){
  .logo-svg{width:90vw}
  .payoff{font-size:11px}
  .discover{top:26px;padding:9px 24px;font-size:10px}
}
</style>
</head>

<body>

<div class="background"></div>

<a href="#" class="discover">Discover</a>

<main class="landing">
  <section class="brand" aria-label="IMMONOVA Off Market Consulting">

    <div class="logo-wrap">
      <svg class="logo-svg" viewBox="0 0 1120 135" xmlns="http://www.w3.org/2000/svg" aria-label="IMMONOVA">
        <defs>
          <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8f6f2c"/>
            <stop offset="42%" stop-color="#c79c43"/>
            <stop offset="58%" stop-color="#f1d27a"/>
            <stop offset="100%" stop-color="#a77d31"/>
          </linearGradient>
        </defs>

        <!-- I VISIBILE -->
        <rect class="logo-i" x="35" y="20" width="5" height="95" rx="2.5"/>

        <!-- M -->
        <path class="logo-fill" d="M105 115 L105 20 L155 115 L205 20 L205 115" />

        <!-- M -->
        <path class="logo-fill" d="M265 115 L265 20 L315 115 L365 20 L365 115" />

        <!-- O -->
        <ellipse class="logo-fill" cx="465" cy="67.5" rx="48" ry="48" />

        <!-- N -->
        <path class="logo-fill" d="M555 115 L555 20 L635 115 L635 20" />

        <!-- O -->
        <ellipse class="logo-fill" cx="735" cy="67.5" rx="48" ry="48" />

        <!-- V -->
        <path class="logo-fill" d="M810 20 L860 115 L910 20" />

        <!-- A SENZA TRATTINO -->
        <path class="logo-fill" d="M915 115 L965 20 L1015 115" />
      </svg>
    </div>

    <div class="logo-line"></div>
    <span class="payoff">OFF MARKET • CONSULTING</span>

  </section>
</main>

</body>
</html>
