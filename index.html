<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMMONOVA</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: url("immonova_background.png") center center / cover no-repeat;
      font-family: Arial, Helvetica, sans-serif;
    }

    .landing {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 48px;
    }

    .logo-box {
      text-align: center;
      opacity: 0;
      transform: scale(0.75);
      filter: blur(14px);
      animation: enterFromCenter 1.4s ease forwards;
    }

    @keyframes enterFromCenter {
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    .logo {
      position: relative;
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      width: 0;

      font-size: clamp(34px, 4vw, 62px);
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1;

      color: #b89345;
      text-transform: uppercase;

      animation:
        writeLogo 2.4s ease forwards,
        finalGold 0.8s ease forwards 4.6s;
    }

    @keyframes writeLogo {
      from {
        width: 0;
      }

      to {
        width: 100%;
      }
    }

    .logo::after {
      content: "";
      position: absolute;
      top: -35%;
      right: -140%;
      width: 130%;
      height: 170%;

      background: linear-gradient(
        105deg,
        transparent 0%,
        rgba(255, 255, 255, 0.95) 42%,
        rgba(255, 236, 160, 1) 50%,
        rgba(255, 255, 255, 0.85) 58%,
        transparent 100%
      );

      filter: blur(1px);
      mix-blend-mode: screen;
      animation: lightPass 1.8s ease forwards 3.1s;
    }

    @keyframes lightPass {
      from {
        right: -140%;
      }

      to {
        right: 140%;
      }
    }

    @keyframes finalGold {
      to {
        color: #f2d38a;
        text-shadow:
          0 0 8px rgba(255, 224, 150, 0.8),
          0 0 22px rgba(255, 215, 120, 0.6),
          0 0 45px rgba(255, 200, 90, 0.45);
      }
    }

    .subtitle {
      margin-top: 8px;
      font-size: clamp(9px, 1vw, 13px);
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #b89345;
      text-transform: uppercase;
      opacity: 0;
      animation: showSubtitle 0.01s linear forwards 2.45s;
    }

    @keyframes showSubtitle {
      to {
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      .landing {
        padding-top: 42px;
      }

      .logo {
        font-size: 34px;
      }

      .subtitle {
        font-size: 9px;
      }
    }
  </style>
</head>

<body>
  <main class="landing">
    <div class="logo-box">
      <h1 class="logo">IMMONOVA</h1>
      <div class="subtitle">OFF MARKET • CONSULTING</div>
    </div>
  </main>
</body>
</html>
