html,body{width:100%;min-height:100%}
body{

  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
  color:#7f6430;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),

}
body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),

  opacity:.30;
}
.header{
  padding:34px 52px;

  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(166,127,52,.10);
  background:rgba(244,236,223,.62);
  backdrop-filter:blur(14px);
  position:sticky;
  top:0;
  z-index:20;
}
.logo{
  font-size:24px;
  font-weight:300;
  letter-spacing:.35em;
  color:#a67f34;
  text-decoration:none;
}
.nav{
  display:flex;
  gap:30px;
  align-items:center;
  flex-wrap:wrap;
}
.nav a{
  text-decoration:none;
  color:#a67f34;
  font-size:11px;
  letter-spacing:.24em;
  text-transform:uppercase;
  padding:0;
  border:none;
  background:transparent;
  position:relative;
}
.nav a::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-8px;
  height:1px;
  background:#a67f34;
  transform:scaleX(0);
  transform-origin:center;
  transition:transform .28s ease;
}
.nav a:hover::after{transform:scaleX(1)}
.nav a:hover{color:#7f6430}
.page{
  max-width:1360px;
  margin:0 auto;
  padding:58px 34px 100px;
}
.lang-row{
  display:flex;
  justify-content:flex-end;

}
.language-select{

}
.hero{

  align-items:center;

}
.kicker{

  letter-spacing:.34em;
  text-transform:uppercase;
  color:#9a793c;

}
h1{

  text-transform:uppercase;
  margin-bottom:22px;
}
.meta{
  color:#8f7643;
  font-size:14px;
  letter-spacing:.12em;
  text-transform:uppercase;
  line-height:1.8;
  margin-bottom:22px;
}
.hero-desc{

}
.status-badge{

}

.status-badge.under_negotiation{color:#8f5b28}

  min-height:460px;

  background:rgba(255,255,255,.18);

  overflow:hidden;
}
.hero-media img{
  width:100%;
  height:100%;
  min-height:460px;
  object-fit:cover;
  display:block;
}
.media-placeholder{
  min-height:460px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#a67f34;
  letter-spacing:.22em;
  text-transform:uppercase;
  line-height:1.9;
}
.lock-marker{
  position:absolute;
  right:18px;
  bottom:18px;
  max-width:250px;
  padding:15px 18px;
  border:1px solid rgba(241,210,122,.42);
  background:linear-gradient(135deg,rgba(255,252,244,.48),rgba(166,127,52,.16));
  backdrop-filter:blur(14px) saturate(150%);
  color:#fff0b1;
  text-transform:uppercase;
  text-shadow:0 1px 10px rgba(0,0,0,.28);
}
.lock-marker small{
  display:block;
  font-size:8px;
  letter-spacing:.20em;
  color:#f1d27a;
}
.lock-marker strong{
  display:block;
  margin-top:5px;
  font-size:13px;
  letter-spacing:.16em;
}
.main-grid{
  display:grid;
  grid-template-columns:minmax(0,1.15fr) minmax(360px,.85fr);
  gap:34px;
  align-items:start;
}
.panel{
  border:1px solid rgba(166,127,52,.16);
  background:rgba(255,255,255,.18);
  padding:36px;
  box-shadow:0 24px 70px rgba(127,100,48,.06);
}
.panel + .panel{margin-top:28px}
.section-title{
  font-size:15px;
  font-weight:300;
  letter-spacing:.26em;
  text-transform:uppercase;
  color:#a67f34;
  margin-bottom:20px;
}
.text{
  font-size:15px;
  line-height:1.9;
  color:#735f36;
  white-space:pre-line;
}
.data-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}
.data-item{
  border-top:1px solid rgba(166,127,52,.16);
  padding-top:14px;
}
.data-label{
  font-size:9px;
  letter-spacing:.20em;
  text-transform:uppercase;
  color:#a67f34;
  margin-bottom:8px;
}
.data-value{
  font-size:15px;
  color:#735f36;
  line-height:1.45;
}
.teaser-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}
.teaser-card{

  background:rgba(255,255,255,.16);
}
.teaser-title{
  font-size:10px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:#a67f34;
  margin-bottom:12px;
}
.teaser-text{
  font-size:13px;
  line-height:1.65;
  color:#735f36;
}
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.gallery-item{
  min-height:150px;
  border:1px solid rgba(166,127,52,.14);
  overflow:hidden;
  background:rgba(166,127,52,.08);
}
.gallery-item img{
  width:100%;
  height:170px;
  object-fit:cover;
  display:block;
}
.gallery-locked{

  text-align:center;
  padding:18px;

.form-title{

  margin-bottom:16px;

  line-height:1.8;
  color:#735f36;
  margin-bottom:24px;

.form-section-title{

  letter-spacing:.22em;
  text-transform:uppercase;
  color:#a67f34;
  margin-bottom:16px;
}
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.field.full{grid-column:1 / -1}
input,textarea,select{
  width:100%;
  padding:15px 16px;
  margin-bottom:15px;
  border:1px solid rgba(166,127,52,.25);
  background:rgba(255,252,244,.35);
  color:#7f6430;
  font-size:14px;
  outline:none;

textarea{min-height:120px;resize:vertical}
select{appearance:none;cursor:pointer}

  font-size:11px;
  line-height:1.65;
  color:#7f6430;

button{

  padding:15px;
  border:1px solid rgba(166,127,52,.42);
  background:rgba(255,252,244,.22);
  color:#a67f34;

  font-size:11px;
  font-weight:500;
  letter-spacing:.24em;

button:hover{background:#a67f34;color:#fff}
button:disabled{opacity:.55;cursor:not-allowed}
.status{
  margin-top:16px;
  min-height:20px;
  font-size:13px;
  line-height:1.6;
}
.success{color:#4f7f45}
.error{color:#9c2f2f}
.empty{
  text-align:center;
  padding:90px 20px;
  border:1px solid rgba(166,127,52,.18);
  background:rgba(255,255,255,.10);
  color:#8f7643;
}
html[dir="rtl"] body{direction:rtl}
html[dir="rtl"] .header,
html[dir="rtl"] .main-grid,
html[dir="rtl"] .form-grid,
html[dir="rtl"] .data-grid{direction:rtl}
@media(max-width:1050px){
  .hero,.main-grid{grid-template-columns:1fr}
  .teaser-grid{grid-template-columns:1fr}
}
@media(max-width:780px){
  .header{padding:28px 24px;flex-direction:column;gap:18px}
  .nav{justify-content:center;gap:18px}
  .page{padding:38px 22px 80px}
  .form-grid,.data-grid,.gallery,.events-grid{grid-template-columns:1fr}
  .timeline-item{grid-template-columns:1fr}
  .panel{padding:26px}
}

    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function normalizeLanguage(value){
  const clean = String(value || "en").trim().toLowerCase().slice(0,2);
  return SUPPORTED_LANGUAGES.includes(clean) ? clean : "en";
}

function dict(key){
  return (UI_TRANSLATIONS[currentLanguage] && UI_TRANSLATIONS[currentLanguage][key]) || UI_TRANSLATIONS.en[key] || key;
}

function applyDirection(){
  document.documentElement.lang = currentLanguage;
  document.documentElement.dir = currentLanguage === "ar" ? "rtl" : "ltr";
}

function applyStaticTranslations(){
  applyDirection();
  if(languageSelect) languageSelect.value = currentLanguage;

  document.querySelectorAll("[data-i18n]").forEach(function(el){
    const key = el.getAttribute("data-i18n");
    el.textContent = dict(key);
  });

  if(!currentOpportunity){
    pageContent.textContent = dict("loading_opportunity");
  }
}

function normalizeGallery(value){
  if(!value)return [];
  if(Array.isArray(value))return value.filter(Boolean);
  try{
    const parsed=JSON.parse(value);
    return Array.isArray(parsed)?parsed.filter(Boolean):[];
  }catch(e){
    return [];
  }
}

function fmtDate(v){
  if(!v)return "";
  try{
    return new Date(v).toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"});
  }catch(e){
    return v;
  }
}

function commercialLabel(status){
  const s = status || "available";
  if(s === "sold") return dict("sold_status");
  if(s === "reserved") return dict("reserved_status");
  if(s === "under_negotiation") return dict("under_negotiation");
  return dict("available");
}

function isSold(data){
  return (data.commercial_status || "available") === "sold";
}

function publicPrice(data){
  if(isSold(data)) return dict("reserved");
  return data.price || dict("reserved");
}

function eventTypeLabel(type){
  const map = {
    selling_party:"Selling Party",
    closing_party:"Closing Party",
    welcome_party:"Welcome Party",
    past_party:"Party avvenuto",
    upcoming_party:"Party in programma",
    investor_tour:"Investor Tour",
    site_visit:"Site Visit",
    private_dinner:"Private Dinner"
  };
  return map[type] || type || "Evento";
}

function cover(data){
  return data.cover_image || normalizeGallery(data.gallery_images)[0] || "";
}

function publicGallery(data){
  const gallery = normalizeGallery(data.gallery_images);
  const all = [data.cover_image].concat(gallery).filter(Boolean);
  return [...new Set(all)].slice(0,6);
}

function lockedGalleryCount(data){
  const gallery = normalizeGallery(data.gallery_images);
  return Math.max(0, gallery.length - 5);
}

function teaserText(data){
  if(data.ai_summary) return data.ai_summary;
  if(data.analysis_summary) return data.analysis_summary;
  return "L’analisi preliminare evidenzia un potenziale interessante in termini di posizionamento, valorizzazione e domanda qualificata. La versione completa è disponibile nel Dossier Riservato.";
}

function timelineFor(data){
  const timeline = data.opportunity_timeline || [];
  const events = (data.immonova_events || []).map(function(e){
    return {
      created_at:e.event_date || e.created_at,
      timeline_type:e.event_type,
      title:eventTypeLabel(e.event_type),
      description:e.title || e.short_description || e.description || "",
      visibility:"public"
    };
  });

  const soldStep = isSold(data) && data.sold_at ? [{
    created_at:data.sold_at,
    timeline_type:"sold",
    title:"Investment Completed",
    description:"Operazione conclusa e archiviata come IMMONOVA Success Story.",
    visibility:"public"
  }] : [];

  return timeline.concat(events).concat(soldStep)
    .filter(x => (x.visibility || "public") === "public")
    .sort((a,b) => new Date(a.created_at || 0) - new Date(b.created_at || 0));
}

async function loadOpportunity(){
  if(!id){
    pageContent.innerHTML = dict("no_opportunity");
    return;
  }

  const { data, error } = await client
    .from("opportunities")
    .select("*, immonova_events(*), opportunity_timeline(*)")
    .eq("id", id)
    .or("published.eq.true,commercial_status.eq.sold")
    .single();

  if(error || !data){
    pageContent.innerHTML = dict("unavailable");
    return;
  }

  currentOpportunity = data;
  await renderOpportunity(data);
}

async function rerenderCurrentOpportunity(){
  applyStaticTranslations();
  if(currentOpportunity) await renderOpportunity(currentOpportunity);
}

async function submitInquiry(e){
  e.preventDefault();

  const status = document.getElementById("status");
  const submitBtn = document.getElementById("submitBtn");

  status.className = "status";
  status.textContent = dict("sending_status");
  submitBtn.disabled = true;
  submitBtn.textContent = dict("sending");

  try{
    const firstName = document.getElementById("first_name").value.trim();
    const lastName = document.getElementById("last_name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const country = document.getElementById("country").value.trim();
    const company = document.getElementById("company").value.trim();
    const budgetRange = document.getElementById("budget_range").value.trim();
    const preferredLanguage = normalizeLanguage(document.getElementById("preferred_language").value || currentLanguage);
    const investorType = document.getElementById("investor_type").value.trim();
    const message = document.getElementById("message").value.trim();
    const ndaAccepted = document.getElementById("nda_accepted").checked;
    const privacyAccepted = document.getElementById("privacy_accepted").checked;

    if(!firstName || !lastName || !email || !phone || !country || !preferredLanguage || !investorType || !message){
      throw new Error(dict("required_error"));
    }

    if(!ndaAccepted) throw new Error(dict("nda_error"));
    if(!privacyAccepted) throw new Error(dict("privacy_error"));

    const payload = {
      opportunity_id: currentOpportunity.id,
      opportunity_title: currentOpportunity.title || null,
      first_name:firstName,
      last_name:lastName,
      full_name:firstName + " " + lastName,
      email:email,
      phone:phone,
      country:country,
      company:company || null,
      budget_range:budgetRange || null,
      preferred_language:preferredLanguage,
      investor_type:investorType,
      message:
        "Opportunity: " + (currentOpportunity.title || "") +
        " | Category: " + (currentOpportunity.category || "") +
        " | Location: " + (currentOpportunity.location || "") +
        " | Preferred language: " + preferredLanguage +
        " | Investor type: " + investorType +
        " | Country: " + country +
        " | Budget range: " + (budgetRange || "-") +
        " | Company: " + (company || "-") +
        " | Message: " + message,
      nda_accepted:true,
      nda_accepted_at:new Date().toISOString(),
      nda_text_version:"IMMONOVA_NDA_PUBLIC_V1",
      privacy_accepted:true,
      privacy_accepted_at:new Date().toISOString(),
      request_completed:true,
      completion_status:"pending_review",
      approved:false,
      dossier_sent:false,
      status:"pending",
      request_status:"pending",
      user_agent:navigator.userAgent || null,
      source_page:window.location.href,
      created_at:new Date().toISOString(),
      updated_at:new Date().toISOString()
    };

    const { error } = await client.from("investor_requests").insert([payload]);
    if(error) throw error;

    try{
      await client.functions.invoke("dossier-request-email", {
        body:{ request: payload }
      });
    }catch(mailError){
      console.warn("Email notification failed:", mailError);
    }

    status.className = "status success";
    status.textContent = dict("success");
    e.target.reset();

    const preferredLanguageSelect = document.getElementById("preferred_language");
    if(preferredLanguageSelect) preferredLanguageSelect.value = currentLanguage;

  }catch(error){
    status.className = "status error";
    status.textContent = error.message || dict("send_error");
  }

  submitBtn.disabled = false;
  submitBtn.textContent = dict("submit");
}

if(languageSelect){
  languageSelect.addEventListener("change", async function(){
    currentLanguage = normalizeLanguage(languageSelect.value);
    localStorage.setItem("immonova_public_language", currentLanguage);
    await rerenderCurrentOpportunity();
  });
}

try{
  applyStaticTranslations();
  loadOpportunity().catch(function(error){
    console.error(error);
    pageContent.innerHTML = dict("unavailable") + (error && error.message ? "<br>" + escapeHTML(error.message) : "");
  });
}catch(initError){
  console.error(initError);
  pageContent.innerHTML = "Errore caricamento pagina.";
}
