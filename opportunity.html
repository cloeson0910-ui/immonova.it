
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunity | IMMONOVA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
  color:#7f6430;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.30;
}

.page{
  max-width:1200px;
  margin:0 auto;
  padding:46px 28px 90px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:80px;
}

.logo{
  color:#a58139;
  text-decoration:none;
  font-size:22px;
  font-weight:300;
  letter-spacing:.35em;
}

.nav a{
  padding:11px 24px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:10px;
  letter-spacing:.18em;
}

.hero{
  text-align:center;
  margin-bottom:70px;
}

.kicker{
  color:#a58139;
  font-size:11px;
  letter-spacing:.28em;
  text-transform:uppercase;
  margin-bottom:18px;
}

h1{
  color:#a58139;
  font-size:clamp(38px,5vw,72px);
  font-weight:200;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:22px;
}

.meta{
  color:#8f7643;
  font-size:14px;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.content{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:42px;
}

.panel{
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.10);
  padding:42px;
}

.cover{
  width:100%;
  height:360px;
  object-fit:cover;
  margin-bottom:34px;
  border:1px solid rgba(165,129,57,.18);
}

.description{
  font-size:16px;
  line-height:1.9;
  color:#80683a;
  white-space:pre-line;
}

.data-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:34px;
}

.data-item{
  border-top:1px solid rgba(165,129,57,.18);
  padding-top:14px;
}

.data-label{
  font-size:10px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#a58139;
  margin-bottom:8px;
}

.data-value{
  font-size:15px;
  color:#80683a;
}

.form-title{
  font-size:24px;
  font-weight:300;
  letter-spacing:.08em;
  color:#a58139;
  margin-bottom:16px;
  text-transform:uppercase;
}

.form-intro{
  font-size:14px;
  line-height:1.8;
  color:#80683a;
  margin-bottom:28px;
}

input,textarea{
  width:100%;
  padding:15px 16px;
  margin-bottom:15px;
  border:1px solid rgba(165,129,57,.25);
  background:rgba(255,252,244,.35);
  color:#7f6430;
  font-size:14px;
  outline:none;
  font-family:inherit;
}

textarea{
  min-height:130px;
  resize:vertical;
}

button{
  width:100%;
  padding:15px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  color:#a58139;
  text-transform:uppercase;
  font-size:11px;
  font-weight:500;
  letter-spacing:.24em;
  cursor:pointer;
}

.status{
  margin-top:16px;
  min-height:20px;
  font-size:13px;
}

.success{color:#4f7f45}
.error{color:#9c2f2f}

.empty{
  text-align:center;
  padding:90px 20px;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.10);
  color:#8f7643;
}

@media(max-width:850px){
  .content{grid-template-columns:1fr}
  .header{flex-direction:column;gap:22px}
}
</style>
</head>

<body>

<div class="page">

<header class="header">
  <a href="index.html" class="logo">IMMONOVA</a>
  <nav class="nav">
    <a href="opportunities.html">Opportunities</a>
  </nav>
</header>

<div id="pageContent" class="empty">Caricamento opportunità...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const pageContent = document.getElementById("pageContent");

let currentOpportunity = null;

async function loadOpportunity(){
  if(!id){
    pageContent.innerHTML = "Opportunità non selezionata.";
    return;
  }

  const { data, error } = await client
    .from("opportunities")
    .select("*")
    .eq("id", id)
    .eq("published", true)
    .single();

  if(error || !data){
    pageContent.innerHTML = "Opportunità non disponibile.";
    return;
  }

  currentOpportunity = data;

  const isOffMarket = data.category === "Off Market";

  pageContent.className = "";

  pageContent.innerHTML = `
    <section class="hero">
      <div class="kicker">${data.category || "Investment Opportunity"}</div>
      <h1>${data.title || ""}</h1>
      <div class="meta">${data.location || ""} ${data.price ? " · " + data.price : ""}</div>
    </section>

    <section class="content">

      <div class="panel">
        ${
          data.cover_image && !isOffMarket
          ? `<img class="cover" src="${data.cover_image}" alt="${data.title || ""}">`
          : ""
        }

        <div class="description">
          ${
            isOffMarket
            ? "This is a private off-market opportunity. Detailed information is available only after a direct request and internal qualification."
            : (data.full_description || data.short_description || "")
          }
        </div>

        ${
          !isOffMarket
          ? `
          <div class="data-grid">
            <div class="data-item">
              <div class="data-label">Category</div>
              <div class="data-value">${data.category || "-"}</div>
            </div>
            <div class="data-item">
              <div class="data-label">Investment Value</div>
              <div class="data-value">${data.price || "Reserved"}</div>
            </div>
            <div class="data-item">
              <div class="data-label">Location</div>
              <div class="data-value">${data.location || "-"}</div>
            </div>
            <div class="data-item">
              <div class="data-label">Type</div>
              <div class="data-value">${data.investment_type || "-"}</div>
            </div>
          </div>
          `
          : ""
        }
      </div>

      <aside class="panel">
        <div class="form-title">Request Information</div>
        <p class="form-intro">
          Complete the form below to request confidential information about this opportunity.
        </p>

        <form id="inquiryForm">
          <input type="text" id="name" placeholder="Name" required>
          <input type="email" id="email" placeholder="Email" required>
          <input type="text" id="phone" placeholder="Phone">
          <textarea id="message" placeholder="Message">I would like to receive more information about: ${data.title || ""}</textarea>
          <button type="submit">Send Request</button>
        </form>

        <div id="status" class="status"></div>
      </aside>

    </section>
  `;

  document.getElementById("inquiryForm").addEventListener("submit", submitInquiry);
}

async function submitInquiry(e){
  e.preventDefault();

  const status = document.getElementById("status");
  status.className = "status";
  status.textContent = "Invio richiesta...";

  const payload = {
    opportunity_id: currentOpportunity.id,
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    message:
      "Opportunity: " + currentOpportunity.title +
      " | Category: " + currentOpportunity.category +
      " | Location: " + (currentOpportunity.location || "") +
      " | Message: " + document.getElementById("message").value.trim()
  };

  const { error } = await client
    .from("inquiries")
    .insert([payload]);

  if(error){
    status.className = "status error";
    status.textContent = error.message;
    return;
  }

  status.className = "status success";
  status.textContent = "Richiesta inviata correttamente.";
  e.target.reset();
}

loadOpportunity();
</script>

</body>
</html>
