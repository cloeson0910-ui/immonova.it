<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunity | IMMONOVA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
  color:#7f6430;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.30;
}

.page{
  max-width:1200px;
  margin:0 auto;
  padding:46px 28px 90px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:80px;
}

.logo{
  color:#a58139;
  text-decoration:none;
  font-size:22px;
  font-weight:300;
  letter-spacing:.35em;
}

.nav a{
  padding:11px 24px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:10px;
  letter-spacing:.18em;
}

.hero{
  text-align:center;
  margin-bottom:70px;
}

.kicker{
  color:#a58139;
  font-size:11px;
  letter-spacing:.28em;
  text-transform:uppercase;
  margin-bottom:18px;
}

h1{
  color:#a58139;
  font-size:clamp(38px,5vw,72px);
  font-weight:200;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:22px;
}

.meta{
  color:#8f7643;
  font-size:14px;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.content{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:42px;
}

.panel{
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.10);
  padding:42px;
}

.cover{
  width:100%;
  height:360px;
  object-fit:cover;
  margin-bottom:34px;
  border:1px solid rgba(165,129,57,.18);
}

.description{
  font-size:16px;
  line-height:1.9;
  color:#80683a;
  white-space:pre-line;
}

.data-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:34px;
}

.data-item{
  border-top:1px solid rgba(165,129,57,.18);
  padding-top:14px;
}

.data-label{
  font-size:10px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#a58139;
  margin-bottom:8px;
}

.data-value{
  font-size:15px;
  color:#80683a;
}

.form-title{
  font-size:24px;
  font-weight:300;
  letter-spacing:.08em;
  color:#a58139;
  margin-bottom:16px;
  text-transform:uppercase;
}

.form-intro{
  font-size:14px;
  line-height:1.8;
  color:#80683a;
  margin-bottom:24px;
}

.form-section{
  margin-top:24px;
  padding-top:22px;
  border-top:1px solid rgba(165,129,57,.16);
}

.form-section-title{
  font-size:11px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#a58139;
  margin-bottom:16px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.field.full{
  grid-column:1 / -1;
}

input,
textarea,
select{
  width:100%;
  padding:15px 16px;
  margin-bottom:15px;
  border:1px solid rgba(165,129,57,.25);
  background:rgba(255,252,244,.35);
  color:#7f6430;
  font-size:14px;
  outline:none;
  font-family:inherit;
}

textarea{
  min-height:120px;
  resize:vertical;
}

select{
  appearance:none;
  cursor:pointer;
}

.consent-box{
  margin-bottom:14px;
  padding:16px;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,252,244,.22);
}

.consent-label{
  display:flex;
  gap:12px;
  align-items:flex-start;
  font-size:12px;
  line-height:1.55;
  color:#80683a;
}

.consent-label input{
  width:auto;
  min-width:16px;
  margin:2px 0 0;
}

.nda-text{
  margin:10px 0 14px;
  padding:14px;
  max-height:150px;
  overflow:auto;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.20);
  font-size:11px;
  line-height:1.65;
  color:#7f6430;
}

button{
  width:100%;
  padding:15px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  color:#a58139;
  text-transform:uppercase;
  font-size:11px;
  font-weight:500;
  letter-spacing:.24em;
  cursor:pointer;
}

button:hover{
  background:#a58139;
  color:#fff;
}

button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.status{
  margin-top:16px;
  min-height:20px;
  font-size:13px;
  line-height:1.6;
}

.success{color:#4f7f45}
.error{color:#9c2f2f}

.empty{
  text-align:center;
  padding:90px 20px;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.10);
  color:#8f7643;
}

.confidential-note{
  margin-top:18px;
  padding:16px;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(166,127,52,.07);
  font-size:12px;
  line-height:1.7;
  color:#80683a;
}

@media(max-width:850px){
  .content{grid-template-columns:1fr}
  .header{flex-direction:column;gap:22px}
  .form-grid{grid-template-columns:1fr}
  .field.full{grid-column:auto}
}
</style>
</head>

<body>

<div class="page">

<header class="header">
  <a href="index.html" class="logo">IMMONOVA</a>
  <nav class="nav">
    <a href="opportunities.html">Opportunities</a>
  </nav>
</header>

<div id="pageContent" class="empty">Caricamento opportunità...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const pageContent = document.getElementById("pageContent");

let currentOpportunity = null;

function escapeHTML(value){
  return String(value ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function normalizeLanguage(value){
  return String(value || "it").trim().toLowerCase();
}

async function loadOpportunity(){
  if(!id){
    pageContent.innerHTML = "Opportunità non selezionata.";
    return;
  }

  const { data, error } = await client
    .from("opportunities")
    .select("*")
    .eq("id", id)
    .eq("published", true)
    .single();

  if(error || !data){
    pageContent.innerHTML = "Opportunità non disponibile.";
    return;
  }

  currentOpportunity = data;

  const isOffMarket = String(data.category || "").toLowerCase() === "off market";

  pageContent.className = "";

  pageContent.innerHTML = `
    <section class="hero">
      <div class="kicker">${escapeHTML(data.category || "Investment Opportunity")}</div>
      <h1>${escapeHTML(data.title || "")}</h1>
      <div class="meta">${escapeHTML(data.location || "")} ${data.price ? " · " + escapeHTML(data.price) : ""}</div>
    </section>

    <section class="content">

      <div class="panel">
        ${
          data.cover_image && !isOffMarket
          ? `<img class="cover" src="${escapeHTML(data.cover_image)}" alt="${escapeHTML(data.title || "")}">`
          : ""
        }

        <div class="description">
          ${
            isOffMarket
            ? "This is a private off-market opportunity. Detailed information and the investment dossier are available only after qualification, NDA acceptance and manual approval by IMMONOVA."
            : escapeHTML(data.full_description || data.short_description || "")
          }
        </div>

        ${
          !isOffMarket
          ? `
          <div class="data-grid">
            <div class="data-item">
              <div class="data-label">Category</div>
              <div class="data-value">${escapeHTML(data.category || "-")}</div>
            </div>
            <div class="data-item">
              <div class="data-label">Investment Value</div>
              <div class="data-value">${escapeHTML(data.price || "Reserved")}</div>
            </div>
            <div class="data-item">
              <div class="data-label">Location</div>
              <div class="data-value">${escapeHTML(data.location || "-")}</div>
            </div>
            <div class="data-item">
              <div class="data-label">Type</div>
              <div class="data-value">${escapeHTML(data.investment_type || "-")}</div>
            </div>
          </div>
          `
          : ""
        }

        <div class="confidential-note">
          The full dossier is not available for immediate download.
          Requests are reviewed manually by IMMONOVA before any confidential material is shared.
        </div>
      </div>

      <aside class="panel">
        <div class="form-title">Request Dossier</div>
        <p class="form-intro">
          Complete the qualification form below. The dossier will be sent only after manual approval and in the language selected by you.
        </p>

        <form id="inquiryForm">

          <div class="form-section-title">Applicant Data</div>

          <div class="form-grid">
            <div class="field">
              <input type="text" id="first_name" placeholder="First name *" required>
            </div>

            <div class="field">
              <input type="text" id="last_name" placeholder="Last name *" required>
            </div>

            <div class="field">
              <input type="email" id="email" placeholder="Email *" required>
            </div>

            <div class="field">
              <input type="tel" id="phone" placeholder="Phone *" required>
            </div>

            <div class="field">
              <input type="text" id="country" placeholder="Country *" required>
            </div>

            <div class="field">
              <input type="text" id="company" placeholder="Company / Entity">
            </div>

            <div class="field full">
              <select id="budget_range">
                <option value="">Budget range</option>
                <option value="under_1m">Under €1M</option>
                <option value="1m_3m">€1M - €3M</option>
                <option value="3m_5m">€3M - €5M</option>
                <option value="5m_10m">€5M - €10M</option>
                <option value="over_10m">Over €10M</option>
                <option value="reserved">Prefer not to disclose</option>
              </select>
            </div>

            <div class="field full">
              <select id="preferred_language" required>
                <option value="">Preferred language *</option>
                <option value="it">Italiano</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
                <option value="ar">العربية</option>
              </select>
            </div>

            <div class="field full">
              <select id="investor_type" required>
                <option value="">Investor profile *</option>
                <option value="private_investor">Private Investor</option>
                <option value="family_office">Family Office</option>
                <option value="real_estate_operator">Real Estate Operator</option>
                <option value="hospitality_group">Hospitality Group</option>
                <option value="fund">Investment Fund</option>
                <option value="advisor">Advisor / Consultant</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="field full">
              <textarea id="message" placeholder="Message / Investment intent *" required>I would like to request the confidential dossier for: ${escapeHTML(data.title || "")}</textarea>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">NDA & Privacy</div>

            <div class="nda-text">
              By submitting this request, the applicant acknowledges that the information, documents, images,
              business assumptions, financial projections and investment dossier related to this opportunity
              are confidential. The applicant agrees not to disclose, reproduce, forward, publish or use such
              information for purposes other than evaluating the potential investment opportunity, unless expressly
              authorized in writing by IMMONOVA Off Market Consulting.
            </div>

            <div class="consent-box">
              <label class="consent-label">
                <input type="checkbox" id="nda_accepted" required>
                <span>I accept the confidentiality terms and NDA obligations related to this opportunity. *</span>
              </label>
            </div>

            <div class="consent-box">
              <label class="consent-label">
                <input type="checkbox" id="privacy_accepted" required>
                <span>I authorize IMMONOVA to process my data for the purpose of evaluating and managing this dossier request. *</span>
              </label>
            </div>
          </div>

          <button type="submit" id="submitBtn">Submit Dossier Request</button>
        </form>

        <div id="status" class="status"></div>
      </aside>

    </section>
  `;

  document.getElementById("inquiryForm").addEventListener("submit", submitInquiry);
}

async function submitInquiry(e){
  e.preventDefault();

  const status = document.getElementById("status");
  const submitBtn = document.getElementById("submitBtn");

  status.className = "status";
  status.textContent = "Invio richiesta dossier...";
  submitBtn.disabled = true;
  submitBtn.textContent = "Invio...";

  try{
    const firstName = document.getElementById("first_name").value.trim();
    const lastName = document.getElementById("last_name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const country = document.getElementById("country").value.trim();
    const company = document.getElementById("company").value.trim();
    const budgetRange = document.getElementById("budget_range").value.trim();
    const preferredLanguage = normalizeLanguage(document.getElementById("preferred_language").value);
    const investorType = document.getElementById("investor_type").value.trim();
    const message = document.getElementById("message").value.trim();
    const ndaAccepted = document.getElementById("nda_accepted").checked;
    const privacyAccepted = document.getElementById("privacy_accepted").checked;

    if(!firstName || !lastName || !email || !phone || !country || !preferredLanguage || !investorType || !message){
      throw new Error("Compila tutti i campi obbligatori.");
    }

    if(!ndaAccepted){
      throw new Error("Devi accettare l'NDA per richiedere il dossier.");
    }

    if(!privacyAccepted){
      throw new Error("Devi accettare il trattamento dei dati.");
    }

    const payload = {
      opportunity_id: currentOpportunity.id,
      opportunity_title: currentOpportunity.title || null,

      first_name:firstName,
      last_name:lastName,
      full_name:firstName + " " + lastName,
      email:email,
      phone:phone,
      country:country,
      company:company || null,
      budget_range:budgetRange || null,

      preferred_language:preferredLanguage,
      investor_type:investorType,

      message:
        "Opportunity: " + (currentOpportunity.title || "") +
        " | Category: " + (currentOpportunity.category || "") +
        " | Location: " + (currentOpportunity.location || "") +
        " | Preferred language: " + preferredLanguage +
        " | Investor type: " + investorType +
        " | Country: " + country +
        " | Budget range: " + (budgetRange || "-") +
        " | Company: " + (company || "-") +
        " | Message: " + message,

      nda_accepted:true,
      nda_accepted_at:new Date().toISOString(),
      nda_text_version:"IMMONOVA_NDA_PUBLIC_V1",

      privacy_accepted:true,
      privacy_accepted_at:new Date().toISOString(),

      request_completed:true,
      completion_status:"pending_review",

      approved:false,
      dossier_sent:false,

      status:"pending",
      request_status:"pending",

      user_agent:navigator.userAgent || null,
      source_page:window.location.href,

      created_at:new Date().toISOString(),
      updated_at:new Date().toISOString()
    };

    const { error } = await client
      .from("investor_requests")
      .insert([payload]);

    if(error){
      throw error;
    }

    status.className = "status success";
    status.textContent = "Richiesta inviata correttamente. IMMONOVA verificherà il profilo e invierà il dossier dopo approvazione manuale.";
    e.target.reset();

  }catch(error){
    status.className = "status error";
    status.textContent = error.message || "Errore durante l'invio della richiesta.";
  }

  submitBtn.disabled = false;
  submitBtn.textContent = "Submit Dossier Request";
}

loadOpportunity();
</script>

</body>
</html>
