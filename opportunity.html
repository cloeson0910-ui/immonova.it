<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunity | IMMONOVA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
  color:#7f6430;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.30;
}

.page{
  max-width:1200px;
  margin:0 auto;
  padding:46px 28px 90px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:80px;
}

.logo{
  color:#a58139;
  text-decoration:none;
  font-size:22px;
  font-weight:300;
  letter-spacing:.35em;
}



.top-actions{
  display:flex;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
}

.language-select{
  padding:11px 18px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  color:#a58139;
  text-transform:uppercase;
  font-size:10px;
  letter-spacing:.14em;
  cursor:pointer;
  outline:none;
  font-family:inherit;
  width:auto;
  margin:0;
}

html[dir="rtl"] body{
  direction:rtl;
}

html[dir="rtl"] .header,
html[dir="rtl"] .content,
html[dir="rtl"] .form-grid,
html[dir="rtl"] .data-grid{
  direction:rtl;
}

.nav a{
  padding:11px 24px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:10px;
  letter-spacing:.18em;
}

.hero{
  text-align:center;
  margin-bottom:70px;
}

.kicker{
  color:#a58139;
  font-size:11px;
  letter-spacing:.28em;
  text-transform:uppercase;
  margin-bottom:18px;
}

h1{
  color:#a58139;
  font-size:clamp(38px,5vw,72px);
  font-weight:200;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:22px;
}

.meta{
  color:#8f7643;
  font-size:14px;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.content{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:42px;
}

.panel{
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.10);
  padding:42px;
}

.cover{
  width:100%;
  height:360px;
  object-fit:cover;
  margin-bottom:34px;
  border:1px solid rgba(165,129,57,.18);
}

.description{
  font-size:16px;
  line-height:1.9;
  color:#80683a;
  white-space:pre-line;
}

.data-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:34px;
}

.data-item{
  border-top:1px solid rgba(165,129,57,.18);
  padding-top:14px;
}

.data-label{
  font-size:10px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#a58139;
  margin-bottom:8px;
}

.data-value{
  font-size:15px;
  color:#80683a;
}

.form-title{
  font-size:24px;
  font-weight:300;
  letter-spacing:.08em;
  color:#a58139;
  margin-bottom:16px;
  text-transform:uppercase;
}

.form-intro{
  font-size:14px;
  line-height:1.8;
  color:#80683a;
  margin-bottom:24px;
}

.form-section{
  margin-top:24px;
  padding-top:22px;
  border-top:1px solid rgba(165,129,57,.16);
}

.form-section-title{
  font-size:11px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#a58139;
  margin-bottom:16px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.field.full{
  grid-column:1 / -1;
}

input,
textarea,
select{
  width:100%;
  padding:15px 16px;
  margin-bottom:15px;
  border:1px solid rgba(165,129,57,.25);
  background:rgba(255,252,244,.35);
  color:#7f6430;
  font-size:14px;
  outline:none;
  font-family:inherit;
}

textarea{
  min-height:120px;
  resize:vertical;
}

select{
  appearance:none;
  cursor:pointer;
}

.consent-box{
  margin-bottom:14px;
  padding:16px;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,252,244,.22);
}

.consent-label{
  display:flex;
  gap:12px;
  align-items:flex-start;
  font-size:12px;
  line-height:1.55;
  color:#80683a;
}

.consent-label input{
  width:auto;
  min-width:16px;
  margin:2px 0 0;
}

.nda-text{
  margin:10px 0 14px;
  padding:14px;
  max-height:150px;
  overflow:auto;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.20);
  font-size:11px;
  line-height:1.65;
  color:#7f6430;
}

button{
  width:100%;
  padding:15px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  color:#a58139;
  text-transform:uppercase;
  font-size:11px;
  font-weight:500;
  letter-spacing:.24em;
  cursor:pointer;
}

button:hover{
  background:#a58139;
  color:#fff;
}

button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.status{
  margin-top:16px;
  min-height:20px;
  font-size:13px;
  line-height:1.6;
}

.success{color:#4f7f45}
.error{color:#9c2f2f}

.empty{
  text-align:center;
  padding:90px 20px;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.10);
  color:#8f7643;
}

.confidential-note{
  margin-top:18px;
  padding:16px;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(166,127,52,.07);
  font-size:12px;
  line-height:1.7;
  color:#80683a;
}

@media(max-width:850px){
  .content{grid-template-columns:1fr}
  .header{flex-direction:column;gap:22px}
  .form-grid{grid-template-columns:1fr}
  .field.full{grid-column:auto}
}
</style>
</head>

function escapeHTML(value){
  return String(value ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function normalizeLanguage(value){
  const clean = String(value || "en").trim().toLowerCase().slice(0,2);
  return SUPPORTED_LANGUAGES.includes(clean) ? clean : "en";
}

function dict(key){
  return (UI_TRANSLATIONS[currentLanguage] && UI_TRANSLATIONS[currentLanguage][key]) || UI_TRANSLATIONS.en[key] || key;
}

function applyDirection(){
  document.documentElement.lang = currentLanguage;
  document.documentElement.dir = currentLanguage === "ar" ? "rtl" : "ltr";
}

function applyStaticTranslations(){
  applyDirection();

  if(languageSelect){
    languageSelect.value = currentLanguage;
  }

  document.querySelectorAll("[data-i18n]").forEach(function(el){
    const key = el.getAttribute("data-i18n");
    el.textContent = dict(key);
  });

  if(!currentOpportunity){
    pageContent.textContent = dict("loading_opportunity");
  }
}

function updateFormStaticTexts(){
  const setPlaceholder = function(id,key){
    const el = document.getElementById(id);
    if(el) el.placeholder = dict(key);
  };

  setPlaceholder("first_name","first_name");
  setPlaceholder("last_name","last_name");
  setPlaceholder("email","email");
  setPlaceholder("phone","phone");
  setPlaceholder("country","country");
  setPlaceholder("company","company");
  setPlaceholder("message","message_placeholder");

  const optionLabels = {
    budget_range:["budget_range","under_1m","one_to_three","three_to_five","five_to_ten","over_10m","prefer_not"],
    preferred_language:["preferred_language",null,null,null,null,null,null],
    investor_type:["investor_profile","private_investor","family_office","real_estate_operator","hospitality_group","fund","advisor","other"]
  };

  Object.keys(optionLabels).forEach(function(selectId){
    const select = document.getElementById(selectId);
    if(!select) return;
    const keys = optionLabels[selectId];
    Array.prototype.slice.call(select.options).forEach(function(opt,i){
      if(keys[i]) opt.textContent = dict(keys[i]);
    });
  });

  const submitBtn = document.getElementById("submitBtn");
  if(submitBtn) submitBtn.textContent = dict("submit");

  const message = document.getElementById("message");
  if(message && (!message.dataset.userEdited || message.value === currentRequestTemplate)){
    currentRequestTemplate = dict("message_default") + " " + (currentOpportunity && currentOpportunity.title ? currentOpportunity.title : "");
    message.value = currentRequestTemplate;
    message.dataset.userEdited = "";
  }
}

async function translateWithAI(texts){
  const cleanTexts = (texts || []).map(function(t){ return String(t || "").trim(); });

  if(currentLanguage === "it" || cleanTexts.length === 0){
    return cleanTexts;
  }

  try{
    const result = await client.functions.invoke("translate-public-content", {
      body:{
        language:currentLanguage,
        source_language:"it",
        texts:cleanTexts,
        context:"IMMONOVA luxury real estate investment website. Keep brand names, numbers, currency, locations, emails and legal meaning unchanged."
      }
    });

    if(result.error || !result.data || !Array.isArray(result.data.translations)){
      throw result.error || new Error("Translation unavailable");
    }

    return result.data.translations.map(function(t,i){ return t || cleanTexts[i]; });
  }catch(error){
    console.warn("AI translation fallback:", error && error.message ? error.message : error);
    return cleanTexts;
  }
}

async function translateDynamicOpportunity(data){
  if(!data || currentLanguage === "it") return data;

  const fields = [
    data.category || "",
    data.title || "",
    data.location || "",
    data.investment_type || "",
    data.full_description || data.short_description || ""
  ];

  const translated = await translateWithAI(fields);

  return Object.assign({}, data, {
    category_translated:translated[0] || data.category,
    title_translated:translated[1] || data.title,
    location_translated:translated[2] || data.location,
    investment_type_translated:translated[3] || data.investment_type,
    description_translated:translated[4] || data.full_description || data.short_description
  });
}

async function loadOpportunity(){
  if(!id){
    pageContent.innerHTML = dict("no_opportunity");
    return;
  }

  const { data, error } = await client
    .from("opportunities")
    .select("*")
    .eq("id", id)
    .eq("published", true)
    .single();

  if(error || !data){
    pageContent.innerHTML = dict("unavailable");
    return;
  }

  currentOpportunity = data;
  lastRenderedSignature = JSON.stringify({id:data.id, lang:currentLanguage, updated_at:data.updated_at || data.created_at || ""});
  await renderOpportunity(data);
}

async function rerenderCurrentOpportunity(){
  applyStaticTranslations();
  if(currentOpportunity){
    await renderOpportunity(currentOpportunity);
  }
}

async function submitInquiry(e){
  e.preventDefault();

  const status = document.getElementById("status");
  const submitBtn = document.getElementById("submitBtn");

  status.className = "status";
  status.textContent = dict("sending_status");
  submitBtn.disabled = true;
  submitBtn.textContent = dict("sending");

  try{
    const firstName = document.getElementById("first_name").value.trim();
    const lastName = document.getElementById("last_name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const country = document.getElementById("country").value.trim();
    const company = document.getElementById("company").value.trim();
    const budgetRange = document.getElementById("budget_range").value.trim();
    const preferredLanguage = normalizeLanguage(document.getElementById("preferred_language").value || currentLanguage);
    const investorType = document.getElementById("investor_type").value.trim();
    const message = document.getElementById("message").value.trim();
    const ndaAccepted = document.getElementById("nda_accepted").checked;
    const privacyAccepted = document.getElementById("privacy_accepted").checked;

    if(!firstName || !lastName || !email || !phone || !country || !preferredLanguage || !investorType || !message){
      throw new Error(dict("required_error"));
    }

    if(!ndaAccepted){
      throw new Error(dict("nda_error"));
    }

    if(!privacyAccepted){
      throw new Error(dict("privacy_error"));
    }

    const payload = {
      opportunity_id: currentOpportunity.id,
      opportunity_title: currentOpportunity.title || null,

      first_name:firstName,
      last_name:lastName,
      full_name:firstName + " " + lastName,
      email:email,
      phone:phone,
      country:country,
      company:company || null,
      budget_range:budgetRange || null,

      preferred_language:preferredLanguage,
      investor_type:investorType,

      message:
        "Opportunity: " + (currentOpportunity.title || "") +
        " | Category: " + (currentOpportunity.category || "") +
        " | Location: " + (currentOpportunity.location || "") +
        " | Preferred language: " + preferredLanguage +
        " | Investor type: " + investorType +
        " | Country: " + country +
        " | Budget range: " + (budgetRange || "-") +
        " | Company: " + (company || "-") +
        " | Message: " + message,

      nda_accepted:true,
      nda_accepted_at:new Date().toISOString(),
      nda_text_version:"IMMONOVA_NDA_PUBLIC_V1",

      privacy_accepted:true,
      privacy_accepted_at:new Date().toISOString(),

      request_completed:true,
      completion_status:"pending_review",

      approved:false,
      dossier_sent:false,

      status:"pending",
      request_status:"pending",

      user_agent:navigator.userAgent || null,
      source_page:window.location.href,

      created_at:new Date().toISOString(),
      updated_at:new Date().toISOString()
    };

    const { error } = await client
      .from("investor_requests")
      .insert([payload]);

    if(error){
      throw error;
    }

    status.className = "status success";
    status.textContent = dict("success");
    e.target.reset();
    const preferredLanguageSelect = document.getElementById("preferred_language");
    if(preferredLanguageSelect) preferredLanguageSelect.value = currentLanguage;

  }catch(error){
    status.className = "status error";
    status.textContent = error.message || dict("send_error");
  }

  submitBtn.disabled = false;
  submitBtn.textContent = dict("submit");
}
