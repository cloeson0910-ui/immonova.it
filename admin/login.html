<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMMONOVA Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
}

body{
background:#f4ecdf;
font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at center,
rgba(255,255,255,.72) 0%,
rgba(255,255,255,.34) 38%,
rgba(244,236,223,.06) 72%),
#f4ecdf;

z-index:-2;
}

body::after{
content:"";
position:fixed;
inset:0;

background:
repeating-linear-gradient(
60deg,
transparent 0 86px,
rgba(188,149,78,.23) 87px,
transparent 90px
),
repeating-linear-gradient(
-60deg,
transparent 0 86px,
rgba(188,149,78,.22) 87px,
transparent 90px
),
repeating-linear-gradient(
0deg,
transparent 0 148px,
rgba(188,149,78,.13) 149px,
transparent 152px
);

background-size:230px 199px;
opacity:.30;

z-index:-1;
}

.container{
width:100%;
height:100vh;

display:flex;
align-items:center;
justify-content:center;
}

.card{

width:420px;
max-width:90vw;

padding:50px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(10px);

border:1px solid rgba(166,127,52,.18);
}

.logo{

text-align:center;

font-size:28px;
font-weight:300;

letter-spacing:.35em;

color:#a67f34;

margin-bottom:12px;
}

.subtitle{

text-align:center;

font-size:11px;

letter-spacing:.25em;

text-transform:uppercase;

color:#a67f34;

margin-bottom:40px;
}

input{

width:100%;

padding:14px 16px;

margin-bottom:15px;

border:1px solid rgba(166,127,52,.20);

background:rgba(255,255,255,.55);

font-size:14px;

outline:none;
}

button{

width:100%;

padding:15px;

border:none;

cursor:pointer;

background:#a67f34;

color:white;

font-size:12px;

letter-spacing:.25em;

text-transform:uppercase;
}

button:hover{
opacity:.9;
}

.error{

margin-top:15px;

font-size:13px;

color:#b00020;

text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
IMMONOVA
</div>

<div class="subtitle">
Admin Access
</div>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required
>

<input
type="password"
id="password"
placeholder="Password"
required
>

<button type="submit">
Login
</button>

</form>

<div id="error" class="error"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>

<script>

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const { error } =
await supabase.auth.signInWithPassword({
email,
password
});

if(error){

document.getElementById("error").textContent =
error.message;

return;
}

window.location.href =
"dashboard.html";

});

</script>

</body>
</html>
