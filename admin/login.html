<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMMONOVA Admin</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}

body{
  overflow:hidden;
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
}

.background{
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

.background::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.3;
}

.background::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 30% 20%,rgba(120,90,45,.08),transparent 16%),
    radial-gradient(circle at 66% 70%,rgba(120,90,45,.06),transparent 18%),
    repeating-radial-gradient(circle at center,rgba(120,90,45,.035) 0 1px,transparent 1px 4px);
  opacity:.06;
  mix-blend-mode:multiply;
}

.container{
  position:relative;
  z-index:2;
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:420px;
  max-width:90vw;
  padding:52px 46px;
  text-align:center;
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.08);
}

.logo{
  font-size:28px;
  font-weight:300;
  letter-spacing:.35em;
  color:#a58139;
  margin-bottom:12px;
}

.subtitle{
  font-size:11px;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:#a58139;
  margin-bottom:40px;
}

input{
  width:100%;
  padding:15px 16px;
  margin-bottom:16px;
  border:1px solid rgba(165,129,57,.25);
  background:rgba(255,252,244,.35);
  color:#7f6430;
  font-size:14px;
  outline:none;
}

input::placeholder{
  color:rgba(127,100,48,.55);
}

button{
  width:100%;
  margin-top:8px;
  padding:14px 24px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  backdrop-filter:blur(8px);
  color:#a58139;
  text-transform:uppercase;
  font-size:11px;
  font-weight:500;
  letter-spacing:.24em;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:rgba(255,252,244,.38);
}

.error{
  margin-top:18px;
  min-height:18px;
  color:#9c2f2f;
  font-size:13px;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="container">
  <div class="card">

    <div class="logo">IMMONOVA</div>
    <div class="subtitle">Admin Access</div>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" autocomplete="email" required>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit" id="loginBtn">Login</button>
    </form>

    <div id="error" class="error"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("error");
  const loginBtn = document.getElementById("loginBtn");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    errorBox.textContent = "";
    loginBtn.textContent = "Loading...";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { data, error } = await client.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      loginBtn.textContent = "Login";
      errorBox.textContent = error.message;
      return;
    }

    window.location.href = "dashboard.html";
  });
});
</script>

</body>
</html>
