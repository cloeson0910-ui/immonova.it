<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../js/config.js"></script><script>
const client=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const params=new URLSearchParams(location.search);const id=params.get('id');
let currentUser=null;let currentEvent=null;let currentMedia=[];
let currentUserLanguage="it";
const statusBox=document.getElementById('status');const saveBtn=document.getElementById('saveBtn');const progressWrap=document.getElementById('progressWrap');const progressFill=document.getElementById('progressFill');const progressText=document.getElementById('progressText');
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function slugify(t){return String(t||'evento').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,80)}function val(id){return document.getElementById(id).value.trim()}function setVal(id,v){document.getElementById(id).value=v??''}function num(id){const n=Number(document.getElementById(id).value);return Number.isFinite(n)?n:null}function setStatus(m,t){statusBox.className='status '+(t||'');statusBox.textContent=m||''}function progress(p,t){progressWrap.style.display='block';progressText.style.display='block';progressFill.style.width=p+'%';progressText.textContent=t||''}

/* ---- i18n: stesso meccanismo delle altre pagine admin (vedi users.html). Client Supabase
   "client" come in users.html/dashboard.html/opportunities.html. Questa pagina non carica un
   profilo per altri motivi (nessun controllo ruolo), quindi loadUserLanguage() è una chiamata
   dedicata solo per leggere la lingua e non tocca la logica esistente di checkAuth(). ---- */
var UI_STRINGS = {
  nav_dashboard:"Dashboard", nav_events:"Eventi", logout:"Logout",
  title:"Modifica Evento",
  intro:"Aggiorna evento, contenuti media, stato pubblicazione e collegamento alla relativa opportunità.",
  section_event_info:"Informazioni Evento", label_title:"Titolo", label_category:"Categoria",
  type_sold_party:"Sold Party", type_past_party:"Party avvenuto", type_upcoming_party:"Party in programma", type_selling_party:"Selling Party",
  label_linked_opportunity:"Opportunità collegata", opt_none:"Nessuna",
  label_date:"Data", label_time:"Orario", ph_time:"Es. 18:30",
  label_venue:"Venue", ph_venue:"Es. Masseria privata",
  label_location:"Location", ph_location:"Es. Valle d'Itria",
  label_address:"Indirizzo", label_short_description:"Descrizione breve", label_full_description:"Descrizione completa",
  section_results_sale:"Risultati / Vendita", label_sold_price:"Prezzo vendita", ph_sold_price:"Visibile solo in admin",
  label_investor_count:"Investitori presenti",
  check_mark_sold:"Questo evento chiude la vendita e sposta l\u2019opportunità in Success Stories",
  label_offers_count:"Offerte ricevute", label_closing_days:"Closing giorni",
  section_media:"Media", label_cover:"Copertina evento", label_gallery:"Gallery foto / video",
  label_video_url:"Video esterno / URL", ph_video_url:"YouTube, Vimeo o URL file",
  check_featured:"In evidenza", check_published:"Pubblicato",
  btn_save:"Salva Modifiche", btn_cancel:"Annulla", btn_view_public:"Vedi Pubblico",
  action_delete:"Elimina",
  err_event_id_missing:"ID evento mancante.",
  progress_preparing:"Preparazione salvataggio...", progress_new_cover:"Upload nuova copertina...",
  progress_updating_event:"Aggiornamento evento...", progress_saved:"Modifiche salvate.",
  progress_error:"Errore.", toast_event_updated:"Evento aggiornato correttamente.",
  progress_upload_media_prefix:"Upload media ", progress_upload_media_mid:" di ", progress_upload_media_suffix:"...",
  confirm_delete_media:"Eliminare questo media?",
  default_opportunity_label:"Opportunità"
};

var LANGUAGE_LABELS = { it:"Italiano", en:"English", fr:"Fran\u00e7ais", de:"Deutsch", es:"Espa\u00f1ol", ar:"\u0627\u0644\u0639\u0631\u0628\u064a\u0629" };
var T = UI_STRINGS;

function i18nCacheKey(lang){ return "immonova_i18n_event_edit_" + lang + "_v1"; }

async function loadTranslatedStrings(lang){
  if(lang === "it") return UI_STRINGS;
  var cacheKey = i18nCacheKey(lang);
  try{
    var cached = localStorage.getItem(cacheKey);
    if(cached){ var parsed = JSON.parse(cached); if(parsed && typeof parsed === "object") return parsed; }
  }catch(e){}

  var keys = Object.keys(UI_STRINGS);
  var texts = keys.map(function(k){ return UI_STRINGS[k]; });

  var result = await client.functions.invoke("translate-public-content", {
    body:{
      language: lang,
      source_language: "it",
      context: "IMMONOVA luxury real estate investment website. Admin page for editing an event (party, opening, closing): form fields, media upload, status checkboxes.",
      texts: texts
    }
  });

  if(result.error || !result.data || !result.data.success || !Array.isArray(result.data.translations)){
    console.error("Traduzione event-edit non riuscita, uso italiano come fallback:", result.error || result.data);
    return UI_STRINGS;
  }

  var translations = result.data.translations;
  var translated = {};
  keys.forEach(function(k, i){ translated[k] = translations[i] != null ? translations[i] : UI_STRINGS[k]; });
  try{ localStorage.setItem(cacheKey, JSON.stringify(translated)); }catch(e){}
  return translated;
}

function renderTranslatedStaticText(){
  document.querySelectorAll("[data-i18n]").forEach(function(el){
    var key = el.getAttribute("data-i18n");
    if(T[key]) el.textContent = T[key];
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(function(el){
    var key = el.getAttribute("data-i18n-placeholder");
    if(T[key]) el.setAttribute("placeholder", T[key]);
  });
}

async function applyLanguage(lang){
  currentUserLanguage = lang || "it";
  document.documentElement.lang = currentUserLanguage;
  T = await loadTranslatedStrings(currentUserLanguage);
  renderTranslatedStaticText();
}

async function loadUserLanguage(){
  var result = await client.from("profiles").select("id,language").eq("id", currentUser.id).single();

  if(result.error){
    var looksLikeMissingLanguageColumn = /language/i.test(result.error.message || "") || result.error.code === "42703";
    if(looksLikeMissingLanguageColumn){
      console.warn("Colonna profiles.language non trovata: esegui la migrazione SQL (alter table profiles add column if not exists language text not null default 'it';). Interfaccia mostrata in italiano nel frattempo.");
    }
    await applyLanguage("it");
    return;
  }

  await applyLanguage((result.data && result.data.language) || "it");
}


function eventCanMarkSold(){const type=val("event_type");return ["selling_party","closing_party"].includes(type)}
function updateSoldCheckboxVisibility(){const box=document.getElementById("mark_sold");if(!box)return;const wrap=box.closest(".checks");if(!wrap)return;wrap.style.display=eventCanMarkSold()?"flex":"none";if(!eventCanMarkSold())box.checked=false}
async function insertTimeline(opportunityId,eventId,timelineType,title,description,visibility){if(!opportunityId)return;const {error}=await client.from("opportunity_timeline").insert({opportunity_id:Number(opportunityId),event_id:Number(eventId)||null,timeline_type:timelineType,title:title,description:description||null,visibility:visibility||"public"});if(error)console.warn("Timeline non aggiornata:",error.message)}
async function updateOpportunitySaleFromEventEdit(){const opportunityId=val("opportunity_id");const markSold=document.getElementById("mark_sold")?.checked;if(!opportunityId||!markSold||!eventCanMarkSold())return;const now=new Date().toISOString();const {error}=await client.from("opportunities").update({commercial_status:"sold",sold_at:now,sold_event_id:Number(id),updated_at:now}).eq("id",opportunityId);if(error)throw error;await insertTimeline(opportunityId,id,"sold","Investment Completed","Evento marcato come conclusivo della vendita. Opportunità spostata in Success Stories. Prezzo non pubblico.","public")}
async function checkAuth(){const {data:{session},error}=await client.auth.getSession();if(error||!session){location.href='login.html';return false}currentUser=session.user;return true}
async function loadOpportunities(){const {data}=await client.from('opportunities').select('id,title,location').order('created_at',{ascending:false});const sel=document.getElementById('opportunity_id');(data||[]).forEach(o=>{const opt=document.createElement('option');opt.value=o.id;opt.textContent=(o.title||T.default_opportunity_label)+(o.location?' · '+o.location:'');sel.appendChild(opt)})}
async function uploadFile(file,folder){const path=folder+'/'+Date.now()+'-'+Math.random().toString(36).slice(2)+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'-');const {error}=await client.storage.from('immonova-events').upload(path,file,{cacheControl:'3600',upsert:false,contentType:file.type});if(error)throw error;const {data}=client.storage.from('immonova-events').getPublicUrl(path);return data.publicUrl}
function renderMedia(){const box=document.getElementById('mediaPreview');box.innerHTML='';currentMedia.forEach(m=>{const isVideo=(m.media_type==='video')||String(m.mime_type||'').startsWith('video');box.innerHTML+='<div class="media-card">'+(isVideo?'<video controls src="'+esc(m.file_url)+'"></video>':'<img src="'+esc(m.file_url)+'">')+'<button type="button" class="btn secondary" style="width:100%;margin-top:8px;padding:9px;font-size:9px" onclick="deleteMedia('+Number(m.id)+')">'+T.action_delete+'</button></div>'})}
async function loadEvent(){if(!id){setStatus(T.err_event_id_missing,'error');return}const {data,error}=await client.from('immonova_events').select('*, immonova_event_media(*)').eq('id',id).single();if(error){setStatus(error.message,'error');return}currentEvent=data;currentMedia=(data.immonova_event_media||[]).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));setVal('title',data.title);setVal('event_type',data.event_type);setVal('opportunity_id',data.opportunity_id||'');setVal('event_date',data.event_date);setVal('event_time',data.event_time);setVal('venue',data.venue);setVal('location',data.location);setVal('address',data.address);setVal('short_description',data.short_description);setVal('description',data.description);setVal('sold_price',data.sold_price);setVal('investor_count',data.investor_count);setVal('offers_count',data.offers_count);setVal('closing_days',data.closing_days);setVal('video_url',data.video_url);document.getElementById('featured').checked=!!data.featured;document.getElementById('published').checked=!!data.published;updateSoldCheckboxVisibility();if(data.cover_image){const img=document.getElementById('coverPreview');img.src=data.cover_image;img.style.display='block'}renderMedia()}
document.getElementById('event_type').addEventListener('change',updateSoldCheckboxVisibility);
document.getElementById('coverFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const img=document.getElementById('coverPreview');img.src=URL.createObjectURL(f);img.style.display='block'});
document.getElementById('mediaFiles').addEventListener('change',e=>{Array.from(e.target.files||[]).forEach(f=>{const url=URL.createObjectURL(f);const isVideo=f.type.startsWith('video/');document.getElementById('mediaPreview').innerHTML += '<div class="media-card">'+(isVideo?'<video controls src="'+url+'"></video>':'<img src="'+url+'">')+'</div>'})});
window.deleteMedia=async(mid)=>{if(!confirm(T.confirm_delete_media))return;const {error}=await client.from('immonova_event_media').delete().eq('id',mid);if(error){alert(error.message);return}currentMedia=currentMedia.filter(m=>Number(m.id)!==Number(mid));renderMedia()};
document.getElementById('eventForm').addEventListener('submit',async e=>{e.preventDefault();try{saveBtn.disabled=true;progress(5,T.progress_preparing);let cover=currentEvent.cover_image||'';const coverFile=document.getElementById('coverFile').files[0];if(coverFile){progress(18,T.progress_new_cover);cover=await uploadFile(coverFile,'covers')}progress(38,T.progress_updating_event);const payload={title:val('title'),event_type:val('event_type'),status:document.getElementById('published').checked?'published':'draft',event_date:val('event_date')||null,event_time:val('event_time')||null,location:val('location')||null,venue:val('venue')||null,address:val('address')||null,description:val('description')||null,short_description:val('short_description')||null,opportunity_id:val('opportunity_id')?Number(val('opportunity_id')):null,cover_image:cover||null,video_url:val('video_url')||null,sold_price:val('sold_price')||null,investor_count:num('investor_count'),offers_count:num('offers_count'),closing_days:num('closing_days'),featured:document.getElementById('featured').checked,published:document.getElementById('published').checked};const {error}=await client.from('immonova_events').update(payload).eq('id',id);if(error)throw error;await updateOpportunitySaleFromEventEdit();const files=Array.from(document.getElementById('mediaFiles').files||[]);for(let i=0;i<files.length;i++){progress(45+Math.round((i/Math.max(files.length,1))*45),T.progress_upload_media_prefix+(i+1)+T.progress_upload_media_mid+files.length+T.progress_upload_media_suffix);const url=await uploadFile(files[i],'events/'+id);const {data:mediaRow,error:mediaErr}=await client.from('immonova_event_media').insert({event_id:Number(id),media_type:files[i].type.startsWith('video/')?'video':'image',file_url:url,file_name:files[i].name,mime_type:files[i].type,sort_order:currentMedia.length+i}).select().single();if(mediaErr)throw mediaErr;currentMedia.push(mediaRow)}progress(100,T.progress_saved);setStatus(T.toast_event_updated,'success');document.getElementById('mediaFiles').value='';await loadEvent()}catch(err){console.error(err);setStatus(err.message,'error');progress(100,T.progress_error)}finally{saveBtn.disabled=false}});
document.getElementById('logoutBtn').addEventListener('click',async()=>{await client.auth.signOut();location.href='../index.html'});(async()=>{if(await checkAuth()){await loadUserLanguage();await loadOpportunities();await loadEvent()}})();
</script></body></html>
