<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modifica Opportunità | IMMONOVA Admin</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
  color:#7f6430;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.30;
}

.page{
  max-width:980px;
  margin:0 auto;
  padding:42px 24px 80px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:50px;
}

.logo{
  font-size:24px;
  font-weight:300;
  letter-spacing:.35em;
  color:#a58139;
}

.nav{
  display:flex;
  gap:14px;
}

.nav a,
.nav button{
  padding:11px 20px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  backdrop-filter:blur(8px);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:10px;
  font-weight:500;
  letter-spacing:.18em;
  cursor:pointer;
}

.panel{
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.08);
  padding:44px;
}

h1{
  font-size:36px;
  font-weight:200;
  letter-spacing:.08em;
  color:#a58139;
  margin-bottom:10px;
  text-transform:uppercase;
}

.intro{
  font-size:14px;
  line-height:1.8;
  color:#8f7643;
  margin-bottom:36px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.field.full{
  grid-column:1 / -1;
}

label{
  font-size:10px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#a58139;
}

input,
select,
textarea{
  width:100%;
  padding:15px 16px;
  border:1px solid rgba(165,129,57,.25);
  background:rgba(255,252,244,.35);
  color:#7f6430;
  font-size:14px;
  outline:none;
  font-family:inherit;
}

textarea{
  min-height:130px;
  resize:vertical;
}

.checks{
  grid-column:1 / -1;
  display:flex;
  gap:24px;
  margin-top:4px;
}

.check{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:13px;
  color:#8f7643;
}

.check input{
  width:auto;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  margin-top:34px;
}

button.primary,
button.danger,
a.secondary{
  padding:14px 28px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  backdrop-filter:blur(8px);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:11px;
  font-weight:500;
  letter-spacing:.22em;
  cursor:pointer;
}

button.danger{
  color:#9c2f2f;
  border-color:rgba(156,47,47,.35);
}

.status{
  margin-top:20px;
  min-height:20px;
  font-size:13px;
}

.success{color:#4f7f45}
.error{color:#9c2f2f}

.loading{
  padding:40px;
  text-align:center;
  color:#8f7643;
}

@media(max-width:760px){
  .header{
    flex-direction:column;
    gap:22px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .panel{
    padding:30px 22px;
  }

  .actions,
  .checks,
  .nav{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="page">

  <header class="header">
    <div class="logo">IMMONOVA</div>

    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="opportunities.html">Opportunità</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <section class="panel">
    <h1>Modifica Opportunità</h1>
    <p class="intro">
      Aggiorna i dati dell’opportunità, modifica lo stato di pubblicazione o elimina definitivamente il progetto.
    </p>

    <div id="loading" class="loading">Caricamento...</div>

    <form id="opportunityForm" style="display:none;">

      <div class="form-grid">

        <div class="field full">
          <label for="title">Titolo</label>
          <input type="text" id="title" required>
        </div>

        <div class="field">
          <label for="category">Categoria</label>
          <select id="category" required>
            <option value="">Seleziona categoria</option>
            <option value="Ville">Ville</option>
            <option value="Hotel">Hotel</option>
            <option value="Resort">Resort</option>
            <option value="Villaggi">Villaggi</option>
            <option value="Nuove Edificazioni">Nuove Edificazioni</option>
            <option value="Off Market">Off Market</option>
          </select>
        </div>

        <div class="field">
          <label for="investment_type">Tipo Investimento</label>
          <input type="text" id="investment_type" placeholder="Es. Hospitality / Development / Private Asset">
        </div>

        <div class="field">
          <label for="location">Location</label>
          <input type="text" id="location">
        </div>

        <div class="field">
          <label for="price">Prezzo / Valore investimento</label>
          <input type="text" id="price" placeholder="Es. Riservato / € 2.500.000">
        </div>

        <div class="field">
          <label for="cover_image">Immagine copertina URL</label>
          <input type="text" id="cover_image" placeholder="https://...">
        </div>

        <div class="field">
          <label for="bedrooms">Camere</label>
          <input type="number" id="bedrooms">
        </div>

        <div class="field">
          <label for="bathrooms">Bagni</label>
          <input type="number" id="bathrooms">
        </div>

        <div class="field">
          <label for="internal_size">Mq Interni</label>
          <input type="number" id="internal_size">
        </div>

        <div class="field">
          <label for="land_size">Mq Terreno</label>
          <input type="number" id="land_size">
        </div>

        <div class="field">
          <label for="latitude">Latitudine</label>
          <input type="number" step="any" id="latitude">
        </div>

        <div class="field">
          <label for="longitude">Longitudine</label>
          <input type="number" step="any" id="longitude">
        </div>

        <div class="field full">
          <label for="short_description">Descrizione breve</label>
          <textarea id="short_description"></textarea>
        </div>

        <div class="field full">
          <label for="full_description">Descrizione completa</label>
          <textarea id="full_description"></textarea>
        </div>

        <div class="checks">
          <label class="check">
            <input type="checkbox" id="featured">
            In evidenza
          </label>

          <label class="check">
            <input type="checkbox" id="published">
            Pubblicata
          </label>
        </div>

      </div>

      <div class="actions">
        <button type="submit" class="primary" id="saveBtn">Salva Modifiche</button>
        <a href="opportunities.html" class="secondary">Annulla</a>
        <button type="button" class="danger" id="deleteBtn">Elimina</button>
      </div>

      <div id="status" class="status"></div>

    </form>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const form = document.getElementById("opportunityForm");
const loading = document.getElementById("loading");
const statusBox = document.getElementById("status");

function setStatus(message, type){
  statusBox.className = "status " + (type || "");
  statusBox.textContent = message || "";
}

async function checkAuth(){
  const { data:{ session } } = await client.auth.getSession();

  if(!session){
    window.location.href = "login.html";
    return false;
  }

  return true;
}

async function loadOpportunity(){
  if(!id){
    loading.textContent = "Opportunità non selezionata.";
    return;
  }

  const { data, error } = await client
    .from("opportunities")
    .select("*")
    .eq("id", id)
    .single();

  if(error || !data){
    loading.textContent = "Opportunità non trovata.";
    return;
  }

  document.getElementById("title").value = data.title || "";
  document.getElementById("category").value = data.category || "";
  document.getElementById("investment_type").value = data.investment_type || "";
  document.getElementById("location").value = data.location || "";
  document.getElementById("price").value = data.price || "";
  document.getElementById("cover_image").value = data.cover_image || "";
  document.getElementById("bedrooms").value = data.bedrooms || "";
  document.getElementById("bathrooms").value = data.bathrooms || "";
  document.getElementById("internal_size").value = data.internal_size || "";
  document.getElementById("land_size").value = data.land_size || "";
  document.getElementById("latitude").value = data.latitude || "";
  document.getElementById("longitude").value = data.longitude || "";
  document.getElementById("short_description").value = data.short_description || "";
  document.getElementById("full_description").value = data.full_description || "";
  document.getElementById("featured").checked = data.featured === true;
  document.getElementById("published").checked = data.published === true;

  loading.style.display = "none";
  form.style.display = "block";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  setStatus("Salvataggio in corso...", "");

  const payload = {
    title: document.getElementById("title").value.trim(),
    category: document.getElementById("category").value,
    investment_type: document.getElementById("investment_type").value.trim(),
    location: document.getElementById("location").value.trim(),
    price: document.getElementById("price").value.trim(),
    cover_image: document.getElementById("cover_image").value.trim(),
    bedrooms: document.getElementById("bedrooms").value ? Number(document.getElementById("bedrooms").value) : null,
    bathrooms: document.getElementById("bathrooms").value ? Number(document.getElementById("bathrooms").value) : null,
    internal_size: document.getElementById("internal_size").value ? Number(document.getElementById("internal_size").value) : null,
    land_size: document.getElementById("land_size").value ? Number(document.getElementById("land_size").value) : null,
    latitude: document.getElementById("latitude").value ? Number(document.getElementById("latitude").value) : null,
    longitude: document.getElementById("longitude").value ? Number(document.getElementById("longitude").value) : null,
    short_description: document.getElementById("short_description").value.trim(),
    full_description: document.getElementById("full_description").value.trim(),
    featured: document.getElementById("featured").checked,
    published: document.getElementById("published").checked,
    updated_at: new Date().toISOString()
  };

  const { error } = await client
    .from("opportunities")
    .update(payload)
    .eq("id", id);

  if(error){
    setStatus(error.message, "error");
    return;
  }

  setStatus("Modifiche salvate correttamente.", "success");

  setTimeout(() => {
    window.location.href = "opportunities.html";
  }, 900);
});

document.getElementById("deleteBtn").addEventListener("click", async () => {
  const confirmDelete = confirm("Vuoi eliminare definitivamente questa opportunità?");

  if(!confirmDelete){
    return;
  }

  setStatus("Eliminazione in corso...", "");

  const { error } = await client
    .from("opportunities")
    .delete()
    .eq("id", id);

  if(error){
    setStatus(error.message, "error");
    return;
  }

  setStatus("Opportunità eliminata correttamente.", "success");

  setTimeout(() => {
    window.location.href = "opportunities.html";
  }, 900);
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await client.auth.signOut();
  window.location.href = "login.html";
});

(async function init(){
  const isLogged = await checkAuth();

  if(isLogged){
    await loadOpportunity();
  }
})();
</script>

</body>
</html>
