<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuova Opportunità | IMMONOVA Admin</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
  color:#7f6430;
}

.background{
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

.background::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.3;
}

.background::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 30% 20%,rgba(120,90,45,.08),transparent 16%),
    radial-gradient(circle at 66% 70%,rgba(120,90,45,.06),transparent 18%),
    repeating-radial-gradient(circle at center,rgba(120,90,45,.035) 0 1px,transparent 1px 4px);
  opacity:.06;
  mix-blend-mode:multiply;
}

.page{
  position:relative;
  z-index:2;
  max-width:980px;
  margin:0 auto;
  padding:42px 24px 80px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:50px;
}

.logo{
  font-size:24px;
  font-weight:300;
  letter-spacing:.35em;
  color:#a58139;
}

.nav{
  display:flex;
  gap:14px;
}

.nav a,
.nav button{
  padding:11px 20px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  backdrop-filter:blur(8px);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:10px;
  font-weight:500;
  letter-spacing:.18em;
  cursor:pointer;
}

.panel{
  border:1px solid rgba(165,129,57,.18);
  background:rgba(255,255,255,.08);
  padding:44px;
}

h1{
  font-size:36px;
  font-weight:200;
  letter-spacing:.08em;
  color:#a58139;
  margin-bottom:10px;
  text-transform:uppercase;
}

.intro{
  font-size:14px;
  line-height:1.8;
  color:#8f7643;
  margin-bottom:36px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.field.full{
  grid-column:1 / -1;
}

label{
  font-size:10px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#a58139;
}

input,
select,
textarea{
  width:100%;
  padding:15px 16px;
  border:1px solid rgba(165,129,57,.25);
  background:rgba(255,252,244,.35);
  color:#7f6430;
  font-size:14px;
  outline:none;
  font-family:inherit;
}

textarea{
  min-height:130px;
  resize:vertical;
}

.checks{
  grid-column:1 / -1;
  display:flex;
  gap:24px;
  margin-top:4px;
}

.check{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:13px;
  color:#8f7643;
}

.check input{
  width:auto;
}

.actions{
  display:flex;
  gap:14px;
  margin-top:34px;
}

button.primary,
a.secondary{
  padding:14px 28px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  backdrop-filter:blur(8px);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:11px;
  font-weight:500;
  letter-spacing:.22em;
  cursor:pointer;
}

.status{
  margin-top:20px;
  min-height:20px;
  font-size:13px;
}

.success{color:#4f7f45}
.error{color:#9c2f2f}

@media(max-width:760px){
  .header{
    flex-direction:column;
    gap:22px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .panel{
    padding:30px 22px;
  }

  .actions,
  .checks{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="background"></div>

<div class="page">

  <header class="header">
    <div class="logo">IMMONOVA</div>

    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="opportunities.html">Opportunità</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <section class="panel">
    <h1>Nuova Opportunità</h1>
    <p class="intro">
      Inserisci una nuova opportunità di investimento. Potrai salvarla come bozza
      oppure pubblicarla direttamente sul sito.
    </p>

    <form id="opportunityForm">

      <div class="form-grid">

        <div class="field full">
          <label for="title">Titolo</label>
          <input type="text" id="title" required>
        </div>

        <div class="field">
          <label for="category">Categoria</label>
          <select id="category" required>
            <option value="">Seleziona categoria</option>
            <option value="Ville">Ville</option>
            <option value="Hotel">Hotel</option>
            <option value="Resort">Resort</option>
            <option value="Villaggi">Villaggi</option>
            <option value="Nuove Edificazioni">Nuove Edificazioni</option>
            <option value="Off Market">Off Market</option>
          </select>
        </div>

        <div class="field">
          <label for="location">Location</label>
          <input type="text" id="location">
        </div>

        <div class="field">
          <label for="price">Prezzo / Valore investimento</label>
          <input type="text" id="price" placeholder="Es. Riservato / € 2.500.000">
        </div>

        <div class="field">
          <label for="cover_image">Immagine copertina URL</label>
          <input type="text" id="cover_image" placeholder="https://...">
        </div>

        <div class="field full">
          <label for="short_description">Descrizione breve</label>
          <textarea id="short_description"></textarea>
        </div>

        <div class="field full">
          <label for="full_description">Descrizione completa</label>
          <textarea id="full_description"></textarea>
        </div>

        <div class="checks">
          <label class="check">
            <input type="checkbox" id="featured">
            In evidenza
          </label>

          <label class="check">
            <input type="checkbox" id="published">
            Pubblicata
          </label>
        </div>

      </div>

      <div class="actions">
        <button type="submit" class="primary" id="saveBtn">Salva Opportunità</button>
        <a href="dashboard.html" class="secondary">Annulla</a>
      </div>

      <div id="status" class="status"></div>

    </form>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const statusBox = document.getElementById("status");

function slugify(text){
  return text
    .toString()
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\\u0300-\\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

async function checkAuth(){
  const { data:{ session } } = await client.auth.getSession();

  if(!session){
    window.location.href = "login.html";
  }
}

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await client.auth.signOut();
  window.location.href = "login.html";
});

document.getElementById("opportunityForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  statusBox.className = "status";
  statusBox.textContent = "Salvataggio in corso...";

  const title = document.getElementById("title").value.trim();

  const payload = {
    title,
    slug: slugify(title) + "-" + Date.now(),
    category: document.getElementById("category").value,
    location: document.getElementById("location").value.trim(),
    price: document.getElementById("price").value.trim(),
    cover_image: document.getElementById("cover_image").value.trim(),
    short_description: document.getElementById("short_description").value.trim(),
    full_description: document.getElementById("full_description").value.trim(),
    featured: document.getElementById("featured").checked,
    published: document.getElementById("published").checked
  };

  const { error } = await client
    .from("opportunities")
    .insert([payload]);

  if(error){
    statusBox.className = "status error";
    statusBox.textContent = error.message;
    return;
  }

  statusBox.className = "status success";
  statusBox.textContent = "Opportunità salvata correttamente.";

  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 900);
});

checkAuth();
</script>

</body>
</html>
