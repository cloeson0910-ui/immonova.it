<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Richieste | IMMONOVA Admin</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}

body{
background:#f4ecdf;
font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
color:#7f6430;
}

body::before{
content:"";
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
#f4ecdf;
}

body::after{
content:"";
position:fixed;
inset:0;
z-index:-1;
background:
repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
background-size:230px 199px;
opacity:.30;
}

.header{
padding:30px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(166,127,52,.12);
}

.logo{
font-size:24px;
font-weight:300;
letter-spacing:.35em;
color:#a67f34;
}

.header-actions{
display:flex;
gap:12px;
align-items:center;
}

.header-actions a,
.logout{
padding:10px 20px;
border:1px solid rgba(166,127,52,.25);
background:rgba(255,255,255,.25);
cursor:pointer;
color:#a67f34;
text-decoration:none;
font-size:12px;
letter-spacing:.14em;
text-transform:uppercase;
}

.container{
max-width:1400px;
margin:auto;
padding:40px;
}

.title{
font-size:42px;
font-weight:200;
letter-spacing:.05em;
color:#a67f34;
margin-bottom:18px;
}

.subtitle{
font-size:15px;
line-height:1.8;
color:#8f7643;
max-width:760px;
margin-bottom:40px;
}

.table-wrapper{
background:rgba(255,255,255,.18);
backdrop-filter:blur(8px);
border:1px solid rgba(166,127,52,.15);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1180px;
}

th{
text-align:left;
padding:18px;
font-size:11px;
letter-spacing:.18em;
text-transform:uppercase;
border-bottom:1px solid rgba(166,127,52,.15);
white-space:nowrap;
}

td{
padding:18px;
border-bottom:1px solid rgba(166,127,52,.08);
vertical-align:top;
font-size:14px;
line-height:1.6;
}

.message{
max-width:340px;
white-space:pre-wrap;
}

select{
padding:10px 14px;
border:1px solid rgba(166,127,52,.25);
background:rgba(255,255,255,.25);
color:#a67f34;
font-size:11px;
letter-spacing:.12em;
text-transform:uppercase;
outline:none;
}

.badge{
display:inline-block;
padding:7px 10px;
border:1px solid rgba(166,127,52,.25);
font-size:10px;
letter-spacing:.14em;
text-transform:uppercase;
color:#a67f34;
background:rgba(255,255,255,.22);
}

.empty{
padding:40px;
text-align:center;
opacity:.7;
}

.status-message{
margin-bottom:18px;
font-size:13px;
min-height:18px;
}

.success{color:#4f7f45}
.error{color:#9c2f2f}

@media(max-width:900px){
.header{flex-direction:column;gap:18px}
.header-actions{flex-wrap:wrap;justify-content:center}
}

@media(max-width:600px){
.container{padding:20px}
}
</style>
</head>

<body>

<header class="header">
<div class="logo">IMMONOVA</div>

<div class="header-actions">
<a href="dashboard.html" data-i18n="nav_dashboard">Dashboard</a>
<a href="opportunity-form.html" data-i18n="nav_new_opportunity">Nuova Opportunità</a>
<a href="opportunities.html" data-i18n="nav_opportunities">Opportunità</a>
<button class="logout" id="logoutBtn" data-i18n="logout">Logout</button>
</div>
</header>

<div class="container">

<h1 class="title" data-i18n="title">Richieste</h1>

<p class="subtitle" data-i18n="subtitle">
Gestisci tutte le richieste ricevute dai clienti e aggiorna lo stato commerciale.
</p>

<div id="statusMessage" class="status-message"></div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th data-i18n="th_date">Data</th>
<th data-i18n="th_client">Cliente</th>
<th data-i18n="th_email">Email</th>
<th data-i18n="th_phone">Telefono</th>
<th data-i18n="th_opportunity">Opportunità</th>
<th data-i18n="th_category">Categoria</th>
<th data-i18n="th_message">Messaggio</th>
<th data-i18n="th_status">Stato</th>
</tr>
</thead>

<tbody id="inquiriesTable">
<tr>
<td colspan="8" class="empty" data-i18n="loading">Caricamento...</td>
</tr>
</tbody>
</table>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const table = document.getElementById("inquiriesTable");
const statusMessage = document.getElementById("statusMessage");
let currentUser = null;
let currentUserLanguage = "it";

/* ---- i18n: stesso meccanismo delle altre pagine admin (vedi users.html). checkAuth() qui
   non caricava un profilo (solo verifica sessione); ora salva anche currentUser cosi
   loadUserLanguage() puo' leggere profiles.language dopo il login. ---- */
var UI_STRINGS = {
  nav_dashboard:"Dashboard", nav_new_opportunity:"Nuova Opportunità", nav_opportunities:"Opportunità", logout:"Logout",
  title:"Richieste",
  subtitle:"Gestisci tutte le richieste ricevute dai clienti e aggiorna lo stato commerciale.",
  th_date:"Data", th_client:"Cliente", th_email:"Email", th_phone:"Telefono",
  th_opportunity:"Opportunità", th_category:"Categoria", th_message:"Messaggio", th_status:"Stato",
  loading:"Caricamento...", loading_error:"Errore nel caricamento delle richieste.",
  empty_none:"Nessuna richiesta presente.",
  status_pending:"Pending", status_evasa:"Evasa", status_trattativa:"Trattativa",
  msg_updating:"Aggiornamento stato...", msg_updated:"Stato aggiornato correttamente."
};

var LANGUAGE_LABELS = { it:"Italiano", en:"English", fr:"Fran\u00e7ais", de:"Deutsch", es:"Espa\u00f1ol", ar:"\u0627\u0644\u0639\u0631\u0628\u064a\u0629" };
var T = UI_STRINGS;

function i18nCacheKey(lang){ return "immonova_i18n_inquiries_" + lang + "_v1"; }

async function loadTranslatedStrings(lang){
  if(lang === "it") return UI_STRINGS;
  var cacheKey = i18nCacheKey(lang);
  try{
    var cached = localStorage.getItem(cacheKey);
    if(cached){ var parsed = JSON.parse(cached); if(parsed && typeof parsed === "object") return parsed; }
  }catch(e){}

  var keys = Object.keys(UI_STRINGS);
  var texts = keys.map(function(k){ return UI_STRINGS[k]; });

  var result = await client.functions.invoke("translate-public-content", {
    body:{
      language: lang,
      source_language: "it",
      context: "IMMONOVA luxury real estate investment website. Admin page listing customer inquiries: table headers, status dropdown, status messages.",
      texts: texts
    }
  });

  if(result.error || !result.data || !result.data.success || !Array.isArray(result.data.translations)){
    console.error("Traduzione inquiries non riuscita, uso italiano come fallback:", result.error || result.data);
    return UI_STRINGS;
  }

  var translations = result.data.translations;
  var translated = {};
  keys.forEach(function(k, i){ translated[k] = translations[i] != null ? translations[i] : UI_STRINGS[k]; });
  try{ localStorage.setItem(cacheKey, JSON.stringify(translated)); }catch(e){}
  return translated;
}

function renderTranslatedStaticText(){
  document.querySelectorAll("[data-i18n]").forEach(function(el){
    var key = el.getAttribute("data-i18n");
    if(T[key]) el.textContent = T[key];
  });
}

async function applyLanguage(lang){
  currentUserLanguage = lang || "it";
  document.documentElement.lang = currentUserLanguage;
  T = await loadTranslatedStrings(currentUserLanguage);
  renderTranslatedStaticText();
}

async function loadUserLanguage(){
  if(!currentUser) return;
  var result = await client.from("profiles").select("id,language").eq("id", currentUser.id).single();

  if(result.error){
    var looksLikeMissingLanguageColumn = /language/i.test(result.error.message || "") || result.error.code === "42703";
    if(looksLikeMissingLanguageColumn){
      console.warn("Colonna profiles.language non trovata: esegui la migrazione SQL (alter table profiles add column if not exists language text not null default 'it';). Interfaccia mostrata in italiano nel frattempo.");
    }
    await applyLanguage("it");
    return;
  }

  await applyLanguage((result.data && result.data.language) || "it");
}


async function checkAuth(){
  const { data:{ session } } = await client.auth.getSession();

  if(!session){
    window.location.href = "login.html";
    return false;
  }

  currentUser = session.user;
  return true;
}

function formatDate(value){
  if(!value) return "";
  const date = new Date(value);

  return date.toLocaleDateString(currentUserLanguage === "it" ? "it-IT" : currentUserLanguage, {
    day:"2-digit",
    month:"2-digit",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function extractOpportunity(message){
  if(!message) return "";
  const match = message.match(/Opportunity:\s*(.*?)\s*\|/);
  return match ? match[1] : "";
}

function extractCategory(message){
  if(!message) return "";
  const match = message.match(/Category:\s*(.*?)\s*\|/);
  return match ? match[1] : "";
}

function cleanMessage(message){
  if(!message) return "";

  return message
    .replace(/Opportunity:\s*(.*?)\s*\|\s*/,"")
    .replace(/Category:\s*(.*?)\s*\|\s*/,"")
    .replace(/Location:\s*(.*?)\s*\|\s*/,"")
    .replace(/Message:\s*/,"")
    .trim();
}

async function loadInquiries(){
  const { data, error } = await client
    .from("inquiries")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    table.innerHTML = `
      <tr>
        <td colspan="8" class="empty">
          ${T.loading_error}
        </td>
      </tr>
    `;
    return;
  }

  if(!data || data.length === 0){
    table.innerHTML = `
      <tr>
        <td colspan="8" class="empty">
          ${T.empty_none}
        </td>
      </tr>
    `;
    return;
  }

  table.innerHTML = data.map(i => {
    const opportunity = extractOpportunity(i.message);
    const category = extractCategory(i.message);
    const message = cleanMessage(i.message);
    const currentStatus = i.status || "pending";

    return `
      <tr>
        <td>${formatDate(i.created_at)}</td>
        <td>${i.name || ""}</td>
        <td>${i.email || ""}</td>
        <td>${i.phone || ""}</td>
        <td>${opportunity || "—"}</td>
        <td>${category ? `<span class="badge">${category}</span>` : "—"}</td>
        <td class="message">${message || ""}</td>
        <td>
          <select onchange="updateInquiryStatus(${i.id}, this.value)">
            <option value="pending" ${currentStatus === "pending" ? "selected" : ""}>${T.status_pending}</option>
            <option value="evasa" ${currentStatus === "evasa" ? "selected" : ""}>${T.status_evasa}</option>
            <option value="trattativa" ${currentStatus === "trattativa" ? "selected" : ""}>${T.status_trattativa}</option>
          </select>
        </td>
      </tr>
    `;
  }).join("");
}

async function updateInquiryStatus(id, status){
  statusMessage.className = "status-message";
  statusMessage.textContent = T.msg_updating;

  const { error } = await client
    .from("inquiries")
    .update({ status })
    .eq("id", id);

  if(error){
    statusMessage.className = "status-message error";
    statusMessage.textContent = error.message;
    return;
  }

  statusMessage.className = "status-message success";
  statusMessage.textContent = T.msg_updated;
}

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await client.auth.signOut();
  window.location.href = "login.html";
});

(async function init(){
  const isLogged = await checkAuth();

  if(isLogged){
    await loadUserLanguage();
    await loadInquiries();
  }
})();
</script>

</body>
</html>
