ext-transform:uppercase;color:#9a793c;margin-bottom:14px}.title{font-size:44px;font-weight:200;letter-spacing:.07em;color:#a67f34;margin-bottom:20px}.subtitle{max-width:820px;font-size:15px;line-height:1.8;color:#8f7643;margin-bottom:30px}.toolbar{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:26px}.search,.filter{padding:14px 16px;border:1px solid rgba(166,127,52,.22);background:rgba(255,255,255,.25);color:#7f6430;outline:none}.search{min-width:320px;flex:1}.filter{min-width:210px}.btn{padding:14px 22px;border:1px solid #a67f34;background:#a67f34;color:white;text-decoration:none;letter-spacing:.17em;text-transform:uppercase;font-size:11px;cursor:pointer}.btn.secondary{background:transparent;color:#a67f34}.table-wrapper{background:rgba(255,255,255,.22);backdrop-filter:blur(8px);border:1px solid rgba(166,127,52,.15);overflow:auto;box-shadow:0 24px 70px rgba(127,100,48,.07)}table{width:100%;border-collapse:collapse;min-width:1120px}th{text-align:left;padding:18px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;border-bottom:1px solid rgba(166,127,52,.15);white-space:nowrap}td{padding:18px;border-bottom:1px solid rgba(166,127,52,.08);vertical-align:middle;font-size:14px;line-height:1.6}.thumb{width:92px;height:62px;object-fit:cover;border:1px solid rgba(166,127,52,.16);background:rgba(166,127,52,.08)}.badge{display:inline-block;padding:7px 10px;border:1px solid rgba(166,127,52,.25);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#a67f34;background:rgba(255,255,255,.22);white-space:nowrap}.badge.sold_party,.badge.sold_event{background:rgba(72,118,72,.12);color:#517a4f}.badge.selling_party{background:rgba(166,127,52,.14);color:#8a682c}.badge.upcoming_party{background:rgba(60,90,130,.10);color:#4f6380}.badge.past_party{background:rgba(150,92,35,.10);color:#8f5b28}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions a,.actions button{padding:9px 12px;border:1px solid rgba(166,127,52,.25);background:rgba(255,255,255,.25);cursor:pointer;color:#a67f34;text-decoration:none;font-size:10px;letter-spacing:.12em;text-transform:uppercase}.actions .danger{color:#9c2f2f;border-color:rgba(156,47,47,.35)}.status{margin-bottom:18px;min-height:20px;font-size:13px}.error{color:#9c2f2f}.success{color:#4f7f45}.empty{padding:40px;text-align:center;opacity:.7}@media(max-width:760px){.header{flex-direction:column;gap:18px}.logo{align-items:center}.logo-svg{width:250px}.container{padding:32px 22px}.search,.filter{min-width:100%}}
</style>

<main class="container"><div class="kicker">Area Admin</div><h1 class="title">Eventi</h1><p class="subtitle">Gestisci eventi conclusi, opportunità vendute, selling party e party in programma con foto, video e collegamento alle opportunità.</p><div id="status" class="status"></div><div class="toolbar"><input id="searchInput" class="search" placeholder="Cerca per titolo, location, tipo evento..."><select id="typeFilter" class="filter"><option value="">Tutti i tipi</option><option value="sold_party">Sold Party</option><option value="past_party">Party avvenuti</option><option value="upcoming_party">Party in programma</option><option value="selling_party">Selling Party</option></select><select id="publishedFilter" class="filter"><option value="">Pubblicati e bozze</option><option value="true">Pubblicati</option><option value="false">Bozze</option></select><a class="btn" href="event-form.html">Nuovo Evento</a><a class="btn secondary" href="../events.html" target="_blank">Vedi Pubblico</a></div><div class="table-wrapper"><table><thead><tr><th>Media</th><th>Titolo</th><th>Tipo</th><th>Data</th><th>Location</th><th>Pubblicato</th><th>Azioni</th></tr></thead><tbody id="eventsTable"><tr><td colspan="7" class="empty">Caricamento...</td></tr></tbody></table></div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../js/config.js"></script><script>
const client=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);const table=document.getElementById('eventsTable');const statusBox=document.getElementById('status');let allEvents=[];const labels={sold_party:'Sold Party',sold_event:'Sold Party',past_party:'Party avvenuto',upcoming_party:'Party in programma',selling_party:'Selling Party'};
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function setStatus(m,t){statusBox.className='status '+(t||'');statusBox.textContent=m||''}function fmtDate(v){if(!v)return '-';return new Date(v+'T12:00:00').toLocaleDateString('it-IT')}async function checkAuth(){const {data:{session},error}=await client.auth.getSession();if(error||!session){location.href='login.html';return false}return true}
async function load(){const {data,error}=await client.from('immonova_events').select('*, immonova_event_media(*)').order('created_at',{ascending:false});if(error){console.error(error);table.innerHTML='<tr><td colspan="7" class="empty">Errore caricamento.</td></tr>';setStatus(error.message,'error');return}allEvents=data||[];render()}
function render(){const q=document.getElementById('searchInput').value.trim().toLowerCase();const type=document.getElementById('typeFilter').value;const pub=document.getElementById('publishedFilter').value;let rows=allEvents.filter(e=>{const m=[e.title,e.location,e.venue,e.event_type,labels[e.event_type]].some(v=>String(v||'').toLowerCase().includes(q));const mt=!type||e.event_type===type||(type==='sold_party'&&e.event_type==='sold_event');const mp=pub===''||String(e.published)===pub;return m&&mt&&mp});if(!rows.length){table.innerHTML='<tr><td colspan="7" class="empty">Nessun evento presente.</td></tr>';return}table.innerHTML=rows.map(e=>'<tr><td>'+(e.cover_image?'<img class="thumb" src="'+esc(e.cover_image)+'">':'<div class="thumb"></div>')+'</td><td><strong>'+esc(e.title)+'</strong><br><small>'+esc(e.short_description||'')+'</small></td><td><span class="badge '+esc(e.event_type)+'">'+esc(labels[e.event_type]||e.event_type)+'</span></td><td>'+esc(fmtDate(e.event_date))+'</td><td>'+esc(e.location||e.venue||'')+'</td><td>'+(e.published?'Sì':'No')+'</td><td><div class="actions"><a href="event-edit.html?id='+encodeURIComponent(e.id)+'">Modifica</a><button onclick="togglePublish('+Number(e.id)+','+(!e.published)+')">'+(e.published?'Sospendi':'Pubblica')+'</button><button class="danger" onclick="deleteEvent('+Number(e.id)+')">Elimina</button></div></td></tr>').join('')}
window.togglePublish=async(id,value)=>{const {error}=await client.from('immonova_events').update({published:value}).eq('id',id);if(error){alert(error.message);return}await load()};window.deleteEvent=async(id)=>{if(!confirm('Eliminare evento?'))return;const {error}=await client.from('immonova_events').delete().eq('id',id);if(error){alert(error.message);return}await load()};
document.getElementById('searchInput').addEventListener('input',render);document.getElementById('typeFilter').addEventListener('change',render);document.getElementById('publishedFilter').addEventListener('change',render);document.getElementById('logoutBtn').addEventListener('click',async()=>{await client.auth.signOut();location.href='../index.html'});(async()=>{if(await checkAuth())await load()})();
</script></body></html>
