<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
background:#f4ecdf;
font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;

}

body::before{
content:"";
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
#f4ecdf;
}

body::after{
content:"";
position:fixed;
inset:0;
z-index:-1;
background:
repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
background-size:230px 199px;
opacity:.30;
}

.header{
padding:30px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(166,127,52,.12);
background:rgba(244,236,223,.72);
backdrop-filter:blur(14px);

top:0;
z-index:10;
}

.logo{
text-decoration:none;
color:#a67f34;
}

.logo-main{
font-size:24px;
font-weight:600;

}

.logo-sub{
margin-top:6px;

}

.header-actions{
display:flex;
gap:12px;
align-items:center;
flex-wrap:wrap;
}

.header-actions a,
.logout{
padding:10px 20px;
border:1px solid rgba(166,127,52,.25);
background:rgba(255,255,255,.25);
cursor:pointer;

text-decoration:none;
font-size:12px;
letter-spacing:.14em;
text-transform:uppercase;
}

.header-actions a:hover,
.logout:hover{

}

.admin-only{

}

.container{

padding:40px;
}

.kicker{
font-size:11px;
letter-spacing:.32em;
text-transform:uppercase;
color:#9a793c;
margin-bottom:12px;
}

.title{
font-size:42px;
font-weight:200;
letter-spacing:.05em;
color:#a67f34;

}

.subtitle{
font-size:15px;
line-height:1.8;
color:#8f7643;

}

.toolbar{

gap:14px;

.search,

th{

td{

border:1px solid rgba(166,127,52,.25);

}

.badge.da_verificare{background:rgba(166,127,52,.12);color:#8a682c}
.badge.da_revisionare{background:rgba(150,92,35,.12);color:#8f5b28}
.badge.approvato{background:rgba(72,118,72,.12);color:#517a4f}
.badge.rifiutato{background:rgba(130,45,38,.10);color:#8f3f2d}

.published{

}

.not-published{

.actions{

gap:8px;

}

.actions a,
.actions button,

border:1px solid rgba(166,127,52,.25);

}

.actions button:disabled{

}

.empty{

margin-bottom:22px;

}

.docs-pill{
  display:inline-flex;

  padding:8px 10px;

}

.commercial-badge{
  display:inline-block;

  border:1px solid rgba(166,127,52,.25);
  font-size:10px;
  letter-spacing:.14em;
  text-transform:uppercase;
  white-space:nowrap;
  background:rgba(255,255,255,.22);
  color:#a67f34;
}

.commercial-badge.available{
  color:#4f7f45;
  border-color:rgba(79,127,69,.34);
  background:rgba(79,127,69,.08);
}

.commercial-badge.under_negotiation{
  color:#8f5b28;
  border-color:rgba(143,91,40,.34);
  background:rgba(143,91,40,.08);
}

.commercial-badge.reserved{
  color:#5f6f92;
  border-color:rgba(95,111,146,.34);
  background:rgba(95,111,146,.08);
}

.commercial-badge.sold{
  color:#1f1a12;
  border-color:rgba(166,127,52,.55);
  background:linear-gradient(135deg,rgba(166,127,52,.24),rgba(255,255,255,.28));
}

.commercial-badge.withdrawn{
  color:#9c2f2f;
  border-color:rgba(156,47,47,.35);
  background:rgba(156,47,47,.07);
}

.linked-events{
  margin-top:8px;
  max-width:260px;
}

.event-chip{
  display:inline-block;
  margin:4px 4px 0 0;
  padding:6px 8px;
  border:1px solid rgba(166,127,52,.20);
  background:rgba(255,255,255,.20);
  color:#8f7643;
  font-size:9px;
  letter-spacing:.10em;
  text-transform:uppercase;
  white-space:nowrap;
}

.event-chip.selling_party,
.event-chip.closing_party{
  color:#a67f34;
  border-color:rgba(166,127,52,.38);
  background:rgba(166,127,52,.08);
}

.event-link{
  display:inline-block;
  margin-top:6px;
  color:#a67f34;
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  text-decoration:none;

flex-direction:column;
gap:18px;

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const table = document.getElementById("opportunitiesTable");
const statusBox = document.getElementById("status");
const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");
const commercialFilter = document.getElementById("commercialFilter");
const roleLabel = document.getElementById("roleLabel");
const subtitle = document.getElementById("subtitle");

let currentUser = null;
let currentProfile = null;
let isAdmin = false;
let allOpportunities = [];
let currentUserLanguage = "it";


const REQUIRED_DOCUMENT_TYPES = [
  "owner_identity",
  "owner_tax_code",
  "deed_of_origin",
  "cadastral_report",
  "cadastral_plan",
  "ape",
  "urban_planning",
  "technical_conformity",
  "habitability",
  "systems_certifications"
];

/* ---- i18n: stesso meccanismo di users.html/dashboard.html. REQUIRED_DOCUMENT_LABELS resta
   fuori dal dizionario tradotto e viene ricostruito da T dopo che la traduzione arriva, così
   il conteggio documenti mancanti parla nella lingua corretta. ---- */
var UI_STRINGS = {
  nav_dashboard:"Dashboard", nav_new_proposal:"Nuova Proposta", nav_inquiries:"Richieste", nav_users:"Utenti", logout:"Logout",
  role_reserved:"Area Riservata", role_admin:"Area Admin", role_user_area:"Area Utente",
  title:"Proposte",
  loading_area:"Caricamento area riservata...",
  subtitle_admin:"Gestisci tutte le proposte ricevute. Puoi valutarle, approvarle, rifiutarle, pubblicarle o sospenderle.",
  subtitle_user:"Qui puoi vedere e gestire solo le tue proposte. La pubblicazione è riservata agli admin IMMONOVA.",
  search_placeholder:"Cerca per titolo, categoria, location o stato...",
  filter_all_review:"Tutti gli stati revisione", filter_all_commercial:"Tutti gli stati commerciali",
  status_da_verificare:"Da verificare", status_da_revisionare:"Da revisionare", status_approvato:"Approvato", status_rifiutato:"Rifiutato",
  commercial_available:"Disponibile", commercial_negotiation:"In trattativa", commercial_reserved:"Riservata",
  commercial_sold:"Venduta", commercial_withdrawn:"Ritirata",
  th_title:"Titolo", th_category:"Categoria", th_location:"Location", th_price:"Prezzo",
  th_review_status:"Stato Revisione", th_commercial:"Commerciale", th_published:"Pubblicata",
  th_documents:"Documenti", th_actions:"Azioni",
  loading:"Caricamento...", loading_error:"Errore nel caricamento.", empty_none:"Nessuna proposta presente.",
  price_reserved:"Valore riservato",
  docs_complete:"Documenti completi", docs_missing_prefix:"Mancano: ",
  sold_on_prefix:"Venduta il ", no_linked_events:"Nessun evento collegato", view_event:"Visualizza evento",
  no_such_link:"", action_view:"Vedi", action_evaluate:"Valuta", action_open:"Apri",
  select_change_review:"Cambia revisione", select_change_commercial:"Cambia commerciale",
  btn_suspend:"Sospendi", btn_publish:"Pubblica", btn_selling_party:"Selling Party", btn_delete:"Elimina",
  msg_updating_review:"Aggiornamento stato revisione...", msg_review_updated:"Stato revisione aggiornato correttamente.",
  msg_updating_commercial:"Aggiornamento stato commerciale...", msg_commercial_updated:"Stato commerciale aggiornato correttamente.",
  confirm_sold:"Confermi che questa opportunità è venduta? Verrà sospesa dalle opportunità pubbliche e comparirà nelle Success Stories.",
  msg_updating_publish:"Aggiornamento pubblicazione...", msg_publish_updated:"Pubblicazione aggiornata correttamente.",
  err_only_admin_publish:"Solo un admin può pubblicare o sospendere una proposta.",
  err_only_approved:"Puoi pubblicare solo una proposta approvata.",
  err_sold_withdrawn_no_publish:"Una proposta venduta o ritirata non può essere pubblicata tra le opportunità disponibili.",
  err_only_admin_delete:"Solo un admin può eliminare una proposta.",
  confirm_delete:"Vuoi eliminare definitivamente questa proposta?",
  msg_deleting:"Eliminazione in corso...", msg_deleted:"Proposta eliminata correttamente.",
  doc_identity:"Identità", doc_tax_code:"Codice fiscale", doc_deed:"Atto provenienza", doc_cadastral_report:"Visura catastale",
  doc_cadastral_plan:"Planimetria", doc_ape:"APE", doc_urban_planning:"Titoli edilizi", doc_technical_conformity:"Conformità",
  doc_habitability:"Agibilità", doc_systems:"Impianti",
  event_selling_party:"Selling Party", event_closing_party:"Closing Party", event_welcome_party:"Welcome Party",
  event_past_party:"Party avvenuto", event_upcoming_party:"Party in programma", event_investor_tour:"Investor Tour",
  event_site_visit:"Site Visit", event_private_dinner:"Private Dinner", event_generic:"Evento"
};

var LANGUAGE_LABELS = { it:"Italiano", en:"English", fr:"Fran\u00e7ais", de:"Deutsch", es:"Espa\u00f1ol", ar:"\u0627\u0644\u0639\u0631\u0628\u064a\u0629" };
var T = UI_STRINGS;

function i18nCacheKey(lang){ return "immonova_i18n_opportunities_" + lang + "_v1"; }

async function loadTranslatedStrings(lang){
  if(lang === "it") return UI_STRINGS;
  var cacheKey = i18nCacheKey(lang);
  try{
    var cached = localStorage.getItem(cacheKey);
    if(cached){ var parsed = JSON.parse(cached); if(parsed && typeof parsed === "object") return parsed; }
  }catch(e){}

  var keys = Object.keys(UI_STRINGS);
  var texts = keys.map(function(k){ return UI_STRINGS[k]; });

  var result = await client.functions.invoke("translate-public-content", {
    body:{
      language: lang,
      source_language: "it",
      context: "IMMONOVA luxury real estate investment website. This is the admin opportunities/proposals management table: navigation, filters, table headers, status badges, action buttons, document checklist labels.",
      texts: texts
    }
  });

  if(result.error || !result.data || !result.data.success || !Array.isArray(result.data.translations)){
    console.error("Traduzione opportunities non riuscita, uso italiano come fallback:", result.error || result.data);
    return UI_STRINGS;
  }

  var translations = result.data.translations;
  var translated = {};
  keys.forEach(function(k, i){ translated[k] = translations[i] != null ? translations[i] : UI_STRINGS[k]; });
  try{ localStorage.setItem(cacheKey, JSON.stringify(translated)); }catch(e){}
  return translated;
}

function renderTranslatedStaticText(){
  document.querySelectorAll("[data-i18n]").forEach(function(el){
    var key = el.getAttribute("data-i18n");
    if(T[key]) el.textContent = T[key];
  });
}

async function applyLanguage(lang){
  currentUserLanguage = lang || "it";
  document.documentElement.lang = currentUserLanguage;
  T = await loadTranslatedStrings(currentUserLanguage);
  renderTranslatedStaticText();
  buildDocumentLabels();
  subtitle.textContent = isAdmin ? T.subtitle_admin : T.subtitle_user;
}

var REQUIRED_DOCUMENT_LABELS = {};
function buildDocumentLabels(){
  REQUIRED_DOCUMENT_LABELS = {
    owner_identity:T.doc_identity, owner_tax_code:T.doc_tax_code, deed_of_origin:T.doc_deed,
    cadastral_report:T.doc_cadastral_report, cadastral_plan:T.doc_cadastral_plan, ape:T.doc_ape,
    urban_planning:T.doc_urban_planning, technical_conformity:T.doc_technical_conformity,
    habitability:T.doc_habitability, systems_certifications:T.doc_systems
  };
}
buildDocumentLabels();


function escapeHTML(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function setStatus(message, type){
  statusBox.className = "status " + (type || "");
  statusBox.textContent = message || "";
}

function statusLabel(status){
  const labels = {
    da_verificare:T.status_da_verificare,
    da_revisionare:T.status_da_revisionare,
    approvato:T.status_approvato,
    rifiutato:T.status_rifiutato
  };

  return labels[status] || T.status_da_verificare;
}

function commercialStatusLabel(status){
  const labels = {
    available:T.commercial_available,
    under_negotiation:T.commercial_negotiation,
    reserved:T.commercial_reserved,
    sold:T.commercial_sold,
    withdrawn:T.commercial_withdrawn
  };

  return labels[status] || T.commercial_available;
}

function eventTypeLabel(type){
  const labels = {
    selling_party:T.event_selling_party,
    closing_party:T.event_closing_party,
    welcome_party:T.event_welcome_party,
    past_party:T.event_past_party,
    upcoming_party:T.event_upcoming_party,
    investor_tour:T.event_investor_tour,
    site_visit:T.event_site_visit,
    private_dinner:T.event_private_dinner
  };

  return labels[type] || type || T.event_generic;
}

function formatPrice(value){
  if(!value){
    return T.price_reserved;
  }

  const number = Number(value);

  if(Number.isNaN(number)){
    return value;
  }

  return new Intl.NumberFormat(currentUserLanguage === "it" ? "it-IT" : currentUserLanguage, {
    style:"currency",
    currency:"EUR",
    maximumFractionDigits:0
  }).format(number);
}

async function checkAuth(){
  const { data:{ session }, error } = await client.auth.getSession();

  if(error || !session){
    window.location.href = "login.html";
    return false;
  }

  currentUser = session.user;
  return true;
}

async function loadProfile(){
  var result = await client
    .from("profiles")
    .select("id,email,full_name,role,language")
    .eq("id", currentUser.id)
    .single();

  if(result.error){
    /* Stesso fix di users.html/dashboard.html: se la colonna "language" non è stata ancora
       migrata su Supabase, non trattare l'errore come fatale -- riprova senza quella colonna. */
    var looksLikeMissingLanguageColumn = /language/i.test(result.error.message || "") || result.error.code === "42703";
    if(looksLikeMissingLanguageColumn){
      console.warn("Colonna profiles.language non trovata: esegui la migrazione SQL. Interfaccia mostrata in italiano nel frattempo.");
      result = await client.from("profiles").select("id,email,full_name,role").eq("id", currentUser.id).single();
    }
  }

  if(result.error){
    console.error(result.error);
    setStatus(T.loading_error, "error");
    return;
  }

  currentProfile = result.data;
  isAdmin = currentProfile.role === "admin";

  await applyLanguage(currentProfile.language || "it");

  roleLabel.textContent = isAdmin ? T.role_admin : T.role_user_area;

  document.querySelectorAll(".admin-only").forEach(el => {
    el.style.display = isAdmin ? "inline-block" : "none";
  });
}

async function loadOpportunities(){
  const { data, error } = await client
    .from("opportunities")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    console.error(error);
    table.innerHTML = `
      <tr>
        <td colspan="9" class="empty">${escapeHTML(T.loading_error)}</td>
      </tr>
    `;
    return;
  }

  allOpportunities = data || [];
  await attachDocumentCounts();
  await attachLinkedEvents();

  applyFilters();
}

async function attachDocumentCounts(){
  const ids = allOpportunities.map(item => item.id).filter(Boolean);

  allOpportunities = allOpportunities.map(item => ({
    ...item,
    documents_loaded_count:0,
    documents_missing_labels:Object.values(REQUIRED_DOCUMENT_LABELS)
  }));

  if(ids.length === 0){
    return;
  }

  const { data, error } = await client
    .from("opportunity_documents")
    .select("opportunity_id, document_type")
    .in("opportunity_id", ids);

  if(error){
    console.error(error);
    return;
  }

  const byOpportunity = {};

  (data || []).forEach(row => {
    if(!byOpportunity[row.opportunity_id]){
      byOpportunity[row.opportunity_id] = new Set();
    }
    if(REQUIRED_DOCUMENT_TYPES.includes(row.document_type)){
      byOpportunity[row.opportunity_id].add(row.document_type);
    }
  });

  allOpportunities = allOpportunities.map(item => {
    const loadedSet = byOpportunity[item.id] || new Set();
    const missing = REQUIRED_DOCUMENT_TYPES.filter(type => !loadedSet.has(type));

    return {
      ...item,
      documents_loaded_count:loadedSet.size,
      documents_missing_labels:missing.map(type => REQUIRED_DOCUMENT_LABELS[type] || type)
    };
  });
}

async function attachLinkedEvents(){
  const ids = allOpportunities.map(item => item.id).filter(Boolean);

  allOpportunities = allOpportunities.map(item => ({
    ...item,
    linked_events:[]
  }));

  if(ids.length === 0){
    return;
  }

  const { data, error } = await client
    .from("immonova_events")
    .select("id, opportunity_id, title, event_type, event_date, published, status, sold_price, investor_count, offers_count, closing_days")
    .in("opportunity_id", ids)
    .order("event_date", { ascending:false });

  if(error){
    console.warn("Eventi collegati non caricati:", error.message);
    return;
  }

  const byOpportunity = {};

  (data || []).forEach(event => {
    if(!byOpportunity[event.opportunity_id]){
      byOpportunity[event.opportunity_id] = [];
    }
    byOpportunity[event.opportunity_id].push(event);
  });

  allOpportunities = allOpportunities.map(item => ({
    ...item,
    linked_events:byOpportunity[item.id] || []
  }));
}

function renderDocumentSummary(item){
  const total = REQUIRED_DOCUMENT_TYPES.length;
  const loaded = item.documents_loaded_count || 0;
  const cls = loaded === total ? "complete" : (loaded <= 3 ? "low" : "");
  const missing = item.documents_missing_labels || [];
  const missingText = missing.length === 0 ? T.docs_complete : T.docs_missing_prefix + missing.slice(0,3).join(", ") + (missing.length > 3 ? "..." : "");

  return `
    <span class="docs-pill ${cls}">${loaded}/${total}</span>
    <div class="docs-mini">${escapeHTML(missingText)}</div>
  `;
}

function renderCommercialStatus(item){
  const commercialStatus = item.commercial_status || "available";
  const label = commercialStatusLabel(commercialStatus);
  const soldDate = item.sold_at ? new Date(item.sold_at).toLocaleDateString(currentUserLanguage === "it" ? "it-IT" : currentUserLanguage) : "";

  return `
    <span class="commercial-badge ${escapeHTML(commercialStatus)}">${escapeHTML(label)}</span>
    ${soldDate ? `<div class="docs-mini">${escapeHTML(T.sold_on_prefix)}${escapeHTML(soldDate)}</div>` : ""}
  `;
}

function renderLinkedEvents(item){
  const events = item.linked_events || [];

  if(events.length === 0){
    return `<div class="docs-mini">${escapeHTML(T.no_linked_events)}</div>`;
  }

  const chips = events.slice(0,4).map(event => `
    <span class="event-chip ${escapeHTML(event.event_type || "")}">
      ${escapeHTML(eventTypeLabel(event.event_type))}
    </span>
  `).join("");

  const firstEvent = events[0];

  return `
    <div class="linked-events">
      ${chips}
      ${events.length > 4 ? `<span class="event-chip">+${events.length - 4}</span>` : ""}
      ${firstEvent ? `<br><a class="event-link" href="event-edit.html?id=${encodeURIComponent(firstEvent.id)}">${escapeHTML(T.view_event)}</a>` : ""}
    </div>
  `;
}

function applyFilters(){
  const query = searchInput.value.trim().toLowerCase();
  const selectedStatus = statusFilter.value;
  const selectedCommercialStatus = commercialFilter.value;

  let filtered = allOpportunities.filter(item => {
    const status = item.review_status || "da_verificare";

    const commercialStatus = item.commercial_status || "available";

    const matchesStatus = !selectedStatus || status === selectedStatus;
    const matchesCommercialStatus = !selectedCommercialStatus || commercialStatus === selectedCommercialStatus;

    const eventSearch = (item.linked_events || [])
      .map(event => [event.title, event.event_type, eventTypeLabel(event.event_type)].join(" "))
      .join(" ");

    const matchesSearch = [
      item.title,
      item.category,
      item.location,
      item.price,
      status,
      statusLabel(status),
      commercialStatus,
      commercialStatusLabel(commercialStatus),
      eventSearch
    ].some(value => String(value || "").toLowerCase().includes(query));

    return matchesStatus && matchesCommercialStatus && matchesSearch;
  });

  renderTable(filtered);
}

function renderTable(data){
  if(!data || data.length === 0){
    table.innerHTML = `
      <tr>
        <td colspan="9" class="empty">${escapeHTML(T.empty_none)}</td>
      </tr>
    `;
    return;
  }

  table.innerHTML = data.map(item => {
    const reviewStatus = item.review_status || "da_verificare";
    const commercialStatus = item.commercial_status || "available";
    const canPublish = isAdmin && reviewStatus === "approvato" && commercialStatus !== "sold" && commercialStatus !== "withdrawn";

    return `
      <tr>
        <td>${escapeHTML(item.title || "")}${renderLinkedEvents(item)}</td>
        <td><span class="badge">${escapeHTML(item.category || "")}</span></td>
        <td>${escapeHTML(item.location || "")}</td>
        <td>${escapeHTML(formatPrice(item.price))}</td>

        <td>
          <span class="badge ${escapeHTML(reviewStatus)}">
            ${statusLabel(reviewStatus)}
          </span>
        </td>

        <td>
          ${renderCommercialStatus(item)}
        </td>

        <td class="${item.published ? "published" : "not-published"}">
          ${item.published ? "S\u00ec" : "No"}
        </td>

        <td>
          ${renderDocumentSummary(item)}
        </td>

        <td>
          <div class="actions">

            ${item.published ? `
              <a href="../opportunity.html?id=${encodeURIComponent(item.id)}" target="_blank">
                ${escapeHTML(T.action_view)}
              </a>
            ` : ""}

            <a href="opportunity-edit.html?id=${encodeURIComponent(item.id)}">
              ${isAdmin ? escapeHTML(T.action_evaluate) : escapeHTML(T.action_open)}
            </a>

            ${isAdmin ? `
              <select onchange="changeReviewStatus('${item.id}', this.value)">
                <option value="">${escapeHTML(T.select_change_review)}</option>
                <option value="da_verificare">${escapeHTML(T.status_da_verificare)}</option>
                <option value="da_revisionare">${escapeHTML(T.status_da_revisionare)}</option>
                <option value="approvato">${escapeHTML(T.status_approvato)}</option>
                <option value="rifiutato">${escapeHTML(T.status_rifiutato)}</option>
              </select>

              <select onchange="changeCommercialStatus('${item.id}', this.value)">
                <option value="">${escapeHTML(T.select_change_commercial)}</option>
                <option value="available">${escapeHTML(T.commercial_available)}</option>
                <option value="under_negotiation">${escapeHTML(T.commercial_negotiation)}</option>
                <option value="reserved">${escapeHTML(T.commercial_reserved)}</option>
                <option value="sold">${escapeHTML(T.commercial_sold)}</option>
                <option value="withdrawn">${escapeHTML(T.commercial_withdrawn)}</option>
              </select>

              <button onclick="togglePublished('${item.id}', ${item.published}, '${reviewStatus}', '${commercialStatus}')" ${!canPublish && !item.published ? "disabled" : ""}>
                ${item.published ? escapeHTML(T.btn_suspend) : escapeHTML(T.btn_publish)}
              </button>

              <a href="event-form.html?opportunity_id=${encodeURIComponent(item.id)}&event_type=selling_party">
                ${escapeHTML(T.btn_selling_party)}
              </a>

              <button class="danger" onclick="deleteOpportunity('${item.id}')">
                ${escapeHTML(T.btn_delete)}
              </button>
            ` : ""}

          </div>
        </td>
      </tr>
    `;
  }).join("");
}

async function changeReviewStatus(id, newStatus){
  if(!newStatus || !isAdmin){
    return;
  }

  setStatus(T.msg_updating_review, "");

  const updateData = {
    review_status:newStatus,
    reviewed_at:new Date().toISOString(),
    reviewed_by:currentUser.id
  };

  if(newStatus !== "approvato"){
    updateData.published = false;
  }

  const { error } = await client
    .from("opportunities")
    .update(updateData)
    .eq("id", id);

  if(error){
    setStatus(error.message, "error");
    return;
  }

  setStatus(T.msg_review_updated, "success");
  await loadOpportunities();
}

async function changeCommercialStatus(id, newStatus){
  if(!newStatus || !isAdmin){
    return;
  }

  const confirmSold = newStatus === "sold"
    ? confirm(T.confirm_sold)
    : true;

  if(!confirmSold){
    return;
  }

  setStatus(T.msg_updating_commercial, "");

  const now = new Date().toISOString();

  const updateData = {
    commercial_status:newStatus,
    updated_at:now
  };

  if(newStatus === "sold"){
    updateData.sold_at = now;
    updateData.published = false;
  }

  if(newStatus === "reserved"){
    updateData.reserved_at = now;
  }

  if(newStatus === "withdrawn"){
    updateData.withdrawn_at = now;
    updateData.published = false;
  }

  if(newStatus === "available" || newStatus === "under_negotiation"){
    updateData.sold_at = null;
    updateData.withdrawn_at = null;
  }

  const { error } = await client
    .from("opportunities")
    .update(updateData)
    .eq("id", id);

  if(error){
    setStatus(error.message, "error");
    return;
  }

  if(newStatus === "sold"){
    await client.from("opportunity_timeline").insert({
      opportunity_id:Number(id),
      timeline_type:"sold",
      title:"Venduta",
      description:"Opportunità segnata come venduta da admin. Il prezzo resta riservato.",
      visibility:"public"
    });
  }

  setStatus(T.msg_commercial_updated, "success");
  await loadOpportunities();
}

async function togglePublished(id, currentStatus, reviewStatus, commercialStatus){
  if(!isAdmin){
    setStatus(T.err_only_admin_publish, "error");
    return;
  }

  if(!currentStatus && reviewStatus !== "approvato"){
    setStatus(T.err_only_approved, "error");
    return;
  }

  if(!currentStatus && (commercialStatus === "sold" || commercialStatus === "withdrawn")){
    setStatus(T.err_sold_withdrawn_no_publish, "error");
    return;
  }

  setStatus(T.msg_updating_publish, "");

  const { error } = await client
    .from("opportunities")
    .update({
      published:!currentStatus,
      updated_at:new Date().toISOString()
    })
    .eq("id", id);

  if(error){
    setStatus(error.message, "error");
    return;
  }

  setStatus(T.msg_publish_updated, "success");
  await loadOpportunities();
}

async function deleteOpportunity(id){
  if(!isAdmin){
    setStatus(T.err_only_admin_delete, "error");
    return;
  }

  const confirmDelete = confirm(T.confirm_delete);

  if(!confirmDelete){
    return;
  }

  setStatus(T.msg_deleting, "");

  const { error } = await client
    .from("opportunities")
    .delete()
    .eq("id", id);

  if(error){
    setStatus(error.message, "error");
    return;
  }

  setStatus(T.msg_deleted, "success");
  await loadOpportunities();
}

searchInput.addEventListener("input", applyFilters);
statusFilter.addEventListener("change", applyFilters);
commercialFilter.addEventListener("change", applyFilters);

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await client.auth.signOut();
  window.location.href = "../index.html";
});

(async function init(){
  const isLogged = await checkAuth();

  if(isLogged){
    await loadProfile();

    const params = new URLSearchParams(window.location.search);
    const statusParam = params.get("status");

    if(statusParam){
      statusFilter.value = statusParam;
    }

    await loadOpportunities();
  }
})();
</script>
