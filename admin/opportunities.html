<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestisci Proposte | IMMONOVA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
background:#f4ecdf;
font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
color:#7f6430;
}

body::before{
content:"";
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
#f4ecdf;
}

body::after{
content:"";
position:fixed;
inset:0;
z-index:-1;
background:
repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
background-size:230px 199px;
opacity:.30;
}

.header{
padding:30px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(166,127,52,.12);
background:rgba(244,236,223,.72);
backdrop-filter:blur(14px);
position:sticky;
top:0;
z-index:10;
}

.logo{
text-decoration:none;
color:#a67f34;
}

.logo-main{
font-size:24px;
font-weight:600;
letter-spacing:.35em;
}

.logo-sub{
margin-top:6px;
font-size:9px;
font-weight:700;
letter-spacing:.18em;
color:#a58139;
}

.header-actions{
display:flex;
gap:12px;
align-items:center;
flex-wrap:wrap;
}

.header-actions a,
.logout{
padding:10px 20px;
border:1px solid rgba(166,127,52,.25);
background:rgba(255,255,255,.25);
cursor:pointer;
color:#a67f34;
text-decoration:none;
font-size:12px;
letter-spacing:.14em;
text-transform:uppercase;
}

.header-actions a:hover,
.logout:hover{
background:#a67f34;
color:#fff;
}

.admin-only{
display:none;
}

.container{
max-width:1450px;
margin:auto;
padding:40px;
}

.kicker{
font-size:11px;
letter-spacing:.32em;
text-transform:uppercase;
color:#9a793c;
margin-bottom:12px;
}

.title{
font-size:42px;
font-weight:200;
letter-spacing:.05em;
color:#a67f34;
margin-bottom:18px;
}

.subtitle{
font-size:15px;
line-height:1.8;
color:#8f7643;
max-width:820px;
margin-bottom:28px;
}

.toolbar{
display:flex;
gap:14px;
flex-wrap:wrap;
margin-bottom:28px;
}

.search,
.filter{
padding:14px 16px;
border:1px solid rgba(166,127,52,.22);
background:rgba(255,255,255,.25);
color:#7f6430;
outline:none;
font-size:14px;
}

.search{
min-width:320px;
flex:1;
}

.filter{
min-width:210px;
}

.table-wrapper{
background:rgba(255,255,255,.20);
backdrop-filter:blur(8px);
border:1px solid rgba(166,127,52,.15);
overflow:auto;
box-shadow:0 24px 70px rgba(127,100,48,.07);
}

table{
width:100%;
border-collapse:collapse;
min-width:1180px;
}

th{
text-align:left;
padding:18px;
font-size:11px;
letter-spacing:.18em;
text-transform:uppercase;
border-bottom:1px solid rgba(166,127,52,.15);
white-space:nowrap;
}

td{
padding:18px;
border-bottom:1px solid rgba(166,127,52,.08);
vertical-align:middle;
font-size:14px;
line-height:1.6;
}

.badge{
display:inline-block;
padding:7px 10px;
border:1px solid rgba(166,127,52,.25);
font-size:10px;
letter-spacing:.14em;
text-transform:uppercase;
color:#a67f34;
background:rgba(255,255,255,.22);
white-space:nowrap;
}

.badge.da_verificare{background:rgba(166,127,52,.12);color:#8a682c}
.badge.da_revisionare{background:rgba(150,92,35,.12);color:#8f5b28}
.badge.approvato{background:rgba(72,118,72,.12);color:#517a4f}
.badge.rifiutato{background:rgba(130,45,38,.10);color:#8f3f2d}

.published{
color:#517a4f;
}

.not-published{
color:#8f5b28;
}

.actions{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.actions a,
.actions button,
.actions select{
padding:9px 12px;
border:1px solid rgba(166,127,52,.25);
background:rgba(255,255,255,.25);
cursor:pointer;
color:#a67f34;
text-decoration:none;
font-size:10px;
letter-spacing:.12em;
text-transform:uppercase;
}

.actions .danger{
color:#9c2f2f;
border-color:rgba(156,47,47,.35);
}

.actions button:disabled{
opacity:.35;
cursor:not-allowed;
}

.empty{
padding:40px;
text-align:center;
opacity:.7;
}

.status{
margin-bottom:22px;
min-height:20px;
font-size:13px;
}

.success{color:#4f7f45}
.error{color:#9c2f2f}


.docs-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:70px;
  padding:8px 10px;
  border:1px solid rgba(166,127,52,.25);
  background:rgba(255,255,255,.22);
  color:#8f5b28;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  white-space:nowrap;
}

.docs-pill.complete{
  color:#4f7f45;
  border-color:rgba(79,127,69,.34);
  background:rgba(79,127,69,.08);
}

.docs-pill.low{
  color:#9c2f2f;
  border-color:rgba(156,47,47,.30);
  background:rgba(156,47,47,.06);
}

.docs-mini{
  margin-top:6px;
  font-size:10px;
  line-height:1.5;
  color:#8f7643;
  max-width:170px;
}

.commercial-badge{
  display:inline-block;
  padding:7px 10px;
  border:1px solid rgba(166,127,52,.25);
  font-size:10px;
  letter-spacing:.14em;
  text-transform:uppercase;
  white-space:nowrap;
  background:rgba(255,255,255,.22);
  color:#a67f34;
}

.commercial-badge.available{
  color:#4f7f45;
  border-color:rgba(79,127,69,.34);
  background:rgba(79,127,69,.08);
}

.commercial-badge.under_negotiation{
  color:#8f5b28;
  border-color:rgba(143,91,40,.34);
  background:rgba(143,91,40,.08);
}

.commercial-badge.reserved{
  color:#5f6f92;
  border-color:rgba(95,111,146,.34);
  background:rgba(95,111,146,.08);
}

.commercial-badge.sold{
  color:#1f1a12;
  border-color:rgba(166,127,52,.55);
  background:linear-gradient(135deg,rgba(166,127,52,.24),rgba(255,255,255,.28));
}

.commercial-badge.withdrawn{
  color:#9c2f2f;
  border-color:rgba(156,47,47,.35);
  background:rgba(156,47,47,.07);
}

.linked-events{
  margin-top:8px;
  max-width:260px;
}

.event-chip{
  display:inline-block;
  margin:4px 4px 0 0;
  padding:6px 8px;
  border:1px solid rgba(166,127,52,.20);
  background:rgba(255,255,255,.20);
  color:#8f7643;
  font-size:9px;
  letter-spacing:.10em;
  text-transform:uppercase;
  white-space:nowrap;
}

.event-chip.selling_party,
.event-chip.closing_party{
  color:#a67f34;
  border-color:rgba(166,127,52,.38);
  background:rgba(166,127,52,.08);
}

.event-link{
  display:inline-block;
  margin-top:6px;
  color:#a67f34;
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  text-decoration:none;
}


@media(max-width:900px){
.header{
flex-direction:column;
gap:18px;
}

.header-actions{
justify-content:center;
}

.container{
padding:28px 22px;
}
}

@media(max-width:600px){
.search{
min-width:100%;
}
.filter{
width:100%;
}
}
</style>
</head>

<body>

<header class="header">

<a href="../index.html" class="logo">
  <div class="logo-main">IMMONOVA</div>
  <div class="logo-sub">OFF MARKET • CONSULTING</div>
</a>

<div class="header-actions">
<a href="dashboard.html">Dashboard</a>
<a href="opportunity-form.html">Nuova Proposta</a>
<a href="inquiries.html" class="admin-only">Richieste</a>
<a href="users.html" class="admin-only">Utenti</a>
<button class="logout" id="logoutBtn">Logout</button>
</div>

</header>

<div class="container">

<div class="kicker" id="roleLabel">Area Riservata</div>

<h1 class="title">Proposte</h1>

<p class="subtitle" id="subtitle">
Caricamento area riservata...
</p>

<div id="status" class="status"></div>

<div class="toolbar">
<input type="text" id="searchInput" class="search" placeholder="Cerca per titolo, categoria, location o stato...">

<select id="statusFilter" class="filter">
<option value="">Tutti gli stati revisione</option>
<option value="da_verificare">Da verificare</option>
<option value="da_revisionare">Da revisionare</option>
<option value="approvato">Approvato</option>
<option value="rifiutato">Rifiutato</option>
</select>

<select id="commercialFilter" class="filter">
<option value="">Tutti gli stati commerciali</option>
<option value="available">Disponibile</option>
<option value="under_negotiation">In trattativa</option>
<option value="reserved">Riservata</option>
<option value="sold">Venduta</option>
<option value="withdrawn">Ritirata</option>
</select>
</div>

<div class="table-wrapper">

<table>
<thead>
<tr>
<th>Titolo</th>
<th>Categoria</th>
<th>Location</th>
<th>Prezzo</th>
<th>Stato Revisione</th>
<th>Commerciale</th>
<th>Pubblicata</th>
<th>Documenti</th>
<th>Azioni</th>
</tr>
</thead>

<tbody id="opportunitiesTable">
<tr>
<td colspan="9" class="empty">Caricamento...</td>
</tr>
</tbody>
</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const table = document.getElementById("opportunitiesTable");
const statusBox = document.getElementById("status");
const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");
const commercialFilter = document.getElementById("commercialFilter");
const roleLabel = document.getElementById("roleLabel");
const subtitle = document.getElementById("subtitle");

let currentUser = null;
let currentProfile = null;
let isAdmin = false;
let allOpportunities = [];


const REQUIRED_DOCUMENT_TYPES = [
  "owner_identity",
  "owner_tax_code",
  "deed_of_origin",
  "cadastral_report",
  "cadastral_plan",
  "ape",
  "urban_planning",
  "technical_conformity",
  "habitability",
  "systems_certifications"
];

const REQUIRED_DOCUMENT_LABELS = {
  owner_identity:"Identità",
  owner_tax_code:"Codice fiscale",
  deed_of_origin:"Atto provenienza",
  cadastral_report:"Visura catastale",
  cadastral_plan:"Planimetria",
  ape:"APE",
  urban_planning:"Titoli edilizi",
  technical_conformity:"Conformità",
  habitability:"Agibilità",
  systems_certifications:"Impianti"
};


function escapeHTML(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function setStatus(message, type){
  statusBox.className = "status " + (type || "");
  statusBox.textContent = message || "";
}

function statusLabel(status){
  const labels = {
    da_verificare:"Da verificare",
    da_revisionare:"Da revisionare",
    approvato:"Approvato",
    rifiutato:"Rifiutato"
  };

  return labels[status] || "Da verificare";
}

function commercialStatusLabel(status){
  const labels = {
    available:"Disponibile",
    under_negotiation:"In trattativa",
    reserved:"Riservata",
    sold:"Venduta",
    withdrawn:"Ritirata"
  };

  return labels[status] || "Disponibile";
}

function eventTypeLabel(type){
  const labels = {
    selling_party:"Selling Party",
    closing_party:"Closing Party",
    welcome_party:"Welcome Party",
    past_party:"Party avvenuto",
    upcoming_party:"Party in programma",
    investor_tour:"Investor Tour",
    site_visit:"Site Visit",
    private_dinner:"Private Dinner"
  };

  return labels[type] || type || "Evento";
}

function formatPrice(value){
  if(!value){
    return "Valore riservato";
  }

  const number = Number(value);

  if(Number.isNaN(number)){
    return value;
  }

  return new Intl.NumberFormat("it-IT", {
    style:"currency",
    currency:"EUR",
    maximumFractionDigits:0
  }).format(number);
}

async function checkAuth(){
  const { data:{ session }, error } = await client.auth.getSession();

  if(error || !session){
    window.location.href = "login.html";
    return false;
  }

  currentUser = session.user;
  return true;
}

async function loadProfile(){
  const { data, error } = await client
    .from("profiles")
    .select("id,email,full_name,role")
    .eq("id", currentUser.id)
    .single();

  if(error){
    console.error(error);
    setStatus("Profilo utente non trovato.", "error");
    return;
  }

  currentProfile = data;
  isAdmin = currentProfile.role === "admin";

  roleLabel.textContent = isAdmin ? "Area Admin" : "Area Utente";

  subtitle.textContent = isAdmin
    ? "Gestisci tutte le proposte ricevute. Puoi valutarle, approvarle, rifiutarle, pubblicarle o sospenderle."
    : "Qui puoi vedere e gestire solo le tue proposte. La pubblicazione è riservata agli admin IMMONOVA.";

  document.querySelectorAll(".admin-only").forEach(el => {
    el.style.display = isAdmin ? "inline-block" : "none";
  });
}

async function loadOpportunities(){
  const { data, error } = await client
    .from("opportunities")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    console.error(error);
    table.innerHTML = `
      <tr>
        <td colspan="9" class="empty">Errore nel caricamento.</td>
      </tr>
    `;
    return;
  }

  allOpportunities = data || [];
  await attachDocumentCounts();
  await attachLinkedEvents();

  applyFilters();
}

async function attachDocumentCounts(){
  const ids = allOpportunities.map(item => item.id).filter(Boolean);

  allOpportunities = allOpportunities.map(item => ({
    ...item,
    documents_loaded_count:0,
    documents_missing_labels:Object.values(REQUIRED_DOCUMENT_LABELS)
  }));

  if(ids.length === 0){
    return;
  }

  const { data, error } = await client
    .from("opportunity_documents")
    .select("opportunity_id, document_type")
    .in("opportunity_id", ids);

  if(error){
    console.error(error);
    return;
  }

  const byOpportunity = {};

  (data || []).forEach(row => {
    if(!byOpportunity[row.opportunity_id]){
      byOpportunity[row.opportunity_id] = new Set();
    }
    if(REQUIRED_DOCUMENT_TYPES.includes(row.document_type)){
      byOpportunity[row.opportunity_id].add(row.document_type);
    }
  });

  allOpportunities = allOpportunities.map(item => {
    const loadedSet = byOpportunity[item.id] || new Set();
    const missing = REQUIRED_DOCUMENT_TYPES.filter(type => !loadedSet.has(type));

    return {
      ...item,
      documents_loaded_count:loadedSet.size,
      documents_missing_labels:missing.map(type => REQUIRED_DOCUMENT_LABELS[type] || type)
    };
  });
}

async function attachLinkedEvents(){
  const ids = allOpportunities.map(item => item.id).filter(Boolean);

  allOpportunities = allOpportunities.map(item => ({
    ...item,
    linked_events:[]
  }));

  if(ids.length === 0){
    return;
  }

  const { data, error } = await client
    .from("immonova_events")
    .select("id, opportunity_id, title, event_type, event_date, published, status, sold_price, investor_count, offers_count, closing_days")
    .in("opportunity_id", ids)
    .order("event_date", { ascending:false });

  if(error){
    console.warn("Eventi collegati non caricati:", error.message);
    return;
  }

  const byOpportunity = {};

  (data || []).forEach(event => {
    if(!byOpportunity[event.opportunity_id]){
      byOpportunity[event.opportunity_id] = [];
    }
    byOpportunity[event.opportunity_id].push(event);
  });

  allOpportunities = allOpportunities.map(item => ({
    ...item,
    linked_events:byOpportunity[item.id] || []
  }));
}

function renderDocumentSummary(item){
  const total = REQUIRED_DOCUMENT_TYPES.length;
  const loaded = item.documents_loaded_count || 0;
  const cls = loaded === total ? "complete" : (loaded <= 3 ? "low" : "");
  const missing = item.documents_missing_labels || [];
  const missingText = missing.length === 0 ? "Documenti completi" : "Mancano: " + missing.slice(0,3).join(", ") + (missing.length > 3 ? "..." : "");

  return `
    <span class="docs-pill ${cls}">${loaded}/${total}</span>
    <div class="docs-mini">${escapeHTML(missingText)}</div>
  `;
}

function renderCommercialStatus(item){
  const commercialStatus = item.commercial_status || "available";
  const label = commercialStatusLabel(commercialStatus);
  const soldDate = item.sold_at ? new Date(item.sold_at).toLocaleDateString("it-IT") : "";

  return `
    <span class="commercial-badge ${escapeHTML(commercialStatus)}">${escapeHTML(label)}</span>
    ${soldDate ? `<div class="docs-mini">Venduta il ${escapeHTML(soldDate)}</div>` : ""}
  `;
}

function renderLinkedEvents(item){
  const events = item.linked_events || [];

  if(events.length === 0){
    return `<div class="docs-mini">Nessun evento collegato</div>`;
  }

  const chips = events.slice(0,4).map(event => `
    <span class="event-chip ${escapeHTML(event.event_type || "")}">
      ${escapeHTML(eventTypeLabel(event.event_type))}
    </span>
  `).join("");

  const firstEvent = events[0];

  return `
    <div class="linked-events">
      ${chips}
      ${events.length > 4 ? `<span class="event-chip">+${events.length - 4}</span>` : ""}
      ${firstEvent ? `<br><a class="event-link" href="event-edit.html?id=${encodeURIComponent(firstEvent.id)}">Visualizza evento</a>` : ""}
    </div>
  `;
}

function applyFilters(){
  const query = searchInput.value.trim().toLowerCase();
  const selectedStatus = statusFilter.value;
  const selectedCommercialStatus = commercialFilter.value;

  let filtered = allOpportunities.filter(item => {
    const status = item.review_status || "da_verificare";

    const commercialStatus = item.commercial_status || "available";

    const matchesStatus = !selectedStatus || status === selectedStatus;
    const matchesCommercialStatus = !selectedCommercialStatus || commercialStatus === selectedCommercialStatus;

    const eventSearch = (item.linked_events || [])
      .map(event => [event.title, event.event_type, eventTypeLabel(event.event_type)].join(" "))
      .join(" ");

    const matchesSearch = [
      item.title,
      item.category,
      item.location,
      item.price,
      status,
      statusLabel(status),
      commercialStatus,
      commercialStatusLabel(commercialStatus),
      eventSearch
    ].some(value => String(value || "").toLowerCase().includes(query));

    return matchesStatus && matchesCommercialStatus && matchesSearch;
  });

  renderTable(filtered);
}

function renderTable(data){
  if(!data || data.length === 0){
    table.innerHTML = `
      <tr>
        <td colspan="9" class="empty">Nessuna proposta presente.</td>
      </tr>
    `;
    return;
  }

  table.innerHTML = data.map(item => {
    const reviewStatus = item.review_status || "da_verificare";
    const commercialStatus = item.commercial_status || "available";
    const canPublish = isAdmin && reviewStatus === "approvato" && commercialStatus !== "sold" && commercialStatus !== "withdrawn";

    return `
      <tr>
        <td>${escapeHTML(item.title || "")}${renderLinkedEvents(item)}</td>
        <td><span class="badge">${escapeHTML(item.category || "")}</span></td>
        <td>${escapeHTML(item.location || "")}</td>
        <td>${escapeHTML(formatPrice(item.price))}</td>

        <td>
          <span class="badge ${escapeHTML(reviewStatus)}">
            ${statusLabel(reviewStatus)}
          </span>
        </td>

        <td>
          ${renderCommercialStatus(item)}
        </td>

        <td class="${item.published ? "published" : "not-published"}">
          ${item.published ? "Sì" : "No"}
        </td>

        <td>
          ${renderDocumentSummary(item)}
        </td>

        <td>
          <div class="actions">

            ${item.published ? `
              <a href="../opportunity.html?id=${encodeURIComponent(item.id)}" target="_blank">
                Vedi
              </a>
            ` : ""}

            <a href="opportunity-edit.html?id=${encodeURIComponent(item.id)}">
              ${isAdmin ? "Valuta" : "Apri"}
            </a>

            ${isAdmin ? `
              <select onchange="changeReviewStatus('${item.id}', this.value)">
                <option value="">Cambia revisione</option>
                <option value="da_verificare">Da verificare</option>
                <option value="da_revisionare">Da revisionare</option>
                <option value="approvato">Approvato</option>
                <option value="rifiutato">Rifiutato</option>
              </select>

              <select onchange="changeCommercialStatus('${item.id}', this.value)">
                <option value="">Cambia commerciale</option>
                <option value="available">Disponibile</option>
                <option value="under_negotiation">In trattativa</option>
                <option value="reserved">Riservata</option>
                <option value="sold">Venduta</option>
                <option value="withdrawn">Ritirata</option>
              </select>

              <button onclick="togglePublished('${item.id}', ${item.published}, '${reviewStatus}', '${commercialStatus}')" ${!canPublish && !item.published ? "disabled" : ""}>
                ${item.published ? "Sospendi" : "Pubblica"}
              </button>

              <a href="event-form.html?opportunity_id=${encodeURIComponent(item.id)}&event_type=selling_party">
                Selling Party
              </a>

              <button class="danger" onclick="deleteOpportunity('${item.id}')">
                Elimina
              </button>
            ` : ""}

          </div>
        </td>
      </tr>
    `;
  }).join("");
}

async function changeReviewStatus(id, newStatus){
  if(!newStatus || !isAdmin){
    return;
  }

  setStatus("Aggiornamento stato revisione...", "");

  const updateData = {
    review_status:newStatus,
    reviewed_at:new Date().toISOString(),
    reviewed_by:currentUser.id
  };

  if(newStatus !== "approvato"){
    updateData.published = false;
  }

  const { error } = await client
    .from("opportunities")
    .update(updateData)
    .eq("id", id);

  if(error){
    setStatus(error.message, "error");
    return;
  }

  setStatus("Stato revisione aggiornato correttamente.", "success");
  await loadOpportunities();
}

async function changeCommercialStatus(id, newStatus){
  if(!newStatus || !isAdmin){
    return;
  }

  const confirmSold = newStatus === "sold"
    ? confirm("Confermi che questa opportunità è venduta? Verrà sospesa dalle opportunità pubbliche e comparirà nelle Success Stories.")
    : true;

  if(!confirmSold){
    return;
  }

  setStatus("Aggiornamento stato commerciale...", "");

  const now = new Date().toISOString();

  const updateData = {
    commercial_status:newStatus,
    updated_at:now
  };

  if(newStatus === "sold"){
    updateData.sold_at = now;
    updateData.published = false;
  }

  if(newStatus === "reserved"){
    updateData.reserved_at = now;
  }

  if(newStatus === "withdrawn"){
    updateData.withdrawn_at = now;
    updateData.published = false;
  }

  if(newStatus === "available" || newStatus === "under_negotiation"){
    updateData.sold_at = null;
    updateData.withdrawn_at = null;
  }

  const { error } = await client
    .from("opportunities")
    .update(updateData)
    .eq("id", id);

  if(error){
    setStatus(error.message, "error");
    return;
  }

  if(newStatus === "sold"){
    await client.from("opportunity_timeline").insert({
      opportunity_id:Number(id),
      timeline_type:"sold",
      title:"Venduta",
      description:"Opportunità segnata come venduta da admin. Il prezzo resta riservato.",
      visibility:"public"
    });
  }

  setStatus("Stato commerciale aggiornato correttamente.", "success");
  await loadOpportunities();
}

async function togglePublished(id, currentStatus, reviewStatus, commercialStatus){
  if(!isAdmin){
    setStatus("Solo un admin può pubblicare o sospendere una proposta.", "error");
    return;
  }

  if(!currentStatus && reviewStatus !== "approvato"){
    setStatus("Puoi pubblicare solo una proposta approvata.", "error");
    return;
  }

  if(!currentStatus && (commercialStatus === "sold" || commercialStatus === "withdrawn")){
    setStatus("Una proposta venduta o ritirata non può essere pubblicata tra le opportunità disponibili.", "error");
    return;
  }

  setStatus("Aggiornamento pubblicazione...", "");

  const { error } = await client
    .from("opportunities")
    .update({
      published:!currentStatus,
      updated_at:new Date().toISOString()
    })
    .eq("id", id);

  if(error){
    setStatus(error.message, "error");
    return;
  }

  setStatus("Pubblicazione aggiornata correttamente.", "success");
  await loadOpportunities();
}

async function deleteOpportunity(id){
  if(!isAdmin){
    setStatus("Solo un admin può eliminare una proposta.", "error");
    return;
  }

  const confirmDelete = confirm("Vuoi eliminare definitivamente questa proposta?");

  if(!confirmDelete){
    return;
  }

  setStatus("Eliminazione in corso...", "");

  const { error } = await client
    .from("opportunities")
    .delete()
    .eq("id", id);

  if(error){
    setStatus(error.message, "error");
    return;
  }

  setStatus("Proposta eliminata correttamente.", "success");
  await loadOpportunities();
}

searchInput.addEventListener("input", applyFilters);
statusFilter.addEventListener("change", applyFilters);
commercialFilter.addEventListener("change", applyFilters);

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await client.auth.signOut();
  window.location.href = "../index.html";
});

(async function init(){
  const isLogged = await checkAuth();

  if(isLogged){
    await loadProfile();

    const params = new URLSearchParams(window.location.search);
    const statusParam = params.get("status");

    if(statusParam){
      statusFilter.value = statusParam;
    }

    await loadOpportunities();
  }
})();
</script>
