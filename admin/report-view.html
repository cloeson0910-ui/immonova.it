<body>
<header class="header">
  <a class="logo" href="../index.html">IMMONOVA<small>OFF MARKET • CONSULTING</small></a>
  <div class="header-actions">
    <a href="dashboard.html">Dashboard</a>
    <a href="opportunities.html">Proposte</a>
    <button id="logoutBtn" type="button">Logout</button>
  </div>
</header>
<main class="container">
  <div class="topbar">
    <div>
      <div class="kicker">Investment Book · Edizione stampabile</div>
      <h1 class="title" id="pageTitle">Dossier</h1>
    </div>
    <div class="actions">
      <button class="btn" id="loadBtn" type="button">Ricarica dati</button>
      <button class="btn secondary" onclick="window.print()" type="button">Stampa / PDF</button>
      <a class="btn secondary" id="editLink" href="#">Torna alla proposta</a>
    </div>
  </div>
  <div id="status" class="status"></div>
  <section id="book" class="book"><div class="empty">Caricamento dossier...</div></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script>
var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var params = new URLSearchParams(window.location.search);
var opportunityId = params.get("id");
var statusBox = document.getElementById("status");
var book = document.getElementById("book");
var pageTitle = document.getElementById("pageTitle");
var editLink = document.getElementById("editLink");
var loadBtn = document.getElementById("loadBtn");
var logoutBtn = document.getElementById("logoutBtn");
var currentUser = null;
var opportunity = null;
var report = null;
var propertyDocuments = [];
var dossierData = null;
var dossierSource = "";
var destinationPhoto = null;

/* ---- Pesi del punteggio sintetico: modificabili qui, un solo posto ---- */
var SCORE_WEIGHTS = { financial:30, market:20, hospitality:20, access:15, territory:15 };

function escapeHTML(value){return String(value===null||value===undefined?"":value).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#039;");}
function number(value){var n=Number(value);if(!Number.isFinite(n))return "-";return new Intl.NumberFormat("it-IT").format(n);}
function euro(value){var n=Number(value);if(!Number.isFinite(n))return "-";return new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n);}
function percent(value){var n=Number(value);if(!Number.isFinite(n))return "-";return n.toFixed(1).replace(".",",")+"%";}
function clean(v){return String(v||"").trim();}
function setStatus(message,type){statusBox.className="status "+(type||"");statusBox.textContent=message||"";}
function normalizeGallery(value){if(!value)return[];if(Array.isArray(value))return value.filter(Boolean);try{var p=JSON.parse(value);return Array.isArray(p)?p.filter(Boolean):[]}catch(e){return[]}}
function getTitle(){return clean(opportunity&&opportunity.title)||clean(report&&report.title)||"Dossier IMMONOVA";}
function getLocation(){return clean(opportunity&&opportunity.location)||clean(report&&report.location)||clean(opportunity&&opportunity.municipality)||"";}
function getCategory(){return clean(opportunity&&opportunity.category)||clean(report&&report.category)||"";}
function getCoverImage(){var gallery=normalizeGallery(opportunity&&opportunity.gallery_images);return clean(opportunity&&opportunity.cover_image)||gallery[0]||"";}
function getGeneratedDate(){var d=(report&&report.created_at)||(opportunity&&opportunity.created_at)||new Date().toISOString();try{return new Intl.DateTimeFormat("it-IT").format(new Date(d));}catch(e){return "";}}
async function checkAuth(){var sessionRes=await client.auth.getSession();var session=sessionRes&&sessionRes.data&&sessionRes.data.session;if(!session){window.location.href="login.html";return null;}currentUser=session.user;return session;}
async function loadOpportunity(){if(!opportunityId)throw new Error("ID opportunità mancante nella URL.");var res=await client.from("opportunities").select("*").eq("id",opportunityId).single();if(res.error)throw res.error;opportunity=res.data;if(editLink)editLink.href="opportunity-form.html?id="+encodeURIComponent(opportunityId);}
async function loadLatestReport(){var res=await client.from("investment_reports").select("*").eq("opportunity_id",opportunityId).order("created_at",{ascending:false}).limit(1).maybeSingle();if(!res.error&&res.data)report=res.data;}
async function loadPropertyDocuments(){var res=await client.from("opportunity_documents").select("*").eq("opportunity_id",opportunityId).order("created_at",{ascending:false});propertyDocuments=(!res.error&&Array.isArray(res.data))?res.data:[];}

/* ---- Foto destinazione per le pagine divisorie (mai da internet: solo materiale caricato dall'analista) ---- */
function geoScore(row){
  var oc=clean(opportunity&&opportunity.country_code).toLowerCase();
  var or_=clean(opportunity&&opportunity.region).toLowerCase();
  var op=clean(opportunity&&opportunity.province).toLowerCase();
  var ocity=clean(opportunity&&(opportunity.city||opportunity.municipality)).toLowerCase();
  var score=0;
  if(row.country_code){ if(clean(row.country_code).toLowerCase()!==oc) return -1; score+=10; }
  if(row.region){ if(clean(row.region).toLowerCase()!==or_) return -1; score+=20; }
  if(row.province){ if(clean(row.province).toLowerCase()!==op) return -1; score+=30; }
  if(row.city){ if(clean(row.city).toLowerCase()!==ocity) return -1; score+=40; }
  return score;
}
async function loadDestinationPhoto(){
  try{
    var res=await client.from("immonova_destination_photos").select("*").eq("active",true);
    if(res.error || !Array.isArray(res.data)) return null;
    var best=null,bestScore=-1;
    res.data.forEach(function(row){
      var s=geoScore(row);
      if(s>bestScore){bestScore=s;best=row;}
    });
    return bestScore>=0?best:null;
  }catch(e){ return null; }
}

/* ---- Territorial / market / hospitality data (Discovery Engine) ---- */
function getReportJson(){return (report&&report.report_json)||{};}
function getAsset(){var j=getReportJson();return j.asset||{};}
function getStoredDossier(){
  var j=getReportJson();
  if(j && j.dossier_data && typeof j.dossier_data==="object" && Object.keys(j.dossier_data).length) return j.dossier_data;
  return null;
}
async function fetchLiveDossier(radiusKm){
  try{
    var url=String(SUPABASE_URL||"").replace(/\/+$/,"")+"/functions/v1/immonova-discovery-engine";
    var payload={opportunity_id:Number(opportunityId),radius_km:radiusKm||30,year:new Date().getFullYear()};
    var res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY},body:JSON.stringify(payload)});
    var json=await res.json();
    return (json&&json.dossier_data)?json.dossier_data:null;
  }catch(e){
    console.error("Discovery live fetch failed",e);
    return null;
  }
}
function askRadiusKm(){
  var input=window.prompt("Raggio di ricerca Discovery Engine, in km (aeroporti/porti/marine cercano comunque più lontano se serve). Lascia vuoto per il default di 30 km.","30");
  if(input===null)return 30;
  var n=Number(input);
  return (Number.isFinite(n)&&n>0)?n:30;
}
async function ensureDossier(){
  dossierData=getStoredDossier();
  if(dossierData){dossierSource="report";return;}
  var radius=askRadiusKm();
  setStatus("Nessun dato territoriale salvato nel report: recupero in tempo reale dal Discovery Engine con raggio "+radius+" km (può richiedere qualche secondo)...","");
  dossierData=await fetchLiveDossier(radius);
  dossierSource=dossierData?"live":"none";
}
function metricFromDossier(section,field){
  var d=dossierData||{};var bucket=d[section];if(!bucket)return null;
  var f=bucket[field];if(!f||typeof f!=="object"||!("value" in f))return null;
  return f;
}
function formatMetricVal(v){var n=Number(v);return Number.isFinite(n)?n.toLocaleString("it-IT"):String(v==null?"-":v);}
function metricCardHTML(label,metric,unitFallback){
  if(!metric)return '<div class="metric-card"><div class="metric-label">'+escapeHTML(label)+'</div><div class="metric-value" style="font-size:17px">Non disponibile</div></div>';
  return '<div class="metric-card"><div class="metric-label">'+escapeHTML(label)+'</div><div class="metric-value">'+escapeHTML(formatMetricVal(metric.value))+'</div><div class="metric-note">'+escapeHTML(metric.unit||unitFallback||"")+'</div></div>';
}
function rangeCardHTML(label,minMetric,maxMetric,unitFallback){
  if(!minMetric&&!maxMetric)return '<div class="metric-card"><div class="metric-label">'+escapeHTML(label)+'</div><div class="metric-value" style="font-size:17px">Non disponibile</div></div>';
  var unit=(minMetric||maxMetric).unit||unitFallback||"";
  var valueLine;
  if(minMetric&&maxMetric)valueLine=formatMetricVal(minMetric.value)+" – "+formatMetricVal(maxMetric.value);
  else if(minMetric)valueLine="da "+formatMetricVal(minMetric.value);
  else valueLine="fino a "+formatMetricVal(maxMetric.value);
  return '<div class="metric-card"><div class="metric-label">'+escapeHTML(label)+'</div><div class="metric-value">'+escapeHTML(valueLine)+'</div><div class="metric-note">'+escapeHTML(unit)+'</div></div>';

function sortedItems(section,limit){
  var d=dossierData||{};
  var items=(d[section]&&Array.isArray(d[section].items))?d[section].items.slice():[];
  items.sort(function(a,b){
    var da=Number(a&&a.distance_km),db=Number(b&&b.distance_km);
    da=Number.isFinite(da)?da:999999;db=Number.isFinite(db)?db:999999;
    return da-db;
  });
  return typeof limit==="number"?items.slice(0,limit):items;
}
function nearestOfSubcategory(section,subcat){
  var items=sortedItems(section);
  for(var i=0;i<items.length;i++){ if(items[i].subcategory===subcat) return items[i]; }
  return null;
}
function distLabel(item){
  var km=Number(item.distance_km),min=Number(item.drive_minutes_estimate);

  if(Number.isFinite(km))parts.push(km.toLocaleString("it-IT",{maximumFractionDigits:1})+" km");
  if(Number.isFinite(min))parts.push(min+" min in auto");
  return parts.join(" · ");

/* ---- Punteggio sintetico: solo su aree con dati reali, pesi ridistribuiti sulle aree disponibili ---- */
function firstFiniteOpp(){for(var i=0;i<arguments.length;i++){var n=Number(arguments[i]);if(Number.isFinite(n)&&n!==0)return n;}return null;}
function getAssetSurfaceM2(){
  var o=opportunity||{};
  return firstFiniteOpp(o.internal_size,o.land_size);
}
function scoreFinancialArea(f){
  if(!(f.net>0&&f.total>0))return null;
  var s;
  if(f.roi<3)s=20;else if(f.roi<6)s=45;else if(f.roi<9)s=65;else if(f.roi<12)s=80;else s=95;
  if(f.breakEven>15)s-=15;else if(f.breakEven>0&&f.breakEven<=6)s+=5;
  return Math.max(0,Math.min(100,s));
}
function scoreMarketArea(f){
  var surface=getAssetSurfaceM2();
  if(!surface||!f.purchase)return null;
  var min=metricFromDossier("real_estate_market","residential_sale_per_m2_min");
  var max=metricFromDossier("real_estate_market","residential_sale_per_m2_max");
  if(!min&&!max)return null;
  var mid=(min&&max)?((min.value+max.value)/2):(min?min.value:max.value);
  if(!mid)return null;
  var assetPm2=f.purchase/surface;
  var ratio=assetPm2/mid;
  if(ratio<=0.7)return 95;if(ratio<=0.85)return 80;if(ratio<=1)return 65;if(ratio<=1.15)return 45;if(ratio<=1.3)return 30;return 15;
}
function scoreHospitalityArea(){
  var min=metricFromDossier("adr","average_daily_rate_min");
  var max=metricFromDossier("adr","average_daily_rate_max");
  var single=metricFromDossier("adr","average_daily_rate");
  if(!min&&!max&&!single)return null;
  var mid=(min&&max)?((min.value+max.value)/2):(min?min.value:(max?max.value:single.value));
  var base;
  if(mid<120)base=25;else if(mid<200)base=45;else if(mid<320)base=65;else if(mid<450)base=80;else if(mid<650)base=90;else base=97;
  var richCount=sortedItems("hospitality").filter(function(i){return ["resort","boutique_luxury","masseria"].indexOf(i.subcategory)>=0;}).length;
  var bonus=richCount>=3?10:(richCount>=1?5:0);
  return Math.max(0,Math.min(100,base+bonus));
}
function scoreAccessArea(){
  var airport=nearestOfSubcategory("transport","commercial_airport");
  var rail=nearestOfSubcategory("transport","railway_station");
  if(!airport&&!rail)return null;
  function timeScore(min){ if(min==null||!Number.isFinite(min))return null; if(min<=30)return 100;if(min<=45)return 85;if(min<=60)return 70;if(min<=90)return 50;if(min<=150)return 30;return 15; }
  var vals=[timeScore(airport&&airport.drive_minutes_estimate),timeScore(rail&&rail.drive_minutes_estimate)].filter(function(v){return v!=null;});
  if(!vals.length)return null;
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}
function scoreTerritoryArea(){
  var total=["heritage","beaches","marinas","restaurants"].reduce(function(sum,s){return sum+sortedItems(s).length;},0);
  if(total===0)return null;
  if(total>=15)return 95;if(total>=10)return 80;if(total>=6)return 65;if(total>=3)return 45;return 25;
}
function gradeLabel(total){
  if(total>=75)return "Solido";
  if(total>=55)return "Nella media";
  if(total>=35)return "Fragile";
  return "Debole";
}
function computeScore(){
  var f=buildFinance();
  var comps=[
    {key:"financial",label:"Performance finanziaria",weight:SCORE_WEIGHTS.financial,score:scoreFinancialArea(f)},
    {key:"market",label:"Posizionamento di mercato",weight:SCORE_WEIGHTS.market,score:scoreMarketArea(f)},
    {key:"hospitality",label:"Domanda hospitality",weight:SCORE_WEIGHTS.hospitality,score:scoreHospitalityArea()},
    {key:"access",label:"Accessibilità",weight:SCORE_WEIGHTS.access,score:scoreAccessArea()},
    {key:"territory",label:"Attrattività territoriale",weight:SCORE_WEIGHTS.territory,score:scoreTerritoryArea()}
  ];
  var available=comps.filter(function(c){return c.score!=null;});
  if(!available.length)return null;
  var totalWeight=available.reduce(function(a,c){return a+c.weight;},0);
  var total=available.reduce(function(a,c){return a+c.score*(c.weight/totalWeight);},0);
  return {components:comps,available:available.length,totalAreas:comps.length,total:Math.round(total)};
}

function firstFinite(){for(var i=0;i<arguments.length;i++){var n=Number(arguments[i]);if(Number.isFinite(n)&&n!==0)return n;}return 0;}
function parsePrice(v){var raw=String(v||"");if(!raw||/riservato|trattativa/i.test(raw))return 0;var n=Number(raw.replace(/[^\d,.-]/g,"").replace(/\./g,"").replace(",","."));return Number.isFinite(n)?n:0;}
function getPurchasePrice(){var a=getAsset();return firstFinite(report&&report.purchase_price,report&&report.price_numeric,a.purchase_price,a.price_raw_numeric,opportunity&&opportunity.price_numeric,parsePrice(opportunity&&opportunity.price));}
function deepFind(obj, keys){
  var wanted=keys.map(function(k){return String(k).toLowerCase();});
  var seen=new Set();
  function walk(x){
    if(!x||typeof x!=="object"||seen.has(x))return 0;
    seen.add(x);
    if(Array.isArray(x)){
      for(var i=0;i<x.length;i++){var r=walk(x[i]);if(Number.isFinite(r)&&r!==0)return r;}
      return 0;
    }
    for(var k in x){
      if(!Object.prototype.hasOwnProperty.call(x,k))continue;
      var lk=String(k).toLowerCase();
      if(wanted.indexOf(lk)>=0){
        var n=Number(String(x[k]).replace(/[^\d,.-]/g,"").replace(/\./g,"").replace(",","."));
        if(Number.isFinite(n)&&n!==0)return n;
      }
    }
    for(var k2 in x){var r2=walk(x[k2]);if(Number.isFinite(r2)&&r2!==0)return r2;}
    return 0;
  }
  return walk(obj);
}

  );

function buildFinance(){

  var acquisition=firstFinite(report&&report.acquisition_total,deepFind(j,["acquisition_total","totale_acquisizione"]),purchase+taxes+notary+agency+dueDiligence);
  var development=firstFinite(report&&report.development_total,deepFind(j,["development_total","totale_sviluppo"]),renovation+tech+ffe+marketing+contingency);
  var total=firstFinite(report&&report.total_project_cost,report&&report.total_investment_avg,a.total_project_cost,a.total_investment_avg,deepFind(j,["total_project_cost","total_investment","total_investment_avg","total_project_investment"]),acquisition+development);

/* ---- Rendita & proiezione 15 anni: solo da input reali, ipotesi sempre dichiarate ---- */
function getAssetUnits(){
  var o=opportunity||{};
  var n=firstFiniteOpp(o.bedrooms);
  return n && n>0 ? n : 1; /* default: intero immobile affittato come unica unità */
}
function getOccupancyAssumption(){
  var occ=metricFromDossier("adr","occupancy");
  if(occ&&occ.value)return {value:occ.value>1?occ.value/100:occ.value,verified:true};
  return {value:0.5,verified:false};
}
var CASHFLOW_ANNUAL_GROWTH = 0.02; /* ipotesi prudenziale unica e dichiarata: nessuna crescita "a scalare" inventata */
var CASHFLOW_OPEX_RATIO = 0.32;    /* ipotesi prudenziale unica e dichiarata sui costi operativi */
function buildCashflowProjection(){
  var f=buildFinance();
  var adrMin=metricFromDossier("adr","average_daily_rate_min");
  var adrMax=metricFromDossier("adr","average_daily_rate_max");
  var adrSingle=metricFromDossier("adr","average_daily_rate");
  var adrMid = (adrMin&&adrMax)?((adrMin.value+adrMax.value)/2):(adrMin?adrMin.value:(adrMax?adrMax.value:(adrSingle?adrSingle.value:null)));
  var units=getAssetUnits();
  var occ=getOccupancyAssumption();
  var baseRevenue;
  var revenueSource;
  if(f.revenue>0){ baseRevenue=f.revenue; revenueSource="dato reale da report interno"; }
  else if(adrMid&&units){ baseRevenue=adrMid*occ.value*365*units; revenueSource="stimato da ADR di mercato \u00d7 occupazione "+(occ.verified?"verificata":"assunta")+" \u00d7 "+units+" unit\u00e0"; }
  else return null;
  var rows=[];
  var cum=0;
  for(var y=1;y<=15;y++){
    var revenue = baseRevenue*Math.pow(1+CASHFLOW_ANNUAL_GROWTH,y-1);
    var costs = revenue*CASHFLOW_OPEX_RATIO;
    var net = revenue-costs;
    cum+=net;
    rows.push({year:y,revenue:revenue,costs:costs,net:net,cum:cum});
  }
  return {rows:rows,revenueSource:revenueSource,total:f.total,breakEvenYear:(function(){for(var i=0;i<rows.length;i++){if(rows[i].cum>=f.total)return rows[i].year;}return null;})()};
}
function renderCashflowPage(){
  var proj=buildCashflowProjection();
  if(!proj)return "";
  var rows=proj.rows.map(function(r){
    return '<tr><td>'+r.year+'</td><td>'+escapeHTML(euro(r.revenue))+'</td><td>'+escapeHTML(euro(r.costs))+'</td><td>'+escapeHTML(euro(r.net))+'</td><td>'+escapeHTML(euro(r.cum))+'</td></tr>';
  }).join("");
  return '<article class="report-page"><div class="page-inner"><div class="section-kicker">Cash-flow projection</div><h2 class="section-title">Rendita &amp; Proiezione 15 Anni</h2><div class="lux-rule"></div>'
    +'<p class="info-text">Ricavo anno 1: '+escapeHTML(proj.revenueSource)+'. Ipotesi dichiarate: crescita ricavi '+escapeHTML(percent(CASHFLOW_ANNUAL_GROWTH*100))+'/anno (prudenziale, non derivata da serie storica), costi operativi '+escapeHTML(percent(CASHFLOW_OPEX_RATIO*100))+' dei ricavi. '+(proj.breakEvenYear?('Rientro del Total Project Cost ('+escapeHTML(euro(proj.total))+') stimato all\u2019anno '+proj.breakEvenYear+'.'):('Total Project Cost ('+escapeHTML(euro(proj.total))+') non rientrato nei 15 anni proiettati.'))+'</p>'
    +'<table class="cf-table"><thead><tr><th>Anno</th><th>Ricavi</th><th>Costi</th><th>Utile</th><th>Cumulato</th></tr></thead><tbody>'+rows+'</tbody></table>'
    +'</div></article>';
}

function renderTourismForecastPage(){
  var series=metricSeriesFromDossier("tourism","arrivals_series")||metricSeriesFromDossier("tourism","overnight_stays_series");
  if(!series || series.cagr_pct==null) return "";
  var rate=Math.max(-FORECAST_GROWTH_CAP_PCT, Math.min(FORECAST_GROWTH_CAP_PCT, series.cagr_pct));
  var capped = rate!==series.cagr_pct;
  var last=series.series[series.series.length-1];
  var lastYear=Number(last.year), lastVal=Number(last.value);
  var rows=[];
  var v=lastVal;
  for(var i=1;i<=5;i++){
    v=v*(1+rate/100);
    rows.push({year:lastYear+i, value:Math.round(v)});
  }
  return '<article class="report-page"><div class="page-inner"><div class="section-kicker">Tourism forecast</div><h2 class="section-title">Turismo — Proiezione 5 Anni</h2><div class="lux-rule"></div>'
    +barChartHTML(rows,"Proiezione a tasso costante "+escapeHTML(percent(rate))+"/anno")
    +'<table class="trend-table"><thead><tr><th>Anno</th><th>Valore proiettato</th></tr></thead><tbody>'+rows.map(function(r){return '<tr><td>'+r.year+'</td><td>'+escapeHTML(formatMetricVal(r.value))+'</td></tr>';}).join("")+'</tbody></table>'
    +'<p class="info-text">Proiezione lineare al tasso di crescita storico reale (CAGR '+escapeHTML(percent(series.cagr_pct))+(capped?', limitato a '+escapeHTML(percent(rate))+' per prudenza':'')+'), applicato costante sui 5 anni. Non è una previsione garantita: è l\u2019estensione matematica del trend osservato, non un modello econometrico.</p>'
    +'</div></article>';
}
function metricSeriesFromDossier(section,field){
  var d=dossierData||{};var bucket=d[section];if(!bucket)return null;

}

  push("Territorio & mercato", renderTourismForecastPage());

  var ecoSections=[["hospitality","Hospitality nelle vicinanze","Accommodation landscape"],["restaurants","Ristoranti nelle vicinanze","Food & dining"],["beaches","Spiagge e costa","Coast & beaches"],["marinas","Porti e marine","Marinas & ports"],["transport","Accessibilità e trasporti","Destination access"],["heritage","Cultura e patrimonio","Heritage & culture"],["nightlife","Vita notturna","Nightlife"]];
  var ecoPages=ecoSections.map(function(s){return renderCategoryPage(s[0],s[1],s[2]);}).filter(Boolean);
  if(ecoPages.length){
    push("Ecosistema & accessibilità", dividerPageHTML("Ecosistema & Accessibilità","Territorial ecosystem"), true);
    ecoPages.forEach(function(p){push("Ecosistema & accessibilità",p);});
  }

  var narrHtml=renderNarrativePage();
  var scoreHtml=renderScorePage();
  if(narrHtml||scoreHtml){
    push("Valutazione IMMONOVA", dividerPageHTML("Valutazione IMMONOVA","Analytical assessment"), true);
    push("Valutazione IMMONOVA", narrHtml);
    push("Valutazione IMMONOVA", scoreHtml);
  }

  push("Fonti & note", dividerPageHTML("Fonti & Note","Sources & disclaimer"), true);
  push("Fonti & note", renderSourcesPage());
  push("Fonti & note", renderClosingPage());

  /* Sommario: prima occorrenza di pagina (numerata) per ciascun capitolo, offset di 1 per via della pagina Sommario stessa */
  var tocEntries=[];
  var seenChapters={};
  chapters.forEach(function(c,idx){
    if(!seenChapters[c.label]){ seenChapters[c.label]=true; tocEntries.push({label:c.label,page:idx+2}); }
  });

  var totalNumbered = chapters.length + 1; /* +1 per il Sommario */
  var finalHtml = renderCover();
  finalHtml += injectFolio(renderTOCPage(tocEntries),1,totalNumbered,false);
  chapters.forEach(function(c,idx){
    finalHtml += injectFolio(c.html, idx+2, totalNumbered, c.divider);
  });
  finalHtml += renderDebugBootstrap();

  book.innerHTML = finalHtml;
}

async function init(){
  try{
    setStatus("Caricamento dati interni IMMONOVA...","");
    await checkAuth();
    await loadOpportunity();
    await Promise.all([loadLatestReport(),loadPropertyDocuments()]);
    destinationPhoto = await loadDestinationPhoto();
    await ensureDossier();
    renderBook();
    var srcNote=dossierSource==="report"?"dati territoriali dal report salvato":dossierSource==="live"?"dati territoriali recuperati in tempo reale dal Discovery Engine":"nessun dato territoriale disponibile";
    var photoNote=destinationPhoto?"foto destinazione trovata":"nessuna foto destinazione caricata per questa zona — pagine divisorie mostrate con il pattern grafico IMMONOVA";
    setStatus("Dossier generato: "+srcNote+"; "+photoNote+". Nessun rating o testo inventato: solo dati reali e calcoli espliciti.","success");
  }catch(e){
    console.error(e);
    book.innerHTML='<div class="empty">Errore: '+escapeHTML(e.message||e)+'</div>';
    setStatus(String(e.message||e),"error");
  }
}
if(loadBtn)loadBtn.addEventListener("click",init);
if(logoutBtn)logoutBtn.addEventListener("click",async function(){await client.auth.signOut();window.location.href="../index.html";});
init();
</script>
</body>
