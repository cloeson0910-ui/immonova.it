function i18nCacheKey(lang){ return "immonova_i18n_report_view_" + lang + "_v1"; }

async function loadTranslatedStrings(lang){
  if(lang === "it") return UI_STRINGS;
  var cacheKey = i18nCacheKey(lang);
  try{
    var cached = localStorage.getItem(cacheKey);
    if(cached){ var parsed = JSON.parse(cached); if(parsed && typeof parsed === "object") return parsed; }
  }catch(e){}

  var keys = Object.keys(UI_STRINGS);
  var texts = keys.map(function(k){ return UI_STRINGS[k]; });

  var result = null;
  try{
    var url = String(SUPABASE_URL||"").replace(/\/+$/,"")+"/functions/v1/translate-public-content";
    var res = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY},body:JSON.stringify({
      language: lang,
      source_language: "it",
      context: "IMMONOVA luxury real estate investment dossier delivered to an international investor: cover, table of contents, financial analysis, property section, territorial/market data, ecosystem listings, evaluation score, sources, legal disclaimer.",
      texts: texts
    })});
    result = await res.json();
  }catch(e){
    console.error("Traduzione dossier non riuscita (rete), uso italiano come fallback:", e);
    return UI_STRINGS;
  }

  if(!result || !result.success || !Array.isArray(result.translations)){
    console.error("Traduzione dossier non riuscita, uso italiano come fallback:", result);
    return UI_STRINGS;
  }

  var translations = result.translations;
  var translated = {};
  keys.forEach(function(k, i){ translated[k] = translations[i] != null ? translations[i] : UI_STRINGS[k]; });
  try{ localStorage.setItem(cacheKey, JSON.stringify(translated)); }catch(e){}
  return translated;
}

function renderTranslatedStaticText(){
  document.querySelectorAll("[data-i18n]").forEach(function(el){
    var key = el.getAttribute("data-i18n");
    if(T[key]) el.textContent = T[key];
  });
}

async function applyLanguage(lang){
  CURRENT_LANG = lang || "it";
  document.documentElement.lang = CURRENT_LANG;
  T = await loadTranslatedStrings(CURRENT_LANG);
  renderTranslatedStaticText();
  buildRoomTypeLabels();
  buildRenovationStyleLabels();
  buildDocumentTypeLabels();
}

/* Sceglie tra due forme (singolare/plurale) di una frase gia' tradotta -- serve perche' le
   frasi narrative si costruiscono con "N " + frase, e la scelta singolare/plurale va fatta
   ANCHE nella lingua di destinazione, non solo in italiano. */
function pluralPick(count, singularKey, pluralKey){
  return String(count) + (T[count===1?singularKey:pluralKey] || UI_STRINGS[count===1?singularKey:pluralKey]);
}
function fmt(template, vars){
  var out = template;
  Object.keys(vars||{}).forEach(function(k){ out = out.split("{"+k+"}").join(vars[k]); });
  return out;
}

function escapeHTML(value){return String(value===null||value===undefined?"":value).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#039;");}
function number(value){var n=Number(value);if(!Number.isFinite(n))return "-";return new Intl.NumberFormat(CURRENT_LANG==="it"?"it-IT":CURRENT_LANG).format(n);}
function euro(value){var n=Number(value);if(!Number.isFinite(n))return "-";return new Intl.NumberFormat(CURRENT_LANG==="it"?"it-IT":CURRENT_LANG,{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n);}
function percent(value){var n=Number(value);if(!Number.isFinite(n))return "-";return n.toFixed(1).replace(".",CURRENT_LANG==="it"?",":".")+"%";}
function clean(v){return String(v||"").trim();}

/* ---- Foto destinazione per le pagine divisorie (mai da internet: solo materiale caricato dall'analista) ---- */
function geoScore(row){
  var oc=clean(opportunity&&opportunity.country_code).toLowerCase() || "it";
  var or_=clean(opportunity&&opportunity.region).toLowerCase();
  var op=clean(opportunity&&opportunity.province).toLowerCase();
  var ocity=clean(opportunity&&(opportunity.city||opportunity.municipality)).toLowerCase();
  var score=0;
  if(row.country_code){ if(clean(row.country_code).toLowerCase()!==oc) return -1; score+=10; }
  if(row.region){ if(clean(row.region).toLowerCase()!==or_) return -1; score+=20; }
  if(row.province){ if(clean(row.province).toLowerCase()!==op) return -1; score+=30; }
  if(row.city){ if(clean(row.city).toLowerCase()!==ocity) return -1; score+=40; }
  return score;
}
var destinationPhotosDebug = null;
async function loadDestinationPhotos(){
  try{
    var res=await client.from("immonova_destination_photos").select("*").eq("active",true);
    if(res.error || !Array.isArray(res.data)){
      destinationPhotosDebug={total_active:0,matched:0,error:res.error?(res.error.message||String(res.error)):null};
      return [];
    }
    var scored = res.data.map(function(row){ return {row:row, score:geoScore(row)}; });
    var matched = scored.filter(function(x){ return x.score>=0; });
    destinationPhotosDebug={total_active:res.data.length,matched:matched.length,error:null};
    return matched
      .sort(function(a,b){ return b.score-a.score; })
      .map(function(x){ return x.row; });
  }catch(e){ destinationPhotosDebug={total_active:0,matched:0,error:String(e&&e.message||e)}; return []; }
}

    lastDiscoveryEngines=(json&&json.engines)?json.engines:null;
    return (json&&json.dossier_data)?json.dossier_data:null;
  }catch(e){
    console.error("Discovery live fetch failed",e);
    lastDiscoveryDiagnostics=null;
    lastDiscoveryEngines=null;
    return null;
  }
}
function askRadiusKm(){
  var input=window.prompt("Raggio di ricerca Discovery Engine, in km (aeroporti/porti/marine cercano comunque più lontano se serve). Lascia vuoto per il default di 30 km.","30");
  if(input===null)return 30;
  var n=Number(input);
  return (Number.isFinite(n)&&n>0)?n:30;
}
async function persistDossierData(data){
  try{
    if(report && report.id){
      var j = getReportJson();
      j.dossier_data = data;
      var res = await client.from("opportunity_reports").update({report_json:j}).eq("id",report.id);
      if(res.error) throw res.error;
      report.report_json = j;
    }else{
      var payload = {
        opportunity_id: Number(opportunityId),
        title: getTitle(),
        report_json: { dossier_data: data }
      };
      var insertRes = await client.from("opportunity_reports").insert(payload).select("*").single();
      if(insertRes.error) throw insertRes.error;
      report = insertRes.data;
    }
  }catch(e){
    console.error("Impossibile salvare i dati territoriali sul report — verranno richiesti di nuovo alla prossima apertura:", e);
    setStatus("Dati territoriali recuperati ma NON salvati (errore: "+(e.message||e)+"). Alla prossima apertura verranno richiesti di nuovo al Discovery Engine.","error");
  }
}
async function ensureDossier(){
  dossierData=getStoredDossier();
  if(dossierData){dossierSource="report";return;}
  var radius=askRadiusKm();
  setStatus("Nessun dato territoriale salvato nel report: recupero in tempo reale dal Discovery Engine con raggio "+radius+" km (può richiedere qualche secondo)...","");
  dossierData=await fetchLiveDossier(radius);
  if(dossierData){
    dossierSource="live";
    setStatus("Dati territoriali recuperati dal Discovery Engine: salvataggio in corso per non richiederli più in futuro...","");
    await persistDossierData(dossierData);
  }else{
    dossierSource="none";
  }
}
async function forceRefreshDossier(){
  var confirmed=confirm("Questo richiama il Discovery Engine (Google Places e le altre fonti a pagamento) e sovrascrive i dati territoriali già salvati per questo dossier. Da fare solo se necessario (es. verifica di un fix). Procedere?");
  if(!confirmed) return;
  var radius=askRadiusKm();
  setStatus("Aggiornamento forzato dei dati territoriali dal Discovery Engine in corso...","");
  var fresh=await fetchLiveDossier(radius);
  if(!fresh){
    setStatus("Impossibile recuperare nuovi dati territoriali dal Discovery Engine.","error");
    return;
  }
  dossierData=fresh;
  dossierSource="live";
  await persistDossierData(fresh);
  renderBook();
  setStatus("Dati territoriali aggiornati e salvati. Non verranno richiesti di nuovo automaticamente alle prossime aperture.","success");
}
function metricFromDossier(section,field){
  var d=dossierData||{};var bucket=d[section];if(!bucket)return null;
  var f=bucket[field];if(!f||typeof f!=="object"||!("value" in f))return null;
  return f;
}
function formatMetricVal(v){var n=Number(v);return Number.isFinite(n)?n.toLocaleString(CURRENT_LANG==="it"?"it-IT":CURRENT_LANG):String(v==null?"-":v);}
function metricCardHTML(label,metric,unitFallback){
  if(!metric)return '<div class="metric-card"><div class="metric-label">'+escapeHTML(label)+'</div><div class="metric-value" style="font-size:17px">'+escapeHTML(T.not_available)+'</div></div>';
  return '<div class="metric-card"><div class="metric-label">'+escapeHTML(label)+'</div><div class="metric-value">'+escapeHTML(formatMetricVal(metric.value))+'</div><div class="metric-note">'+escapeHTML(metric.unit||unitFallback||"")+'</div></div>';
}
function rangeCardHTML(label,minMetric,maxMetric,unitFallback){
  if(!minMetric&&!maxMetric)return '<div class="metric-card"><div class="metric-label">'+escapeHTML(label)+'</div><div class="metric-value" style="font-size:17px">'+escapeHTML(T.not_available)+'</div></div>';
  var unit=(minMetric||maxMetric).unit||unitFallback||"";
  var valueLine;
  if(minMetric&&maxMetric)valueLine=formatMetricVal(minMetric.value)+" – "+formatMetricVal(maxMetric.value);
  else if(minMetric)valueLine=(T.range_from||"da ")+formatMetricVal(minMetric.value);
  else valueLine=(T.range_to||"fino a ")+formatMetricVal(maxMetric.value);
  return '<div class="metric-card"><div class="metric-label">'+escapeHTML(label)+'</div><div class="metric-value">'+escapeHTML(valueLine)+'</div><div class="metric-note">'+escapeHTML(unit)+'</div></div>';
}
function sortedItems(section,limit){
  var d=dossierData||{};
  var items=(d[section]&&Array.isArray(d[section].items))?d[section].items.slice():[];
  items.sort(function(a,b){
    var da=Number(a&&a.distance_km),db=Number(b&&b.distance_km);
    da=Number.isFinite(da)?da:999999;db=Number.isFinite(db)?db:999999;
    return da-db;
  });
  return typeof limit==="number"?items.slice(0,limit):items;
}
function nearestOfSubcategory(section,subcat){
  var items=sortedItems(section);
  for(var i=0;i<items.length;i++){ if(items[i].subcategory===subcat) return items[i]; }
  return null;
}
function distLabel(item){
  var km=Number(item.distance_km),min=Number(item.drive_minutes_estimate);
  var parts=[];
  if(Number.isFinite(km))parts.push(km.toLocaleString("it-IT",{maximumFractionDigits:1})+" km");
  if(Number.isFinite(min))parts.push(min+(T.min_by_car||" min in auto"));
  return parts.join(" · ");
}
function isPlaceholderAirportName(name){
  var n = String(name || "").toLowerCase().trim();
  if(!n) return true;
  var placeholders = ["to be verified","da verificare","verificare","tbd","n/a","non disponibile","-"];
  for(var i = 0; i < placeholders.length; i++){
    if(n.indexOf(placeholders[i]) >= 0) return true;
  }
  return false;
}
function getNearestAirportInfo(){
  var manualName=clean(opportunity&&opportunity.nearest_airport);
  var manualDist=Number(opportunity&&opportunity.distance_to_airport_km);
  var manualValid = manualName && !isPlaceholderAirportName(manualName) && Number.isFinite(manualDist) && manualDist > 0;
  if(manualValid){
    var driveEstimate=Math.max(1,Math.round((manualDist/75)*60));
    return {name:manualName,distance_km:manualDist,drive_minutes_estimate:driveEstimate,manual:true};
  }
  var auto=nearestOfSubcategory("transport","commercial_airport");

/* ---- Punteggio sintetico: solo su aree con dati reali, pesi ridistribuiti sulle aree disponibili ---- */
function firstFiniteOpp(){for(var i=0;i<arguments.length;i++){var n=Number(arguments[i]);if(Number.isFinite(n)&&n!==0)return n;}return null;}
function getAssetSurfaceM2(){
  var o=opportunity||{};
  return firstFiniteOpp(o.internal_size,o.land_size);
}
function scoreFinancialArea(f,proj){
  var roi,breakEven;
  if(f.net>0&&f.total>0){ roi=f.roi; breakEven=f.breakEven; }
  else if(proj){ roi=proj.total>0?((proj.rows[0].net/proj.total)*100):0; breakEven=proj.breakEvenYear; }
  else return null;
  var s;
  if(roi<3)s=20;else if(roi<6)s=45;else if(roi<9)s=65;else if(roi<12)s=80;else s=95;
  if(breakEven>15)s-=15;else if(breakEven>0&&breakEven<=6)s+=5;
  return Math.max(0,Math.min(100,s));
}
function scoreMarketArea(f){
  var surface=getAssetSurfaceM2();
  if(!surface||!f.purchase)return null;
  var min=metricFromDossier("real_estate_market","residential_sale_per_m2_min");
  var max=metricFromDossier("real_estate_market","residential_sale_per_m2_max");
  if(!min&&!max)return null;
  var mid=(min&&max)?((min.value+max.value)/2):(min?min.value:max.value);
  if(!mid)return null;
  var assetPm2=f.purchase/surface;
  var ratio=assetPm2/mid;
  if(ratio<=0.7)return 95;if(ratio<=0.85)return 80;if(ratio<=1)return 65;if(ratio<=1.15)return 45;if(ratio<=1.3)return 30;return 15;
}
function scoreHospitalityArea(){
  var min=metricFromDossier("adr","average_daily_rate_min");
  var max=metricFromDossier("adr","average_daily_rate_max");
  var single=metricFromDossier("adr","average_daily_rate");
  if(!min&&!max&&!single)return null;
  var mid=(min&&max)?((min.value+max.value)/2):(min?min.value:(max?max.value:single.value));
  var base;
  if(mid<120)base=25;else if(mid<200)base=45;else if(mid<320)base=65;else if(mid<450)base=80;else if(mid<650)base=90;else base=97;
  var richCount=sortedItems("hospitality").filter(function(i){return ["resort","boutique_luxury","masseria"].indexOf(i.subcategory)>=0;}).length;
  var bonus=richCount>=3?10:(richCount>=1?5:0);
  return Math.max(0,Math.min(100,base+bonus));
}
function scoreAccessArea(){
  var airport=getNearestAirportInfo();
  var rail=nearestOfSubcategory("transport","railway_station");
  if(!airport&&!rail)return null;

function deepFind(obj, keys){
  var wanted=keys.map(function(k){return String(k).toLowerCase();});
  var seen=new Set();
  function walk(x){
    if(!x||typeof x!=="object"||seen.has(x))return 0;
    seen.add(x);
    if(Array.isArray(x)){
      for(var i=0;i<x.length;i++){var r=walk(x[i]);if(Number.isFinite(r)&&r!==0)return r;}
      return 0;
    }
    for(var k in x){
      if(!Object.prototype.hasOwnProperty.call(x,k))continue;
      var lk=String(k).toLowerCase();
      if(wanted.indexOf(lk)>=0){
        var n=Number(String(x[k]).replace(/[^\d,.-]/g,"").replace(/\./g,"").replace(",","."));
        if(Number.isFinite(n)&&n!==0)return n;
      }
    }
    for(var k2 in x){var r2=walk(x[k2]);if(Number.isFinite(r2)&&r2!==0)return r2;}
    return 0;
  }
  return walk(obj);
}

function renderXlsxSourceDiagnosticsHTML(){

    return '<div class="debug-item"><div class="debug-label">Fonti dati XLSX — diagnostica</div><div class="debug-value">Disponibile solo dopo un fetch live: usa "Aggiorna dati territoriali" in questa sessione per vederla.</div></div>';
  }

  }
  var tablesSample=lastDiscoveryDiagnostics.tables_sample||[];
  var lines=docs.map(function(d){
    var refUrl=d.final_url||d.requested_url||"";
    var shortName=refUrl.split("/").pop()||refUrl;
    if(d.skipped){
      return escapeHTML(shortName)+": SCARTATO — "+escapeHTML(d.skip_reason||"motivo sconosciuto");
    }
    var tablesCount=Number(d.tables_count)||0;
    if(!tablesCount){
      return escapeHTML(shortName)+": fetch ok, 0 tabelle trovate nel parsing XLSX";
    }
    var related=tablesSample.filter(function(t){ return t && t.url && (t.url===d.final_url||t.url===d.requested_url); });
    /* NOTE (fix): t.category/t.confidence do NOT hold the table classification -- the backend
       spreads {category:c, ...t} where c is the discovery-pipeline loop category ("tourism",
       "tourism_pricing", "economy", each of which re-fetches and re-parses the same file
       independently), so t.category was always the pipeline category name and t.confidence
       was always undefined/0. The real classification is nested at t.classification.category /
       t.classification.confidence. Also dedupe: the same table is classified identically once
       per pipeline category, so without dedup the same real classification would repeat 3x. */
    var seenClassif={};
    var dedupedRelated=related.filter(function(t){
      var cls=t.classification||{};
      var k=(cls.category||"unknown")+"|"+t.index;
      if(seenClassif[k]) return false;
      seenClassif[k]=true;
      return true;
    });
    var classifText=dedupedRelated.length
      ? dedupedRelated.map(function(t){ var cls=t.classification||{}; return escapeHTML((cls.category||"unknown")+" ("+Math.round((cls.confidence||0)*100)+"%)"); }).join(", ")
      : "classificazione non nel campione (oltre il limite di 12 tabelle mostrate)";
    related=dedupedRelated;
    var summary=escapeHTML(shortName)+": "+tablesCount+" tabell"+(tablesCount===1?"a":"e")+" trovat"+(tablesCount===1?"a":"e")+" \u2192 "+classifText;
    if(related.length){
      var rawBlocks=related.map(function(t){
        var rows=Array.isArray(t.sample)?t.sample.slice(0,3):[];
        if(!rows.length) return "";
        var rowsText=rows.map(function(r){

          var joined=cells.map(function(c){ var s=String(c==null?"":c); return s.length>18?(s.slice(0,18)+"\u2026"):s; }).join(" | ");
          return joined.length>90?(joined.slice(0,90)+"\u2026"):joined;
        });

/* ---- Documenti caricati lato admin: solo quelli spuntati "Includi nel dossier", mostrati a piena
   pagina. I PDF vengono rasterizzati in immagini lato client (pdf.js) così in stampa non compare
   mai la toolbar/miniature del visualizzatore nativo del browser — ogni pagina del PDF diventa una
   pagina del dossier. Se la rasterizzazione fallisce (CORS, file protetto, libreria non caricata),
   si ricade sull'iframe col toolbar disattivato via query string come ultima risorsa. ---- */
var DOCUMENT_TYPE_LABELS = {};
function buildDocumentTypeLabels(){
  DOCUMENT_TYPE_LABELS = {
    owner_identity:T.doc_owner_identity, owner_tax_code:T.doc_owner_tax_code,
    deed_of_origin:T.doc_deed_of_origin, cadastral_report:T.doc_cadastral_report,
    cadastral_plan:T.doc_cadastral_plan, ape:T.doc_ape,
    urban_planning:T.doc_urban_planning, technical_conformity:T.doc_technical_conformity,
    habitability:T.doc_habitability, systems_certifications:T.doc_systems_certifications
  };
}
function docLabel(d){ return DOCUMENT_TYPE_LABELS[d.document_type] || d.document_type || T.doc_default; }
function docFileName(d){ return clean(d.file_name); }
function docUrl(d){ return clean(d.file_url); }
function docKind(d){
  var mime=(d.mime_type||"").toLowerCase();
  var name=(d.file_name||"").toLowerCase();
  if(mime.indexOf("pdf")>=0 || /\.pdf$/.test(name)) return "pdf";
  if(mime.indexOf("image")>=0 || /\.(jpe?g|png|webp|gif)$/.test(name)) return "image";
  return "other";
}
async function rasterizePdfPages(url, maxPages){
  maxPages = maxPages || 20;
  if(!window["pdfjsLib"]) return {images:null, error:"Libreria pdf.js non caricata nella pagina (script CDN bloccato o non raggiungibile)."};
  try{
    var loadingTask = pdfjsLib.getDocument({url:url, withCredentials:false});
    var pdf = await loadingTask.promise;
    var pageCount = Math.min(pdf.numPages, maxPages);
    var images = [];
    for(var i=1;i<=pageCount;i++){
      var page = await pdf.getPage(i);
      var viewport = page.getViewport({scale:2});
      var canvas = document.createElement("canvas");
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      var ctx2d = canvas.getContext("2d");
      await page.render({canvasContext:ctx2d, viewport:viewport}).promise;
      images.push(canvas.toDataURL("image/jpeg", 0.92));
    }
    return {images:images, error:null};
  }catch(e){
    var msg = String((e && (e.message||e.name)) || e || "errore sconosciuto");
    console.error("Impossibile rasterizzare il PDF per la stampa:", url, e);
    return {images:null, error:msg};
  }
}
async function renderDocumentFullPage(d,index,total){
  var url=docUrl(d); if(!url) return [];
  var kind=docKind(d);
  var title=docLabel(d)+(total>1?(" ("+index+"/"+total+")"):"");
  function titleBarFor(pageNum,pageTotal){
    var suffix = pageTotal>1 ? (T.doc_page_suffix+pageNum+"/"+pageTotal) : "";
    return '<div class="doc-page-title"><span>'+escapeHTML(title+suffix)+'</span><span>'+escapeHTML(docFileName(d))+'</span></div>';
  }
  if(kind==="image"){
    return ['<article class="report-page pattern">'+titleBarFor(1,1)+'<img class="doc-full-img" src="'+escapeHTML(url)+'" alt="'+escapeHTML(title)+'"></article>'];
  }
  if(kind==="pdf"){
    var rasterResult = await rasterizePdfPages(url, 20);
    if(rasterResult && rasterResult.images && rasterResult.images.length){
      var images = rasterResult.images;
      return images.map(function(imgSrc,i){
        return '<article class="report-page pattern">'+titleBarFor(i+1,images.length)+'<img class="doc-full-img" src="'+imgSrc+'" alt="'+escapeHTML(title)+'"></article>';
      });
    }
    if(debugDocumentsInfo) debugDocumentsInfo.pdf_rasterization_failures.push(docLabel(d)+" ("+(docFileName(d)||"senza nome file")+") — causa: "+((rasterResult&&rasterResult.error)||"sconosciuta")+" — url: "+url);
    return ['<article class="report-page pattern">'+titleBarFor(1,1)+'<iframe class="doc-full-frame" src="'+escapeHTML(url)+'#toolbar=0&navpane=0&view=FitH"></iframe></article>'];
  }
  return ['<article class="report-page"><div class="page-inner"><div class="section-kicker">'+escapeHTML(T.kicker_property)+'</div><h2 class="section-title">'+escapeHTML(title)+'</h2><div class="lux-rule"></div><p class="info-text">'+fmt(T.doc_unavailable_format,{name:escapeHTML(docFileName(d))})+'</p></div></article>'];
}
async function renderDocumentsPages(){
  var included=propertyDocuments.filter(function(d){return d.include_in_dossier===true;});
  var missingUrl=included.filter(function(d){ return !docUrl(d); });
  debugDocumentsInfo={
    total:propertyDocuments.length,
    included:included.length,
    missing_url:missingUrl.map(function(d){ return docLabel(d)+" ("+(docFileName(d)||"senza nome file")+")"; }),
    rendered_pages:0,
    pdf_rasterization_failures:[]
  };
  if(!included.length) return [];
  var byType={};
  included.forEach(function(d){ var t=d.document_type||"other"; (byType[t]=byType[t]||[]).push(d); });
  var pages=[];
  for(var i=0;i<included.length;i++){
    var d=included[i];
    var siblings=byType[d.document_type||"other"];
    var idx=siblings.indexOf(d)+1;
    var docPages=await renderDocumentFullPage(d, idx, siblings.length);
    docPages.forEach(function(p){ if(p) pages.push(p); });
  }
  debugDocumentsInfo.rendered_pages=pages.length;
  return pages;
}

/* ---- Rendita & proiezione 15 anni: due scenari indipendenti (ADR minimo / ADR massimo) quando
   entrambi i valori sono disponibili, così il break-even non dipende in modo invisibile da quale
   dei due venga usato per la media. Ipotesi sempre dichiarate, mai inventate. ---- */
function getAssetUnits(){
  var o=opportunity||{};
  var n=firstFiniteOpp(o.bedrooms);
  return n && n>0 ? n : 1;
}
function getOccupancyAssumption(){
  var occ=metricFromDossier("adr","occupancy");
  if(occ&&occ.value)return {value:occ.value>1?occ.value/100:occ.value,verified:true};
  return {value:0.5,verified:false};
}
var CASHFLOW_ANNUAL_GROWTH = 0.02;
var CASHFLOW_OPEX_RATIO = 0.32;
var BREAK_EVEN_EXTRAPOLATION_CAP_YEARS = 60;
function computeBreakEvenYear(rows, total, baseRevenue){
  for(var i=0;i<rows.length;i++){ if(rows[i].cum>=total) return {year:rows[i].year, extrapolated:false}; }
  var lastRow = rows[rows.length-1];
  var cum = lastRow ? lastRow.cum : 0;
  var startYear = lastRow ? lastRow.year : 0;
  for(var y=startYear+1; y<=BREAK_EVEN_EXTRAPOLATION_CAP_YEARS; y++){
    var revenue = baseRevenue*Math.pow(1+CASHFLOW_ANNUAL_GROWTH,y-1);
    var costs = revenue*CASHFLOW_OPEX_RATIO;
    var net = revenue-costs;
    cum += net;
    if(cum>=total) return {year:y, extrapolated:true};
  }
  return {year:null, extrapolated:true};
}
function buildOneCashflowProjection(baseRevenue, revenueSource, adrVerified, total){
  var rows=[];
  var cum=0;
  for(var y=1;y<=15;y++){
    var revenue = baseRevenue*Math.pow(1+CASHFLOW_ANNUAL_GROWTH,y-1);
    var costs = revenue*CASHFLOW_OPEX_RATIO;
    var net = revenue-costs;
    cum+=net;
    rows.push({year:y,revenue:revenue,costs:costs,net:net,cum:cum});
  }
  var be=computeBreakEvenYear(rows, total, baseRevenue);
  return {rows:rows, revenueSource:revenueSource, adrVerified:adrVerified, total:total, breakEvenYear:be.year, breakEvenExtrapolated:be.extrapolated};
}
function buildCashflowProjections(){
  var f=buildFinance();
  var adrMin=metricFromDossier("adr","average_daily_rate_min");
  var adrMax=metricFromDossier("adr","average_daily_rate_max");
  var adrSingle=metricFromDossier("adr","average_daily_rate");
  var units=getAssetUnits();
  var occ=getOccupancyAssumption();

  function projFor(adrMetric, label){
    if(!adrMetric) return null;
    var adrVerified=!!(adrMetric.source && String(adrMetric.source.provider_name||"").toLowerCase().indexOf("analyst verified")>=0);
    var baseRevenue = adrMetric.value*occ.value*365*units;
    var revenueSource=(adrVerified?"ADR verificato dall\u2019analista":"ADR di mercato")+" ("+formatMetricVal(adrMetric.value)+" \u20ac/notte, "+label+") \u00d7 occupazione "+(occ.verified?"verificata":"assunta")+" \u00d7 "+units+" unit\u00e0";
    return buildOneCashflowProjection(baseRevenue, revenueSource, adrVerified, f.total);
  }

  if(adrMin || adrMax){
    return {mode:"range", min:projFor(adrMin || adrMax, "ADR minimo"), max:projFor(adrMax || adrMin, "ADR massimo"), total:f.total};
  }
  if(adrSingle){
    return {mode:"single", single:projFor(adrSingle, "ADR unico"), total:f.total};
  }
  if(f.revenue>0){
    return {mode:"real", single:buildOneCashflowProjection(f.revenue, "dato reale da report interno", false, f.total), total:f.total};
  }
  return null;
}
function renderCashflowPage(){
  var projs=buildCashflowProjections();
  if(!projs)return "";

  function tableBlock(proj, heading){
    if(!proj) return "";
    var rows=proj.rows.map(function(r){
      var isBE = proj.breakEvenYear!=null && !proj.breakEvenExtrapolated && r.year===proj.breakEvenYear;
      return '<tr'+(isBE?' class="be-row"':'')+'><td>'+r.year+(isBE?' \u2605':'')+'</td><td>'+escapeHTML(euro(r.revenue))+'</td><td>'+escapeHTML(euro(r.costs))+'</td><td>'+escapeHTML(euro(r.net))+'</td><td>'+escapeHTML(euro(r.cum))+'</td></tr>';
    }).join("");
    var breakEvenSentence;
    if(proj.breakEvenYear && proj.breakEvenExtrapolated){
      breakEvenSentence = fmt(T.breakeven_estimated_extrapolated,{year:proj.breakEvenYear});
    }else if(proj.breakEvenYear){
      breakEvenSentence = fmt(T.breakeven_estimated,{year:proj.breakEvenYear});
    }else{
      breakEvenSentence = T.breakeven_not_reached;
    }
    return '<div class="merge-block"><div class="cost-title" style="margin-bottom:10px">'+escapeHTML(heading)+'</div>'
      +'<p class="info-text" style="margin-top:0">'+escapeHTML(T.revenue_year1_prefix)+escapeHTML(proj.revenueSource)+'. '+escapeHTML(breakEvenSentence)+'</p>'
      +'<table class="cf-table"><thead><tr><th>'+escapeHTML(T.th_year)+'</th><th>'+escapeHTML(T.th_revenue)+'</th><th>'+escapeHTML(T.th_costs)+'</th><th>'+escapeHTML(T.th_profit)+'</th><th>'+escapeHTML(T.th_cumulative)+'</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }

  var intro='<p class="info-text">'+escapeHTML(fmt(T.cashflow_intro,{growth:percent(CASHFLOW_ANNUAL_GROWTH*100),opex:percent(CASHFLOW_OPEX_RATIO*100),total:euro(projs.total)}))+'</p>';
  function page(heading,blockHtml,showIntro){
    return '<article class="report-page"><div class="page-inner"><div class="section-kicker">'+escapeHTML(T.kicker_cashflow)+'</div><h2 class="section-title">'+escapeHTML(T.title_cashflow)+(heading?' \u2014 '+escapeHTML(heading):'')+'</h2><div class="lux-rule"></div>'
      +(showIntro?intro:'')
      +blockHtml
      +'</div></article>';
  }

  var pages=[];
  if(projs.mode==="range"){
    /* Two 15-row tables (one per scenario) never share a page: each one, plus its heading and
       intro paragraph, comfortably fits a single A4-landscape print page on its own, while both
       together routinely overflowed it. */
    if(projs.min) pages.push(page(T.scenario_min, tableBlock(projs.min,T.scenario_min), true));
    if(projs.max) pages.push(page(T.scenario_max, tableBlock(projs.max,T.scenario_max), !projs.min));
  }else{
    pages.push(page("", tableBlock(projs.single, projs.mode==="real" ? T.scenario_real_data : T.scenario_adr), true));
  }
  return pages;
}

/* ---- Serie storica turismo: solo dati reali multi-anno da Discovery ---- */
var FORECAST_GROWTH_CAP_PCT = 15;
function barChartHTML(series,unitLabel){
  var max=Math.max.apply(null, series.map(function(s){return Number(s.value)||0;}));
  if(!max) return "";
  return '<div class="bar-chart">'+series.map(function(s){
    var h=Math.max(2, Math.round((Number(s.value)/max)*150));
    return '<div class="bar-col"><div class="bar-val">'+formatMetricVal(s.value)+'</div><div class="bar" style="height:'+h+'px"></div><div class="bar-year">'+escapeHTML(s.year)+'</div></div>';
  }).join("")+'</div><p class="info-text" style="margin-top:2px;font-size:11px">'+escapeHTML(unitLabel)+'</p>';
}
function renderTourismSeriesPage(){
  var series=metricSeriesFromDossier("tourism","arrivals_series") || metricSeriesFromDossier("tourism","overnight_stays_series");
  if(!series || !series.series || series.series.length<2) return "";
  var rows=series.series.map(function(s,i){
    var yoy=series.yoy.find(function(y){return y.year===s.year;});
    return '<tr><td>'+escapeHTML(s.year)+'</td><td>'+escapeHTML(formatMetricVal(s.value))+'</td><td>'+(yoy?escapeHTML(percent(yoy.growth_pct)):'-')+'</td></tr>';
  }).join("");
  var src=series.series[series.series.length-1].source||{};
  return '<article class="report-page"><div class="page-inner"><div class="section-kicker">'+escapeHTML(T.kicker_tourism_history)+'</div><h2 class="section-title">'+escapeHTML(T.title_tourism_history)+'</h2><div class="lux-rule"></div>'
    +barChartHTML(series.series,T.presences_arrivals_label+escapeHTML(series.geography_name||series.geography_level||"-"))
    +'<table class="trend-table"><thead><tr><th>'+escapeHTML(T.th_year)+'</th><th>'+escapeHTML(T.th_value)+'</th><th>'+escapeHTML(T.th_yoy)+'</th></tr></thead><tbody>'+rows+'</tbody></table>'
    +'<p class="info-text">'+(series.cagr_pct!=null?(escapeHTML(T.cagr_calculated)+escapeHTML(percent(series.cagr_pct))+escapeHTML(T.per_year)):escapeHTML(T.cagr_insufficient))+' '+escapeHTML(T.source_prefix)+escapeHTML(src.provider_name||"-")+'.'+escapeHTML(T.no_interpolation_note)+'</p>'
    +'</div></article>';
}
function renderTourismForecastPage(){
  var series=metricSeriesFromDossier("tourism","arrivals_series")||metricSeriesFromDossier("tourism","overnight_stays_series");
  if(!series || series.cagr_pct==null) return "";
  var rate=Math.max(-FORECAST_GROWTH_CAP_PCT, Math.min(FORECAST_GROWTH_CAP_PCT, series.cagr_pct));
  var capped = rate!==series.cagr_pct;
  var last=series.series[series.series.length-1];
  var lastYear=Number(last.year), lastVal=Number(last.value);
  var rows=[];
  var v=lastVal;
  for(var i=1;i<=5;i++){
    v=v*(1+rate/100);
    rows.push({year:lastYear+i, value:Math.round(v)});
  }
  return '<article class="report-page"><div class="page-inner"><div class="section-kicker">'+escapeHTML(T.kicker_tourism_forecast)+'</div><h2 class="section-title">'+escapeHTML(T.title_tourism_forecast)+'</h2><div class="lux-rule"></div>'
    +barChartHTML(rows,T.constant_rate_projection+escapeHTML(percent(rate))+"/anno")
    +'<table class="trend-table"><thead><tr><th>'+escapeHTML(T.th_year)+'</th><th>'+escapeHTML(T.th_projected_value)+'</th></tr></thead><tbody>'+rows.map(function(r){return '<tr><td>'+r.year+'</td><td>'+escapeHTML(formatMetricVal(r.value))+'</td></tr>';}).join("")+'</tbody></table>'
    +'<p class="info-text">'+escapeHTML(fmt(T.linear_projection_note,{cagr:percent(series.cagr_pct),cap:capped?fmt(T.limited_for_caution,{rate:percent(rate)}):""}))+'</p>'
    +'</div></article>';
}
function metricSeriesFromDossier(section,field){
  var d=dossierData||{};var bucket=d[section];if(!bucket)return null;
  var f=bucket[field];if(!f||typeof f!=="object"||!Array.isArray(f.series))return null;
  return f;
}

function renderBook(){
  pageTitle.textContent=getTitle();

  var chapters=[];
  function push(chapterLabel,html,isDivider){ if(html) chapters.push({label:chapterLabel,html:html,divider:!!isDivider}); }

  push(T.chapter_financial, dividerPageHTML(T.divider_financial_title,T.divider_financial_kicker), true);
  push(T.chapter_financial, renderInternalFacts());
  push(T.chapter_financial, renderFinancialSnapshot());
  push(T.chapter_financial, renderInvestmentStructure());
  renderCashflowPage().forEach(function(p){ push(T.chapter_financial, p); });

  var docPages = preparedDocumentPages;
  var renovationPages = renderRenovationBeforeAfterPages();
  var hasMedia = normalizeGallery(opportunity&&opportunity.gallery_images).length || clean(opportunity&&opportunity.cover_image) || docPages.length || renovationPages.length;
  if(hasMedia){
    push(T.chapter_property, dividerPageHTML(T.divider_property_title,T.divider_property_kicker), true);
    push(T.chapter_property, renderMediaGalleryPage());
    renovationPages.forEach(function(p){ push(T.chapter_property, p); });
    docPages.forEach(function(p){ push(T.chapter_property, p); });
  }

  push(T.chapter_territory, dividerPageHTML(T.divider_territory_title,T.divider_territory_kicker), true);
  push(T.chapter_territory, renderLocationPage());
  push(T.chapter_territory, renderTerritorialAndTourismPage());
  push(T.chapter_territory, renderMarketAndADRPage());
  push(T.chapter_territory, renderTourismSeriesPage());
  push(T.chapter_territory, renderTourismForecastPage());

  var ecoSections=[["hospitality",T.eco_hospitality,T.eco_hospitality_kicker],["restaurants",T.eco_restaurants,T.eco_restaurants_kicker],["beaches",T.eco_beaches,T.eco_beaches_kicker],["marinas",T.eco_marinas,T.eco_marinas_kicker],["heritage",T.eco_heritage,T.eco_heritage_kicker],["nightlife",T.eco_nightlife,T.eco_nightlife_kicker]];
  var ecoPages=[];
  var airportsPage=renderCategoryPageFiltered("transport",["commercial_airport"],T.airport_title,T.airport_category);
  if(airportsPage) ecoPages.push(airportsPage);
  var groundTransportPage=renderCategoryPageFiltered("transport",["railway_station","passenger_port","bus_station","taxi_shuttle","transport_node"],T.transport_title,T.transport_category);
  if(groundTransportPage) ecoPages.push(groundTransportPage);
  ecoSections.forEach(function(s){ var p=renderCategoryPage(s[0],s[1],s[2]); if(p) ecoPages.push(p); });
  if(ecoPages.length){
    push(T.chapter_ecosystem, dividerPageHTML(T.divider_ecosystem_title,T.divider_ecosystem_kicker), true);
    ecoPages.forEach(function(p){push(T.chapter_ecosystem,p);});
  }

  var narrHtml=renderNarrativePage();
  var scoreHtml=renderScorePage();
  if(narrHtml||scoreHtml){
    push(T.chapter_evaluation, dividerPageHTML(T.divider_evaluation_title,T.divider_evaluation_kicker), true);
    push(T.chapter_evaluation, narrHtml);
    push(T.chapter_evaluation, scoreHtml);
  }

  push(T.chapter_sources, dividerPageHTML(T.divider_sources_title,T.divider_sources_kicker), true);
  push(T.chapter_sources, renderSourcesPage());
  push(T.chapter_sources, renderClosingPage());

  var tocEntries=[];
  var seenChapters={};
  chapters.forEach(function(c,idx){
    if(!seenChapters[c.label]){ seenChapters[c.label]=true; tocEntries.push({label:c.label,page:idx+2}); }
  });

  var totalNumbered = chapters.length + 1;
  var finalHtml = renderCover();
  finalHtml += injectFolio(renderTOCPage(tocEntries),1,totalNumbered,false);
  chapters.forEach(function(c,idx){
    finalHtml += injectFolio(c.html, idx+2, totalNumbered, c.divider);
  });
  finalHtml += renderDebugBootstrap();

  book.innerHTML = finalHtml;
}

async function init(){
  try{
    await applyLanguage(params.get("lang") || "it");
    setStatus("Caricamento dati interni IMMONOVA...","");
    await checkAuth();
    await loadOpportunity();
    await Promise.all([loadLatestReport(),loadPropertyDocuments(),loadRenovationImagesData(),loadRenovationRendersData()]);
    destinationPhotos = await loadDestinationPhotos();
    destinationPhotoIndex = 0;
    await ensureDossier();
    setStatus("Preparazione documenti per la stampa (rasterizzazione PDF in corso se presenti)...","");
    preparedDocumentPages = await renderDocumentsPages();
    renderBook();
    var srcNote=dossierSource==="report"?"dati territoriali dal report salvato":dossierSource==="live"?"dati territoriali recuperati in tempo reale dal Discovery Engine":"nessun dato territoriale disponibile";
    var photoNote=destinationPhotos.length?(destinationPhotos.length+" foto destinazione trovat"+(destinationPhotos.length===1?"a":"e")+(destinationPhotos.length>1?", mostrate a rotazione tra le pagine divisorie":""))
      :"nessuna foto destinazione caricata per questa zona — pagine divisorie mostrate con il pattern grafico IMMONOVA";
    setStatus("Dossier generato: "+srcNote+"; "+photoNote+". Nessun rating o testo inventato: solo dati reali e calcoli espliciti.","success");
  }catch(e){
    console.error(e);
    book.innerHTML='<div class="empty">Errore: '+escapeHTML(e.message||e)+'</div>';
    setStatus(String(e.message||e),"error");
  }
}
if(loadBtn)loadBtn.addEventListener("click",init);
if(refreshDossierBtn)refreshDossierBtn.addEventListener("click",forceRefreshDossier);
if(logoutBtn)logoutBtn.addEventListener("click",async function(){await client.auth.signOut();window.location.href="../index.html";});
init();
</script>
