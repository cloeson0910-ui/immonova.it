<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMMONOVA | Investment Dossier</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --sand:#f4ecdf;
      --sand2:#fbf7ef;
      --paper:#fffdf8;
      --ink:#423b2d;
      --muted:#7b705e;
      --gold:#a58139;
      --gold2:#c8a85a;
      --line:rgba(165,129,57,.26);
      --soft:rgba(165,129,57,.08);
      --danger:#8a3b2e;
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--sand);color:var(--ink);font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif}

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-2;
      background:
        radial-gradient(circle at 22% 12%,rgba(255,255,255,.75),rgba(255,255,255,.18) 36%,transparent 66%),
        radial-gradient(circle at 85% 82%,rgba(255,255,255,.55),rgba(255,255,255,.10) 34%,transparent 70%),
        var(--sand);
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      opacity:.32;
      background:
        linear-gradient(60deg,transparent 0 78px,rgba(165,129,57,.18) 79px 80px,transparent 81px 158px),
        linear-gradient(120deg,transparent 0 78px,rgba(165,129,57,.14) 79px 80px,transparent 81px 158px);
      background-size:158px 158px;
      pointer-events:none;
    }

    .topbar{
      position:sticky;top:0;z-index:50;
      display:flex;align-items:center;justify-content:space-between;gap:18px;
      padding:16px 26px;
      background:rgba(244,236,223,.88);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
    }
    .brand{letter-spacing:.42em;color:var(--gold);font-weight:300;font-size:18px;text-transform:uppercase}
    .actions{display:flex;gap:10px;align-items:center}
    button{border:1px solid var(--gold);background:transparent;color:var(--gold);padding:10px 14px;letter-spacing:.14em;text-transform:uppercase;font-size:11px;cursor:pointer}
    button:hover{background:rgba(165,129,57,.08)}
    .status{font-size:12px;color:var(--muted);letter-spacing:.08em}

    #app{padding:28px 0 80px}

    .page{
      width:297mm;
      height:210mm;
      margin:0 auto 28px;
      position:relative;
      overflow:hidden;
      background:rgba(255,253,248,.84);
      border:1px solid rgba(165,129,57,.14);
      box-shadow:0 18px 55px rgba(56,45,25,.10);
      page-break-after:always;
    }
    .page.pattern::before{
      content:"";position:absolute;inset:0;z-index:0;opacity:.28;
      background:
        linear-gradient(60deg,transparent 0 82px,rgba(165,129,57,.15) 83px 84px,transparent 85px 166px),
        linear-gradient(120deg,transparent 0 82px,rgba(165,129,57,.12) 83px 84px,transparent 85px 166px);
      background-size:166px 166px;
    }
    .page > *{position:relative;z-index:1}

    .page-inner{height:100%;padding:28mm 18mm 20mm;display:flex;flex-direction:column}
    .footer{position:absolute;left:18mm;right:18mm;bottom:13mm;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:5mm;color:rgba(66,59,45,.55);font-size:9px;letter-spacing:.28em;text-transform:uppercase}

    .cover{background:var(--sand);}
    .cover.has-image{background-size:cover;background-position:center}
    .cover.has-image::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(20,16,11,.72),rgba(20,16,11,.34),rgba(244,236,223,.10));z-index:0}
    .cover:not(.has-image)::before{content:"";position:absolute;inset:0;z-index:0;opacity:.38;background:
      linear-gradient(60deg,transparent 0 82px,rgba(165,129,57,.20) 83px 84px,transparent 85px 166px),
      linear-gradient(120deg,transparent 0 82px,rgba(165,129,57,.14) 83px 84px,transparent 85px 166px);
      background-size:166px 166px}
    .cover .page-inner{padding:25mm 23mm 20mm;justify-content:space-between}
    .logo{font-size:34px;letter-spacing:.48em;color:var(--gold);font-weight:200;text-transform:uppercase;margin-bottom:11mm}
    .eyebrow{font-size:11px;letter-spacing:.34em;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:8mm}
    .cover-title{max-width:190mm;font-size:43px;line-height:1.05;letter-spacing:.17em;color:var(--gold);font-weight:200;text-transform:uppercase}
    .cover-meta{display:flex;gap:16px;flex-wrap:wrap;color:var(--gold);letter-spacing:.24em;text-transform:uppercase;font-size:12px}
    .cover.has-image .logo,.cover.has-image .eyebrow,.cover.has-image .cover-title,.cover.has-image .cover-meta{color:#d2b66a;text-shadow:0 2px 20px rgba(0,0,0,.35)}

    h1,h2,h3,p{margin:0}
    .kicker{font-size:10px;letter-spacing:.32em;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:8px}
    .title{font-size:28px;letter-spacing:.24em;color:rgba(165,129,57,.58);font-weight:200;text-transform:uppercase;border-bottom:2px solid var(--gold);padding-bottom:12px;margin-bottom:24px}
    .note{color:var(--muted);font-size:15px;line-height:1.55;max-width:800px}
    .grid{display:grid;gap:14px}
    .grid.cols-3{grid-template-columns:repeat(3,1fr)}
    .grid.cols-4{grid-template-columns:repeat(4,1fr)}
    .card{border:1px solid rgba(165,129,57,.18);background:rgba(255,255,255,.35);padding:16px;min-height:88px}
    .card-label{font-size:10px;letter-spacing:.24em;color:var(--gold);font-weight:800;text-transform:uppercase;margin-bottom:10px}
    .card-value{font-size:30px;line-height:1;color:rgba(66,59,45,.72);font-weight:200}
    .card-sub{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.35}
    .error{border:1px solid rgba(138,59,46,.35);background:rgba(138,59,46,.06);padding:18px;color:var(--danger);line-height:1.45}
    .small{font-size:12px;color:var(--muted);line-height:1.45}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:11px;white-space:pre-wrap;background:rgba(255,255,255,.38);border:1px solid var(--line);padding:12px;max-height:210px;overflow:auto}

    @page{size:A4 landscape;margin:0}
    @media print{
      html,body{background:var(--sand)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      body::before,body::after{display:none}
      .topbar{display:none!important}
      #app{padding:0}
      .page{margin:0;width:297mm;height:210mm;box-shadow:none;border:none;break-after:page;page-break-after:always}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">IMMONOVA</div>
    <div class="actions">
      <span id="status" class="status">Caricamento dossier...</span>
      <button onclick="window.print()">Stampa / PDF</button>
    </div>
  </div>
  <main id="app"></main>

<script>
/* =========================================================
   IMMONOVA NEW VIEW · STEP 1
   COS'È: view.html pulito, base dossier, senza vecchio codice.
   DOVE VA: admin/view.html
   COSA FA ORA:
   - carica opportunity da Supabase
   - renderizza cover coerente IMMONOVA
   - se cover_image esiste usa foto; altrimenti sfondo beige triangoli
   - prepara orchestrazione Edge senza ancora stampare tutte le sezioni
   ========================================================= */

const SUPABASE_URL = window.SUPABASE_URL || "https://YOUR_PROJECT.supabase.co";
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || "YOUR_SUPABASE_ANON_KEY";
const EDGE_BASE = `${SUPABASE_URL}/functions/v1`;

const EDGE_NAMES = {
  location: "immonova-location-profile",
  accessibility: "immonova-accessibility-engine",
  poi: "immonova-poi-engine",
  heritage: "immonova-heritage-engine",
  coastal: "immonova-coastal-engine",
  destination: "immonova-destination-engine",
  evidence: "immonova-evidence-engine",
  publishing: "immonova-publishing-engine",
  blocks: "immonova-block-composer"
};

let sb = null;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

function qs(name){ return new URLSearchParams(location.search).get(name); }
function esc(v){ return String(v ?? "").replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function val(...items){ return items.find(v => v !== undefined && v !== null && String(v).trim() !== "") ?? ""; }
function fmtDate(d=new Date()){ return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function num(v){ const n = Number(v); return Number.isFinite(n) ? n : null; }

function page(content, cls="pattern"){
  return `<section class="page ${cls}">${content}</section>`;
}
function footer(label="CONFIDENTIAL INVESTMENT INTELLIGENCE"){
  return `<div class="footer"><span>IMMONOVA</span><span>${esc(label)}</span></div>`;
}

function opportunityTitle(o){ return val(o?.title, o?.name, "Investment Opportunity"); }
function opportunityLocation(o){ return val(o?.location, o?.city, o?.municipality, o?.address, ""); }
function opportunityCategory(o){ return val(o?.category, o?.investment_type, ""); }
function opportunityCover(o){ return val(o?.cover_image, o?.coverImage, Array.isArray(o?.gallery_images) ? o.gallery_images[0] : ""); }
function opportunityLat(o){ return num(val(o?.latitude, o?.lat)); }
function opportunityLng(o){ return num(val(o?.longitude, o?.lng)); }

function renderCover(o){
  const img = opportunityCover(o);
  const title = opportunityTitle(o);
  const loc = opportunityLocation(o);
  const cat = opportunityCategory(o);
  const style = img ? `style="background-image:url('${esc(img)}')"` : "";
  return page(`
    <div class="page-inner">
      <div>
        <div class="logo">IMMONOVA</div>
        <div class="eyebrow">Confidential Investment Dossier</div>
      </div>
      <div>
        <h1 class="cover-title">${esc(title)}</h1>
      </div>
      <div class="cover-meta">
        ${loc ? `<span>${esc(loc)}</span>` : ""}
        ${cat ? `<span>${esc(cat)}</span>` : ""}
        <span>Generato ${fmtDate()}</span>
      </div>
    </div>
  `, `cover ${img ? "has-image" : ""}`.trim()).replace('<section class="page cover', `<section ${style} class="page cover`);
}

function renderStep1Intro(o, edgeState){
  const lat = opportunityLat(o), lng = opportunityLng(o);
  const ready = lat !== null && lng !== null;
  return page(`
    <div class="page-inner">
      <div class="kicker">Nuovo view · step 1</div>
      <h2 class="title">Base Dossier</h2>
      <div class="grid cols-4" style="margin-bottom:22px">
        <div class="card"><div class="card-label">Asset</div><div class="card-value" style="font-size:22px;line-height:1.15">${esc(opportunityTitle(o))}</div></div>
        <div class="card"><div class="card-label">Location</div><div class="card-value" style="font-size:22px">${esc(opportunityLocation(o) || '-')}</div></div>
        <div class="card"><div class="card-label">Categoria</div><div class="card-value" style="font-size:22px">${esc(opportunityCategory(o) || '-')}</div></div>
        <div class="card"><div class="card-label">Coordinate</div><div class="card-value" style="font-size:18px">${ready ? `${lat}, ${lng}` : '-'}</div></div>
      </div>
      <p class="note">Questa è la nuova base pulita del dossier. Non contiene pezzi del vecchio view, non usa sfondo nero, non inventa sezioni: da qui aggiungiamo una pagina alla volta, mantenendo coerenza visiva IMMONOVA.</p>
      ${!ready ? `<div class="error" style="margin-top:20px"><strong>Coordinate mancanti.</strong><br>Le Edge territoriali verranno chiamate solo quando latitude/longitude sono disponibili sull'opportunità.</div>` : ""}
      <div style="margin-top:24px" class="small"><strong>Edge predisposte:</strong> ${Object.values(EDGE_NAMES).map(esc).join(' · ')}</div>
      ${edgeState ? `<div style="margin-top:14px" class="mono">${esc(JSON.stringify(edgeState,null,2))}</div>` : ""}
      ${footer()}
    </div>
  `);
}

async function getSessionToken(){
  try {
    const { data } = await sb.auth.getSession();
    return data?.session?.access_token || SUPABASE_ANON_KEY;
  } catch(e){ return SUPABASE_ANON_KEY; }
}

async function invokeEdge(name, payload){
  const token = await getSessionToken();
  const res = await fetch(`${EDGE_BASE}/${name}`, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${token}`, 'apikey':SUPABASE_ANON_KEY },
    body:JSON.stringify(payload)
  });
  const text = await res.text();
  let json = null;
  try { json = text ? JSON.parse(text) : null; } catch(e) { json = { raw:text }; }
  if(!res.ok) throw new Error(`${name} ${res.status}: ${text.slice(0,300)}`);
  return json;
}

async function loadOpportunity(){
  const id = qs('id');
  if(!id) throw new Error('Parametro id mancante nella URL. Esempio: view.html?id=19');
  if(!sb || SUPABASE_URL.includes('YOUR_PROJECT')) throw new Error('Configura SUPABASE_URL e SUPABASE_ANON_KEY nel file view.html.');
  const { data, error } = await sb.from('opportunities').select('*').eq('id', id).single();
  if(error) throw error;
  return data;
}

async function orchestrateStep1(o){
  const lat = opportunityLat(o), lng = opportunityLng(o);
  if(lat === null || lng === null) return { skipped:true, reason:'missing_coordinates' };
  // Step 1: solo health/predisposizione leggera. Le chiamate complete saranno abilitate nello Step 2.
  return {
    ready:true,
    payload_base:{ lat, lng, opportunity_id:o.id, title:opportunityTitle(o) },
    next_step:'Investment Snapshot + Financial Snapshot + Total Project Cost'
  };
}

async function main(){
  const app = document.getElementById('app');
  const status = document.getElementById('status');
  try{
    const opportunity = await loadOpportunity();
    status.textContent = 'Opportunità caricata';
    const edgeState = await orchestrateStep1(opportunity);
    app.innerHTML = renderCover(opportunity) + renderStep1Intro(opportunity, edgeState);
    status.textContent = 'Step 1 pronto';
  }catch(err){
    console.error(err);
    status.textContent = 'Errore';
    app.innerHTML = page(`
      <div class="page-inner">
        <div class="kicker">Errore caricamento</div>
        <h2 class="title">Dossier non generato</h2>
        <div class="error">${esc(err.message || err)}</div>
        ${footer()}
      </div>
    `);
  }
}
main();
</script>
</body>
</html>
