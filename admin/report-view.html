<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dossier | IMMONOVA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}
body{background:#f4ecdf;font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;color:#735f36}
body::before{content:"";position:fixed;inset:0;z-index:-2;background:radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),#f4ecdf}
body::after{content:"";position:fixed;inset:0;z-index:-1;background:repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);background-size:230px 199px;opacity:.30}
.header{padding:22px 42px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(166,127,52,.14);background:rgba(244,236,223,.76);backdrop-filter:blur(14px);position:sticky;top:0;z-index:10}
.logo{font-size:25px;letter-spacing:.18em;color:#a67f34;text-decoration:none;font-weight:300}.logo small{display:block;margin-top:6px;font-size:8px;font-weight:700;letter-spacing:.16em;color:#a58139}
.header-actions{display:flex;gap:12px;flex-wrap:wrap}.header-actions a,.header-actions button{padding:10px 15px;border:1px solid rgba(166,127,52,.28);background:rgba(255,255,255,.26);color:#a67f34;text-decoration:none;cursor:pointer;font-size:10px;letter-spacing:.16em;text-transform:uppercase}
.container{max-width:1320px;margin:auto;padding:38px 42px 80px}.topbar{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:24px}.kicker{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#9a793c;margin-bottom:10px}.title{font-size:38px;font-weight:200;letter-spacing:.06em;color:#a67f34}.actions{display:flex;gap:12px;flex-wrap:wrap}.btn{padding:12px 18px;border:1px solid #a67f34;background:#a67f34;color:white;text-decoration:none;letter-spacing:.16em;text-transform:uppercase;font-size:10px;cursor:pointer}.btn.secondary{background:transparent;color:#a67f34}.status{min-height:22px;margin:16px 0 22px;font-size:13px}.error{color:#9c2f2f}.success{color:#4f7f45}.book{background:rgba(255,255,255,.24);border:1px solid rgba(166,127,52,.18);box-shadow:0 24px 70px rgba(127,100,48,.08)}
.report-page{position:relative;width:100%;min-height:720px;background:#fffdf8;border-bottom:1px solid rgba(166,127,52,.12);overflow:hidden}.report-page.pattern{background:#f4ecdf}.report-page.pattern::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.30) 42%,rgba(244,236,223,.06) 75%),#f4ecdf;z-index:0}.report-page.pattern::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);background-size:230px 199px;opacity:.34;z-index:0}.page-inner{position:relative;z-index:2;padding:54px}.cover{height:720px;display:flex;flex-direction:column;justify-content:space-between}.cover.with-image{color:white}.cover.with-image::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(31,22,8,.78),rgba(31,22,8,.48),rgba(31,22,8,.10));z-index:1}.cover-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}.brand{font-size:31px;letter-spacing:.20em;color:#a67f34;font-weight:300}.cover.with-image .brand,.cover.with-image .cover-kicker,.cover.with-image .cover-title,.cover.with-image .cover-meta{color:#f1d27a}.brand-sub{margin-top:8px;font-size:9px;letter-spacing:.22em;color:#a58139;text-transform:uppercase}.cover-kicker{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#a67f34;margin-bottom:22px}.cover-title{max-width:930px;font-size:54px;line-height:1.08;font-weight:200;letter-spacing:.08em;text-transform:uppercase;color:#a67f34}.cover-meta{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#8f7643;line-height:2}.debug-panel{padding:28px;border-top:1px solid rgba(166,127,52,.15);background:rgba(255,255,255,.36)}.debug-title{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#a67f34;margin-bottom:12px}.debug-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.debug-item{border:1px solid rgba(166,127,52,.16);padding:14px;background:rgba(255,255,255,.35)}.debug-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#a58139;margin-bottom:8px}.debug-value{font-size:13px;color:#735f36;word-break:break-word}.empty{padding:42px;color:#8f7643}
@media(max-width:800px){.header{flex-direction:column;gap:16px;padding:22px}.container{padding:28px 20px}.topbar{display:block}.actions{margin-top:18px}.cover-title{font-size:34px}.debug-grid{grid-template-columns:1fr}.page-inner{padding:34px}}
@media print{@page{size:A4 landscape;margin:0}html,body{width:297mm;min-height:210mm;background:white!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}body::before,body::after,.header,.topbar,.actions,.status{display:none!important}.container{width:297mm;max-width:none;margin:0;padding:0}.book{width:297mm;border:0;box-shadow:none;background:white}.report-page{width:297mm;height:210mm;min-height:210mm;page-break-after:always;break-after:page;border-bottom:0}.report-page:last-child{page-break-after:auto;break-after:auto}.page-inner{padding:18mm}.cover{height:210mm}.cover-title{font-size:33pt;max-width:180mm}.brand{font-size:19pt}.brand-sub{font-size:6pt}.cover-kicker{font-size:8pt}.cover-meta{font-size:8pt}.debug-panel{display:none}}
</style>
</head>
<body>
<header class="header">
  <a class="logo" href="../index.html">IMMONOVA<small>OFF MARKET • CONSULTING</small></a>
  <div class="header-actions">
    <a href="dashboard.html">Dashboard</a>
    <a href="opportunities.html">Proposte</a>
    <button id="logoutBtn" type="button">Logout</button>
  </div>
</header>
<main class="container">
  <div class="topbar">
    <div>
      <div class="kicker">Investment Book · Clean View Step 1</div>
      <h1 class="title" id="pageTitle">Dossier</h1>
    </div>
    <div class="actions">
      <button class="btn" id="loadBtn" type="button">Ricarica dati</button>
      <button class="btn secondary" onclick="window.print()" type="button">Stampa / PDF</button>
      <a class="btn secondary" id="editLink" href="#">Torna alla proposta</a>
    </div>
  </div>
  <div id="status" class="status"></div>
  <section id="book" class="book"><div class="empty">Caricamento dossier...</div></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script>
var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var params = new URLSearchParams(window.location.search);
var opportunityId = params.get("id");
var requestId = params.get("request_id");
var requestedLanguage = (params.get("lang") || "it").toLowerCase();
var clientName = params.get("client") || "";
var statusBox = document.getElementById("status");
var book = document.getElementById("book");
var pageTitle = document.getElementById("pageTitle");
var editLink = document.getElementById("editLink");
var loadBtn = document.getElementById("loadBtn");
var logoutBtn = document.getElementById("logoutBtn");
var currentUser = null;
var opportunity = null;
var report = null;
var renovationRenders = [];
var propertyDocuments = [];
function escapeHTML(value){return String(value===null||value===undefined?"":value).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#039;");}
function number(value){var n=Number(value);if(!Number.isFinite(n))return "-";return new Intl.NumberFormat("it-IT").format(n);}
function euro(value){var n=Number(value);if(!Number.isFinite(n))return "-";return new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n);}
function percent(value){var n=Number(value);if(!Number.isFinite(n))return "-";return n.toFixed(1).replace(".",",")+"%";}
function clean(v){return String(v||"").trim();}
function setStatus(message,type){statusBox.className="status "+(type||"");statusBox.textContent=message||"";}
function normalizeGallery(value){if(!value)return[];if(Array.isArray(value))return value.filter(Boolean);try{var p=JSON.parse(value);return Array.isArray(p)?p.filter(Boolean):[]}catch(e){return[]}}
function getTitle(){return clean(opportunity&&opportunity.title)||clean(report&&report.title)||"Dossier IMMONOVA";}
function getLocation(){return clean(opportunity&&opportunity.location)||clean(report&&report.location)||clean(opportunity&&opportunity.city)||"";}
function getCategory(){return clean(opportunity&&opportunity.category)||clean(report&&report.category)||"";}
function getCoverImage(){var gallery=normalizeGallery(opportunity&&opportunity.gallery_images);return clean(opportunity&&opportunity.cover_image)||clean(report&&report.cover_image)||gallery[0]||"";}
function getGeneratedDate(){var d=(report&&report.created_at)||(opportunity&&opportunity.created_at)||new Date().toISOString();try{return new Intl.DateTimeFormat("it-IT").format(new Date(d));}catch(e){return "";}}
async function checkAuth(){var sessionRes=await client.auth.getSession();var session=sessionRes&&sessionRes.data&&sessionRes.data.session;if(!session){window.location.href="login.html";return null;}currentUser=session.user;return session;}
async function loadOpportunity(){if(!opportunityId)throw new Error("ID opportunità mancante nella URL.");var res=await client.from("opportunities").select("*").eq("id",opportunityId).single();if(res.error)throw res.error;opportunity=res.data;if(editLink)editLink.href="opportunity-form.html?id="+encodeURIComponent(opportunityId);}
async function loadLatestReport(){var res=await client.from("investment_reports").select("*").eq("opportunity_id",opportunityId).order("created_at",{ascending:false}).limit(1).maybeSingle();if(!res.error&&res.data)report=res.data;}
async function loadRenovationRenders(){var res=await client.from("opportunity_renovation_renders").select("*").eq("opportunity_id",opportunityId).order("created_at",{ascending:false});renovationRenders=(!res.error&&Array.isArray(res.data))?res.data:[];}
async function loadPropertyDocuments(){var res=await client.from("opportunity_documents").select("*").eq("opportunity_id",opportunityId).order("created_at",{ascending:false});propertyDocuments=(!res.error&&Array.isArray(res.data))?res.data:[];}
function renderCover(){var cover=getCoverImage();var withImage=!!cover;return '<article class="report-page '+(withImage?'':'pattern')+' cover '+(withImage?'with-image':'')+'">'+(withImage?'<img class="cover-bg" src="'+escapeHTML(cover)+'" alt="">':'')+'<div class="page-inner cover">'+'<div><div class="brand">IMMONOVA</div><div class="brand-sub">Off Market • Consulting</div></div>'+'<div><div class="cover-kicker">Confidential Investment Dossier</div><h1 class="cover-title">'+escapeHTML(getTitle())+'</h1></div>'+'<div class="cover-meta">'+[getLocation(),getCategory(),"Generato "+getGeneratedDate()].filter(Boolean).map(escapeHTML).join('<br>')+'</div>'+'</div></article>';}
function renderDebugBootstrap(){return '<div class="debug-panel"><div class="debug-title">Step 1 · Bootstrap dati interni</div><div class="debug-grid">'+'<div class="debug-item"><div class="debug-label">Opportunity ID</div><div class="debug-value">'+escapeHTML(opportunityId)+'</div></div>'+'<div class="debug-item"><div class="debug-label">Report</div><div class="debug-value">'+(report?'presente':'non presente')+'</div></div>'+'<div class="debug-item"><div class="debug-label">Render AI</div><div class="debug-value">'+number(renovationRenders.length)+'</div></div>'+'<div class="debug-item"><div class="debug-label">Documenti</div><div class="debug-value">'+number(propertyDocuments.length)+'</div></div>'+'</div></div>';}
function renderBook(){pageTitle.textContent=getTitle();book.innerHTML=renderCover()+renderDebugBootstrap();}
async function init(){try{setStatus("Caricamento dati interni IMMONOVA...","");await checkAuth();await loadOpportunity();await Promise.all([loadLatestReport(),loadRenovationRenders(),loadPropertyDocuments()]);renderBook();setStatus("Step 1 completato: configurazione, Supabase e dati interni caricati.","success");}catch(e){console.error(e);book.innerHTML='<div class="empty">Errore: '+escapeHTML(e.message||e)+'</div>';setStatus(String(e.message||e),"error");}}
if(loadBtn)loadBtn.addEventListener("click",init);
if(logoutBtn)logoutBtn.addEventListener("click",async function(){await client.auth.signOut();window.location.href="../index.html";});
init();
</script>
</body>
</html>
