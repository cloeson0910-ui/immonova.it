<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dossier IA | IMMONOVA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
  color:#7f6430;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.30;
}

.header{
  padding:24px 42px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(166,127,52,.14);
  background:rgba(244,236,223,.72);
  backdrop-filter:blur(14px);
  position:sticky;
  top:0;
  z-index:10;
}

.logo{
  text-decoration:none;
  color:#a67f34;
}

.logo-main{
  font-size:24px;
  font-weight:600;
  letter-spacing:.35em;
}

.logo-sub{
  margin-top:6px;
  font-size:9px;
  font-weight:700;
  letter-spacing:.18em;
  color:#a58139;
}

.header-actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.header-actions a,
.header-actions button{
  padding:11px 18px;
  border:1px solid rgba(166,127,52,.28);
  background:rgba(255,255,255,.26);
  color:#a67f34;
  text-decoration:none;
  cursor:pointer;
  font-size:11px;
  letter-spacing:.16em;
  text-transform:uppercase;
}

.container{
  max-width:1320px;
  margin:auto;
  padding:46px 42px 80px;
}

.kicker{
  font-size:11px;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:#9a793c;
  margin-bottom:12px;
}

.title{
  font-size:46px;
  font-weight:200;
  letter-spacing:.06em;
  color:#a67f34;
  margin-bottom:20px;
}

.subtitle{
  max-width:880px;
  font-size:15px;
  line-height:1.8;
  color:#8f7643;
  margin-bottom:34px;
}

.actions{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:34px;
}

.btn{
  padding:14px 24px;
  border:1px solid #a67f34;
  background:#a67f34;
  color:white;
  text-decoration:none;
  letter-spacing:.18em;
  text-transform:uppercase;
  font-size:11px;
  cursor:pointer;
}

.btn.secondary{
  background:transparent;
  color:#a67f34;
}

.status{
  margin-bottom:24px;
  font-size:13px;
  min-height:20px;
}

.error{color:#9c2f2f}
.success{color:#4f7f45}

.book{
  background:rgba(255,255,255,.24);
  border:1px solid rgba(166,127,52,.18);
  box-shadow:0 24px 70px rgba(127,100,48,.08);
}

.cover{
  min-height:520px;
  padding:70px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-bottom:1px solid rgba(166,127,52,.16);
  background:
    linear-gradient(135deg,rgba(255,255,255,.36),rgba(255,255,255,.06)),
    rgba(166,127,52,.06);
}

.cover-label{
  font-size:12px;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:#a67f34;
}

.cover-title{
  font-size:56px;
  font-weight:200;
  letter-spacing:.08em;
  color:#a67f34;
  text-transform:uppercase;
  max-width:920px;
  line-height:1.15;
}

.cover-meta{
  font-size:13px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:#8f7643;
  line-height:2;
}

.kpi-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  padding:34px;
  border-bottom:1px solid rgba(166,127,52,.14);
}

.kpi{
  padding:24px;
  border:1px solid rgba(166,127,52,.16);
  background:rgba(255,255,255,.18);
}

.kpi-label{
  font-size:10px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#8f7643;
  margin-bottom:10px;
}

.kpi-value{
  font-size:32px;
  font-weight:200;
  color:#a67f34;
}

.section{
  padding:42px;
  border-bottom:1px solid rgba(166,127,52,.12);
}

.section h2{
  font-size:25px;
  font-weight:300;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#a67f34;
  margin-bottom:18px;
}

.section p{
  font-size:15px;
  line-height:1.85;
  color:#735f36;
  white-space:pre-line;
}

.table{
  width:100%;
  border-collapse:collapse;
  margin-top:18px;
}

.table th,
.table td{
  padding:13px;
  border-bottom:1px solid rgba(166,127,52,.13);
  text-align:left;
  font-size:13px;
}

.table th{
  color:#a67f34;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-size:10px;
}

.two-cols{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

.disclaimer{
  padding:36px 42px;
  font-size:12px;
  line-height:1.8;
  color:#8f7643;
  background:rgba(166,127,52,.07);
}

@media(max-width:1000px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .two-cols{grid-template-columns:1fr}
}

@media(max-width:700px){
  .header{flex-direction:column;gap:18px;padding:24px 22px}
  .container{padding:34px 22px}
  .cover{padding:42px 28px;min-height:420px}
  .cover-title{font-size:36px}
  .kpi-grid{grid-template-columns:1fr;padding:24px}
  .section{padding:30px 24px}
}

@media print{
  body{background:white}
  body::before,body::after,.header,.actions,.status{display:none}
  .container{max-width:none;padding:0}
  .book{box-shadow:none;border:none}
  .cover,.section,.disclaimer{break-inside:avoid}
}
</style>
</head>

<body>

<header class="header">
  <a href="../index.html" class="logo">
    <div class="logo-main">IMMONOVA</div>
    <div class="logo-sub">OFF MARKET • CONSULTING</div>
  </a>

  <div class="header-actions">
    <a href="dashboard.html">Dashboard</a>
    <a href="opportunities.html">Proposte</a>
    <button id="logoutBtn">Logout</button>
  </div>
</header>

<main class="container">

  <div class="kicker">Investment Book</div>
  <h1 class="title">Dossier IA</h1>

  <p class="subtitle">
    Analisi economica preliminare con KPI, andamento turistico, mercato immobiliare,
    forecast, messa a reddito, break-even e rischio.
  </p>

  <div class="actions">
    <button class="btn" id="generateBtn">Genera / Rigenera Dossier</button>
    <button class="btn secondary" onclick="window.print()">Stampa / Salva PDF</button>
    <a class="btn secondary" id="editLink" href="#">Torna alla Proposta</a>
  </div>

  <div id="status" class="status"></div>

  <section class="book" id="book">
    <div class="empty">Caricamento dossier...</div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const params = new URLSearchParams(window.location.search);
const opportunityId = params.get("id");

const statusBox = document.getElementById("status");
const book = document.getElementById("book");
const generateBtn = document.getElementById("generateBtn");
const editLink = document.getElementById("editLink");

let currentUser = null;
let opportunity = null;
let report = null;

function escapeHTML(value){
  return String(value ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function euro(value){
  const n = Number(value);
  if(!Number.isFinite(n)) return "-";
  return new Intl.NumberFormat("it-IT", {
    style:"currency",
    currency:"EUR",
    maximumFractionDigits:0
  }).format(n);
}

function percent(value){
  const n = Number(value);
  if(!Number.isFinite(n)) return "-";
  return n.toFixed(1).replace(".", ",") + "%";
}

function number(value){
  const n = Number(value);
  if(!Number.isFinite(n)) return "-";
  return new Intl.NumberFormat("it-IT").format(n);
}

function setStatus(message,type){
  statusBox.className = "status " + (type || "");
  statusBox.textContent = message || "";
}

async function checkAuth(){
  const { data:{ session }, error } = await client.auth.getSession();

  if(error || !session){
    window.location.href = "login.html";
    return false;
  }

  currentUser = session.user;
  return true;
}

async function checkAdmin(){
  const { data, error } = await client
    .from("profiles")
    .select("role")
    .eq("id", currentUser.id)
    .single();

  if(error || !data || data.role !== "admin"){
    window.location.href = "dashboard.html";
    return false;
  }

  return true;
}

async function loadOpportunity(){
  const { data, error } = await client
    .from("opportunities")
    .select("*")
    .eq("id", opportunityId)
    .single();

  if(error || !data){
    throw new Error("Opportunità non trovata.");
  }

  opportunity = data;
  editLink.href = "opportunity-edit.html?id=" + encodeURIComponent(opportunityId);
}

async function loadReport(){
  const { data, error } = await client
    .from("opportunity_reports")
    .select("*")
    .eq("opportunity_id", opportunityId)
    .order("generated_at", { ascending:false })
    .limit(1)
    .maybeSingle();

  if(error){
    throw error;
  }

  report = data;
  renderReport();
}

function renderTable(rows, columns){
  if(!rows || rows.length === 0) return "";

  return `
    <table class="table">
      <thead>
        <tr>
          ${columns.map(c => `<th>${escapeHTML(c.label)}</th>`).join("")}
        </tr>
      </thead>
      <tbody>
        ${rows.map(row => `
          <tr>
            ${columns.map(c => `<td>${escapeHTML(c.format ? c.format(row[c.key]) : row[c.key])}</td>`).join("")}
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

function renderReport(){
  if(!report){
    book.innerHTML = `
      <div class="section">
        <h2>Dossier non ancora generato</h2>
        <p>Premi “Genera / Rigenera Dossier” per creare il primo investment book IA di questa proprietà.</p>
      </div>
    `;
    return;
  }

  const json = report.report_json || {};
  const kpi = json.kpi || {};
  const tourism = report.tourism_data || [];
  const market = report.real_estate_data || [];
  const forecast = report.forecast_data || [];
  const risk = report.risk_data || {};

  book.innerHTML = `
    <div class="cover">
      <div class="cover-label">IMMONOVA · Confidential Investment Dossier</div>

      <div>
        <div class="cover-title">${escapeHTML(opportunity.title || "Investment Opportunity")}</div>
      </div>

      <div class="cover-meta">
        ${escapeHTML(opportunity.location || "")}<br>
        ${escapeHTML(opportunity.category || "")}<br>
        Generated ${escapeHTML(new Date(report.generated_at).toLocaleDateString("it-IT"))}
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-label">Investment Score</div>
        <div class="kpi-value">${number(report.investment_score)}/100</div>
      </div>

      <div class="kpi">
        <div class="kpi-label">ROI stimato</div>
        <div class="kpi-value">${percent(report.estimated_roi)}</div>
      </div>

      <div class="kpi">
        <div class="kpi-label">Break-even</div>
        <div class="kpi-value">${number(report.break_even_years)} anni</div>
      </div>

      <div class="kpi">
        <div class="kpi-label">Rivalutazione 5Y</div>
        <div class="kpi-value">${percent(report.projected_revaluation_5y_percent)}</div>
      </div>
    </div>

    <div class="section">
      <h2>Executive Summary</h2>
      <p>${escapeHTML(report.executive_summary)}</p>
    </div>

    <div class="section">
      <h2>Analisi Asset</h2>
      <p>${escapeHTML(report.property_description)}</p>
    </div>

    <div class="section">
      <h2>KPI Economici</h2>
      ${renderTable([
        {label:"ADR stimato",value:euro(report.adr_estimate)},
        {label:"Occupazione stimata",value:percent(report.occupancy_rate_estimate)},
        {label:"RevPAR stimato",value:euro(report.revpar_estimate)},
        {label:"Ricavi annui",value:euro(report.annual_revenue_estimate)},
        {label:"Costi annui",value:euro(report.annual_cost_estimate)},
        {label:"Reddito netto annuo",value:euro(report.net_annual_income_estimate)},
        {label:"Valore previsto 5Y",value:euro(report.projected_value_5y)}
      ],[
        {key:"label",label:"Parametro"},
        {key:"value",label:"Valore"}
      ])}
    </div>

    <div class="section">
      <h2>Attrattività Territoriale</h2>
      <p>${escapeHTML(report.location_attractiveness)}</p>
    </div>

    <div class="two-cols section">
      <div>
        <h2>Turismo ultimi 5 anni</h2>
        <p>${escapeHTML(report.tourism_last_5y)}</p>
        ${renderTable(tourism,[
          {key:"year",label:"Anno"},
          {key:"arrivals",label:"Arrivi",format:number},
          {key:"presences",label:"Presenze",format:number},
          {key:"growth_percent",label:"Crescita",format:percent}
        ])}
      </div>

      <div>
        <h2>Mercato immobiliare</h2>
        <p>${escapeHTML(report.real_estate_market_past)}</p>
        ${renderTable(market,[
          {key:"year",label:"Anno"},
          {key:"average_price_sqm",label:"€/mq",format:euro},
          {key:"growth_percent",label:"Crescita",format:percent}
        ])}
      </div>
    </div>

    <div class="section">
      <h2>Forecast 5 anni</h2>
      <p>${escapeHTML(report.real_estate_market_forecast)}</p>
      ${renderTable(forecast,[
        {key:"year",label:"Anno"},
        {key:"projected_market_growth_percent",label:"Crescita prevista",format:percent},
        {key:"projected_asset_value",label:"Valore previsto",format:euro}
      ])}
    </div>

    <div class="section">
      <h2>Rivalutazione</h2>
      <p>${escapeHTML(report.revaluation_forecast_5y)}</p>
    </div>

    <div class="section">
      <h2>Affitto breve</h2>
      <p>${escapeHTML(report.short_rental_analysis)}</p>
    </div>

    <div class="section">
      <h2>Break-even</h2>
      <p>${escapeHTML(report.break_even_analysis)}</p>
    </div>

    <div class="section">
      <h2>Analisi Rischio</h2>
      <p>${escapeHTML(report.risk_analysis)}</p>
      ${renderTable([
        {label:"Market Risk",value:risk.market_risk},
        {label:"Liquidity Risk",value:risk.liquidity_risk},
        {label:"Operational Risk",value:risk.operational_risk},
        {label:"Regulatory Risk",value:risk.regulatory_risk},
        {label:"Seasonality Risk",value:risk.seasonality_risk},
        {label:"Global Risk Score",value:risk.global_risk_score}
      ],[
        {key:"label",label:"Rischio"},
        {key:"value",label:"Valutazione"}
      ])}
    </div>

    <div class="section">
      <h2>SWOT Analysis</h2>
      <p>${escapeHTML(report.swot_analysis)}</p>
    </div>

    <div class="disclaimer">
      Documento riservato IMMONOVA. Analisi generata con supporto IA su base modellistica preliminare.
      I dati non costituiscono offerta, consulenza finanziaria, legale o fiscale. Ogni decisione di investimento
      richiede due diligence autonoma e verifica documentale, tecnica, urbanistica, fiscale e commerciale.
    </div>
  `;
}

generateBtn.addEventListener("click", async () => {
  setStatus("Generazione dossier in corso...", "");
  generateBtn.disabled = true;
  generateBtn.textContent = "Generazione...";

  try{
    const { data, error } = await client.functions.invoke("generate-investment-report", {
      body:{ opportunity_id:Number(opportunityId) }
    });

    if(error || !data?.success){
      throw new Error(data?.message || error?.message || "Errore generazione dossier.");
    }

    report = data.report;
    renderReport();
    setStatus("Dossier generato correttamente.", "success");

  }catch(error){
    setStatus(error.message || "Errore generazione dossier.", "error");
  }

  generateBtn.disabled = false;
  generateBtn.textContent = "Genera / Rigenera Dossier";
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await client.auth.signOut();
  window.location.href = "../index.html";
});

(async function init(){
  try{
    if(!opportunityId){
      throw new Error("ID opportunità mancante.");
    }

    const logged = await checkAuth();

    if(logged){
      const admin = await checkAdmin();

      if(admin){
        await loadOpportunity();
        await loadReport();
      }
    }
  }catch(error){
    setStatus(error.message, "error");
    book.innerHTML = "";
  }
})();
</script>

</body>
</html>
