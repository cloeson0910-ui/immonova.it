<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMMONOVA | Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
  color:#7f6430;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.3;
}

.header{
  padding:24px 42px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(166,127,52,.14);
  background:rgba(244,236,223,.72);
  backdrop-filter:blur(14px);
  position:sticky;
  top:0;
  z-index:10;
}

.logo{
  text-decoration:none;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

.logo-svg{
  width:230px;
  height:auto;
  display:block;
}

.logo-fill{
  fill:none;
  stroke:url(#goldGradientHeader);
  stroke-width:3.2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.logo-i{
  fill:url(#goldGradientHeader);
}

.logo-line{
  width:78%;
  height:1px;
  margin:5px auto 0;
  background:linear-gradient(to right,transparent,rgba(197,157,72,.78),transparent);
}

.logo-sub{
  margin-top:5px;
  color:#a58139;
  font-size:8px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.header-actions{
  display:flex;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
}

.nav-link,
.logout{
  padding:11px 18px;
  border:1px solid rgba(166,127,52,.28);
  background:rgba(255,255,255,.26);
  color:#a67f34;
  text-decoration:none;
  cursor:pointer;
  font-size:11px;
  letter-spacing:.16em;
  text-transform:uppercase;
}

.nav-link:hover,
.logout:hover{
  background:#a67f34;
  color:#fff;
}

.admin-only{
  display:none;
}

.container{
  max-width:1450px;
  margin:0 auto;
  padding:46px 42px 70px;
}

.kicker{
  font-size:11px;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:#9a793c;
  margin-bottom:12px;
}

.title{
  font-size:46px;
  font-weight:200;
  letter-spacing:.06em;
  color:#a67f34;
  margin-bottom:26px;
}

.alert{
  display:none;
  margin-bottom:34px;
  padding:22px 24px;
  border:1px solid rgba(166,127,52,.26);
  background:rgba(166,127,52,.10);
  color:#7f6430;
}

.alert strong{
  color:#a67f34;
}

.stats{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:22px;
  margin-bottom:42px;
}

.card{
  background:rgba(255,255,255,.22);
  backdrop-filter:blur(10px);
  padding:28px;
  border:1px solid rgba(166,127,52,.16);
  box-shadow:0 24px 70px rgba(127,100,48,.07);
}

.card-label{
  font-size:11px;
  letter-spacing:.22em;
  text-transform:uppercase;
  margin-bottom:12px;
}

.card-value{
  font-size:38px;
  font-weight:200;
  color:#a67f34;
}

.actions{
  display:flex;
  gap:16px;
  margin-bottom:28px;
  flex-wrap:wrap;
}

.btn{
  padding:15px 24px;
  background:#a67f34;
  color:white;
  text-decoration:none;
  letter-spacing:.18em;
  text-transform:uppercase;
  font-size:11px;
  border:1px solid #a67f34;
  cursor:pointer;
}

.btn.secondary{
  background:transparent;
  color:#a67f34;
}

.search-row{
  margin-bottom:42px;
}

.search-input{
  width:100%;
  padding:17px 18px;
  border:1px solid rgba(166,127,52,.20);
  background:rgba(255,255,255,.25);
  color:#7f6430;
  outline:none;
  font-size:14px;
}

.dashboard-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:28px;
}

.section-title{
  font-size:13px;
  letter-spacing:.24em;
  text-transform:uppercase;
  color:#9a793c;
  margin-bottom:16px;
}

.panel,
.table-wrapper{
  background:rgba(255,255,255,.22);
  backdrop-filter:blur(10px);
  border:1px solid rgba(166,127,52,.16);
  box-shadow:0 24px 70px rgba(127,100,48,.07);
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  padding:18px;
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
  border-bottom:1px solid rgba(166,127,52,.15);
  color:#8c6d34;
  white-space:nowrap;
}

td{
  padding:18px;
  border-bottom:1px solid rgba(166,127,52,.08);
  font-size:14px;
}

.badge{
  display:inline-block;
  padding:7px 11px;
  border:1px solid rgba(166,127,52,.22);
  font-size:10px;
  letter-spacing:.13em;
  text-transform:uppercase;
}

.badge.da_verificare{background:rgba(166,127,52,.12);color:#8a682c}
.badge.da_revisionare{background:rgba(150,92,35,.12);color:#8f5b28}
.badge.approvato{background:rgba(72,118,72,.12);color:#517a4f}
.badge.rifiutato{background:rgba(130,45,38,.10);color:#8f3f2d}

.action-link{
  color:#a67f34;
  text-decoration:none;
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
}

.side-list{
  padding:22px;
}

.side-item{
  padding:18px 0;
  border-bottom:1px solid rgba(166,127,52,.10);
}

.side-item:last-child{
  border-bottom:none;
}

.side-title{
  color:#a67f34;
  font-size:15px;
  margin-bottom:7px;
}

.side-meta{
  font-size:12px;
  line-height:1.7;
  opacity:.8;
}

.empty,
.error{
  padding:38px;
  text-align:center;
  opacity:.72;
}

@media(max-width:1150px){
  .stats{grid-template-columns:1fr 1fr}
  .dashboard-grid{grid-template-columns:1fr}
}

@media(max-width:760px){
  .header{
    padding:24px 22px;
    flex-direction:column;
    gap:18px;
  }

  .logo{
    align-items:center;
  }

  .logo-svg{
    width:250px;
  }

  .header-actions{
    justify-content:center;
  }

  .container{
    padding:34px 22px 54px;
  }

  .title{font-size:34px}
  .stats{grid-template-columns:1fr}
  .actions{flex-direction:column}
  .btn{text-align:center}
  .table-wrapper{overflow-x:auto}
  table{min-width:900px}
}
</style>
</head>

<body>

<header class="header">
  <a href="../index.html" class="logo" aria-label="IMMONOVA Home">
    <svg class="logo-svg" viewBox="0 0 1120 135" xmlns="http://www.w3.org/2000/svg" aria-label="IMMONOVA">
      <defs>
        <linearGradient id="goldGradientHeader" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#8f6f2c"/>
          <stop offset="42%" stop-color="#c79c43"/>
          <stop offset="58%" stop-color="#f1d27a"/>
          <stop offset="100%" stop-color="#a77d31"/>
        </linearGradient>
      </defs>

      <rect class="logo-i" x="35" y="20" width="5" height="95" rx="2.5"/>
      <path class="logo-fill" d="M105 115 L105 20 L155 115 L205 20 L205 115" />
      <path class="logo-fill" d="M265 115 L265 20 L315 115 L365 20 L365 115" />
      <ellipse class="logo-fill" cx="465" cy="67.5" rx="48" ry="48" />
      <path class="logo-fill" d="M555 115 L555 20 L635 115 L635 20" />
      <ellipse class="logo-fill" cx="735" cy="67.5" rx="48" ry="48" />
      <path class="logo-fill" d="M810 20 L860 115 L910 20" />
      <path class="logo-fill" d="M915 115 L965 20 L1015 115" />
    </svg>

    <div class="logo-line"></div>
    <span class="logo-sub">OFF MARKET • CONSULTING</span>
  </a>

  <div class="header-actions">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="opportunities.html" class="nav-link">Opportunità</a>
    <a href="users.html" class="nav-link admin-only">Utenti</a>
    <button class="logout" id="logoutBtn">Logout</button>
  </div>
</header>

<main class="container">

  <div class="kicker" id="roleLabel">Area Riservata</div>
  <h1 class="title">Dashboard</h1>

  <div class="alert" id="adminAlert"></div>

  <section class="stats">
    <div class="card">
      <div class="card-label">Totali</div>
      <div class="card-value" id="totalCount">0</div>
    </div>

    <div class="card">
      <div class="card-label">Da Verificare</div>
      <div class="card-value" id="verifyCount">0</div>
    </div>

    <div class="card">
      <div class="card-label">Da Revisionare</div>
      <div class="card-value" id="reviewCount">0</div>
    </div>

    <div class="card">
      <div class="card-label">Approvate</div>
      <div class="card-value" id="approvedCount">0</div>
    </div>

    <div class="card">
      <div class="card-label">Rifiutate</div>
      <div class="card-value" id="rejectedCount">0</div>
    </div>
  </section>

  <div class="actions">
    <a href="opportunity-form.html" class="btn">Nuova Proposta</a>
    <a href="opportunities.html" class="btn secondary">Gestisci Proposte</a>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" class="search-input" placeholder="Cerca per titolo, categoria, location o stato...">
  </div>

  <div class="dashboard-grid">

    <section>
      <div class="section-title">Proposte</div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Titolo</th>
              <th>Categoria</th>
              <th>Location</th>
              <th>Stato</th>
              <th>Pubblicata</th>
              <th>Azione</th>
            </tr>
          </thead>

          <tbody id="opportunitiesTable">
            <tr>
              <td colspan="6" class="empty">Caricamento...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <aside>
      <div class="section-title" id="sideTitle">Ultime Proposte</div>

      <div class="panel">
        <div class="side-list" id="sideList">
          <div class="empty">Caricamento...</div>
        </div>
      </div>
    </aside>

  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

let currentUser = null;
let currentProfile = null;
let isAdmin = false;
let allOpportunities = [];

const table = document.getElementById("opportunitiesTable");
const searchInput = document.getElementById("searchInput");
const adminAlert = document.getElementById("adminAlert");
const sideList = document.getElementById("sideList");
const sideTitle = document.getElementById("sideTitle");
const roleLabel = document.getElementById("roleLabel");

function escapeHTML(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function statusLabel(status){
  const labels = {
    da_verificare:"Da verificare",
    da_revisionare:"Da revisionare",
    approvato:"Approvato",
    rifiutato:"Rifiutato"
  };

  return labels[status] || "Da verificare";
}

async function checkAuth(){
  const { data:{ session }, error } = await client.auth.getSession();

  if(error || !session){
    window.location.href = "login.html";
    return false;
  }

  currentUser = session.user;
  return true;
}

async function loadProfile(){
  const { data, error } = await client
    .from("profiles")
    .select("id,email,full_name,role")
    .eq("id", currentUser.id)
    .single();

  if(error){
    console.error(error);
    return;
  }

  currentProfile = data;
  isAdmin = currentProfile?.role === "admin";

  roleLabel.textContent = isAdmin ? "Area Admin" : "Area Utente";

  document.querySelectorAll(".admin-only").forEach(el => {
    el.style.display = isAdmin ? "inline-block" : "none";
  });
}

async function loadDashboard(){
  const { data, error } = await client
    .from("opportunities")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    console.error(error);

    table.innerHTML = `
      <tr>
        <td colspan="6" class="error">Errore nel caricamento delle proposte.</td>
      </tr>
    `;

    return;
  }

  allOpportunities = data || [];

  updateStats(allOpportunities);
  renderAdminAlert(allOpportunities);
  renderOpportunities(allOpportunities);
  renderSidePanel(allOpportunities);
}

function updateStats(items){
  const total = items.length;
  const daVerificare = items.filter(o => o.review_status === "da_verificare").length;
  const daRevisionare = items.filter(o => o.review_status === "da_revisionare").length;
  const approvate = items.filter(o => o.review_status === "approvato").length;
  const rifiutate = items.filter(o => o.review_status === "rifiutato").length;

  document.getElementById("totalCount").textContent = total;
  document.getElementById("verifyCount").textContent = daVerificare;
  document.getElementById("reviewCount").textContent = daRevisionare;
  document.getElementById("approvedCount").textContent = approvate;
  document.getElementById("rejectedCount").textContent = rifiutate;
}

function renderAdminAlert(items){
  if(!isAdmin){
    adminAlert.style.display = "none";
    return;
  }

  const pending = items.filter(o => o.review_status === "da_verificare").length;

  if(pending === 0){
    adminAlert.style.display = "none";
    return;
  }

  adminAlert.style.display = "block";
  adminAlert.innerHTML = `
    <strong>${pending}</strong> nuove proposte da verificare.
    <a class="action-link" href="opportunities.html?status=da_verificare">Controlla ora</a>
  `;
}

function renderOpportunities(items){
  if(items.length === 0){
    table.innerHTML = `
      <tr>
        <td colspan="6" class="empty">Nessuna proposta presente</td>
      </tr>
    `;
    return;
  }

  table.innerHTML = items.slice(0,10).map(o => `
    <tr>
      <td>${escapeHTML(o.title)}</td>
      <td>${escapeHTML(o.category)}</td>
      <td>${escapeHTML(o.location)}</td>
      <td>
        <span class="badge ${escapeHTML(o.review_status || "da_verificare")}">
          ${statusLabel(o.review_status)}
        </span>
      </td>
      <td>${o.published ? "Sì" : "No"}</td>
      <td>
        <a class="action-link" href="opportunity-edit.html?id=${encodeURIComponent(o.id)}">
          ${isAdmin ? "Valuta" : "Apri"}
        </a>
      </td>
    </tr>
  `).join("");
}

function renderSidePanel(items){
  const source = isAdmin
    ? items.filter(o => o.review_status === "da_verificare")
    : items.slice(0,5);

  sideTitle.textContent = isAdmin ? "Da Verificare" : "Le Tue Ultime Proposte";

  if(source.length === 0){
    sideList.innerHTML = `
      <div class="empty">
        ${isAdmin ? "Nessuna proposta da verificare" : "Nessuna proposta recente"}
      </div>
    `;
    return;
  }

  sideList.innerHTML = source.slice(0,5).map(o => `
    <div class="side-item">
      <div class="side-title">${escapeHTML(o.title || "Proposta")}</div>
      <div class="side-meta">
        ${escapeHTML(o.location || "")}<br>
        <span class="badge ${escapeHTML(o.review_status || "da_verificare")}">
          ${statusLabel(o.review_status)}
        </span><br>
        <a class="action-link" href="opportunity-edit.html?id=${encodeURIComponent(o.id)}">
          ${isAdmin ? "Valuta proposta" : "Vedi proposta"}
        </a>
      </div>
    </div>
  `).join("");
}

searchInput.addEventListener("input", () => {
  const query = searchInput.value.trim().toLowerCase();

  const filtered = allOpportunities.filter(o => {
    return [
      o.title,
      o.category,
      o.location,
      statusLabel(o.review_status),
      o.review_status
    ].some(value => String(value || "").toLowerCase().includes(query));
  });

  renderOpportunities(filtered);
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await client.auth.signOut();
  window.location.href = "../index.html";
});

(async function init(){
  const logged = await checkAuth();

  if(logged){
    await loadProfile();
    await loadDashboard();
  }
})();
</script>

</body>
</html>
