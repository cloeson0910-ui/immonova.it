<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Richiedi Dossier | IMMONOVA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}

body{
  background:#f4ecdf;
  font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
  color:#7f6430;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.72) 0%,rgba(255,255,255,.34) 38%,rgba(244,236,223,.06) 72%),
    #f4ecdf;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    repeating-linear-gradient(60deg,transparent 0 86px,rgba(188,149,78,.23) 87px,transparent 90px),
    repeating-linear-gradient(-60deg,transparent 0 86px,rgba(188,149,78,.22) 87px,transparent 90px),
    repeating-linear-gradient(0deg,transparent 0 148px,rgba(188,149,78,.13) 149px,transparent 152px);
  background-size:230px 199px;
  opacity:.30;
}

.header{
  padding:46px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  text-decoration:none;
  color:#a67f34;
  font-size:24px;
  font-weight:300;
  letter-spacing:.35em;
}

.back{
  text-decoration:none;
  color:#a67f34;
  font-size:11px;
  letter-spacing:.24em;
  text-transform:uppercase;
}

.container{
  max-width:980px;
  margin:40px auto 90px;
  padding:0 28px;
}

.panel{
  border:1px solid rgba(166,127,52,.18);
  background:rgba(255,255,255,.16);
  backdrop-filter:blur(10px);
  padding:46px;
}

.kicker{
  font-size:11px;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:#a67f34;
  margin-bottom:12px;
}

h1{
  font-size:42px;
  font-weight:200;
  letter-spacing:.07em;
  color:#a67f34;
  margin-bottom:18px;
}

.intro{
  font-size:15px;
  line-height:1.8;
  color:#8f7643;
  margin-bottom:34px;
}

.opportunity-box{
  margin-bottom:34px;
  padding:18px 20px;
  border:1px solid rgba(166,127,52,.18);
  background:rgba(255,255,255,.18);
  color:#8f7643;
  font-size:13px;
  line-height:1.7;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.field.full{
  grid-column:1 / -1;
}

label{
  font-size:10px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#a58139;
}

input,
textarea{
  width:100%;
  padding:15px 16px;
  border:1px solid rgba(165,129,57,.25);
  background:rgba(255,252,244,.35);
  color:#7f6430;
  font-size:14px;
  outline:none;
  font-family:inherit;
}

textarea{
  min-height:120px;
  resize:vertical;
}

.checks{
  margin-top:28px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.check{
  display:flex;
  gap:12px;
  align-items:flex-start;
  font-size:13px;
  color:#8f7643;
  line-height:1.6;
}

.check input{
  width:auto;
  margin-top:5px;
}

.check a{
  color:#a67f34;
}

.actions{
  margin-top:34px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

button.primary,
a.secondary{
  padding:14px 28px;
  border:1px solid rgba(165,129,57,.42);
  background:rgba(255,252,244,.22);
  backdrop-filter:blur(8px);
  color:#a58139;
  text-decoration:none;
  text-transform:uppercase;
  font-size:11px;
  font-weight:500;
  letter-spacing:.22em;
  cursor:pointer;
}

button.primary:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.status{
  margin-top:22px;
  min-height:20px;
  font-size:13px;
  line-height:1.7;
}

.success{color:#4f7f45}
.error{color:#9c2f2f}

.footer{
  padding:55px 30px;
  text-align:center;
  font-size:11px;
  letter-spacing:.24em;
  text-transform:uppercase;
  color:#a67f34;
}

@media(max-width:760px){
  .header{
    padding:32px 22px;
    flex-direction:column;
    gap:18px;
  }

  .panel{
    padding:34px 24px;
  }

  h1{
    font-size:34px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .actions{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<header class="header">
  <a href="index.html" class="logo">IMMONOVA</a>
  <a href="opportunities.html" class="back">Opportunities</a>
</header>

<main class="container">

  <section class="panel">

    <div class="kicker">Confidential Access</div>

    <h1>Richiedi Dossier</h1>

    <p class="intro">
      Compila il modulo per richiedere l’accesso al dossier riservato relativo
      all’opportunità selezionata. Il materiale è soggetto ad accettazione NDA.
    </p>

    <div class="opportunity-box" id="opportunityBox">
      Opportunità selezionata: caricamento...
    </div>

    <form id="dossierForm">

      <div class="form-grid">

        <div class="field">
          <label for="first_name">Nome *</label>
          <input type="text" id="first_name" required>
        </div>

        <div class="field">
          <label for="last_name">Cognome *</label>
          <input type="text" id="last_name" required>
        </div>

        <div class="field">
          <label for="email">Email *</label>
          <input type="email" id="email" required>
        </div>

        <div class="field">
          <label for="phone">Telefono *</label>
          <input type="tel" id="phone" required>
        </div>

        <div class="field">
          <label for="company">Società</label>
          <input type="text" id="company">
        </div>

        <div class="field">
          <label for="role">Ruolo</label>
          <input type="text" id="role">
        </div>

        <div class="field full">
          <label for="country">Paese</label>
          <input type="text" id="country">
        </div>

        <div class="field full">
          <label for="message">Messaggio</label>
          <textarea id="message"></textarea>
        </div>

      </div>

      <div class="checks">

        <label class="check">
          <input type="checkbox" id="privacy_accepted">
          <span>
            Ho letto e accetto la Privacy Policy.
          </span>
        </label>

        <label class="check">
          <input type="checkbox" id="nda_accepted">
          <span>
            Ho letto e accetto il
            <a href="nda.html" target="_blank">Non Disclosure Agreement</a>.
            Senza accettazione NDA la richiesta verrà registrata, ma il dossier non potrà essere inviato.
          </span>
        </label>

      </div>

      <div class="actions">
        <button type="submit" class="primary" id="submitBtn">Invia Richiesta</button>
        <a href="opportunities.html" class="secondary">Annulla</a>
      </div>

      <div id="status" class="status"></div>

    </form>

  </section>

</main>

<footer class="footer">
IMMONOVA · OFF MARKET CONSULTING
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

<script>
const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const params = new URLSearchParams(window.location.search);
const opportunityId = params.get("id") || params.get("opportunity_id");

const form = document.getElementById("dossierForm");
const statusBox = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");
const opportunityBox = document.getElementById("opportunityBox");

const NDA_TEXT_SNAPSHOT = `
IMMONOVA NDA V1.
L'utente dichiara di aver letto, compreso e accettato le condizioni di riservatezza pubblicate nella pagina nda.html.
Le informazioni ricevute sono confidenziali e possono essere utilizzate esclusivamente per valutare una potenziale operazione di investimento.
È vietata la divulgazione a terzi, la pubblicazione, la trasmissione o l'uso improprio delle informazioni ricevute.
È vietato contattare direttamente proprietari, gestori, operatori o soggetti collegati all'opportunità senza preventiva autorizzazione scritta di IMMONOVA.
`;

function escapeHTML(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function value(id){
  return document.getElementById(id).value.trim();
}

function checked(id){
  return document.getElementById(id).checked;
}

function setStatus(message, type){
  statusBox.className = "status " + (type || "");
  statusBox.innerHTML = message || "";
}

async function loadOpportunity(){
  if(!opportunityId){
    opportunityBox.innerHTML = "Opportunità selezionata: <strong>non specificata</strong>";
    return;
  }

  const { data, error } = await client
    .from("opportunities")
    .select("id,title,location,category")
    .eq("id", opportunityId)
    .eq("published", true)
    .maybeSingle();

  if(error || !data){
    opportunityBox.innerHTML = "Opportunità selezionata: <strong>ID " + escapeHTML(opportunityId) + "</strong>";
    return;
  }

  opportunityBox.innerHTML = `
    Opportunità selezionata:<br>
    <strong>${escapeHTML(data.title)}</strong><br>
    ${escapeHTML(data.location || "")} · ${escapeHTML(data.category || "")}
  `;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  setStatus("Invio richiesta in corso...", "");
  submitBtn.disabled = true;
  submitBtn.textContent = "Invio...";

  try{
    const first_name = value("first_name");
    const last_name = value("last_name");
    const email = value("email");
    const phone = value("phone");

    if(!first_name || !last_name || !email || !phone){
      throw new Error("Compila tutti i campi obbligatori.");
    }

    if(!checked("privacy_accepted")){
      throw new Error("Per inviare la richiesta devi accettare la Privacy Policy.");
    }

    const ndaAccepted = checked("nda_accepted");

    const payload = {
      opportunity_id: opportunityId ? Number(opportunityId) : null,

      first_name,
      last_name,
      email,
      phone,

      company: value("company") || null,
      role: value("role") || null,
      country: value("country") || null,
      message: value("message") || null,

      privacy_accepted: true,
      nda_accepted: ndaAccepted,

      status: ndaAccepted ? "nda_accettato" : "incompleta",

      lead_source: "website",
      ip_address: null,
      user_agent: navigator.userAgent,

      updated_at: new Date().toISOString()
    };

    const { data: requestData, error: requestError } = await client
      .from("dossier_requests")
      .insert([payload])
      .select("id")
      .single();

    if(requestError){
      throw requestError;
    }

    if(ndaAccepted){
      const ndaPayload = {
        dossier_request_id: requestData.id,
        opportunity_id: opportunityId ? Number(opportunityId) : null,

        first_name,
        last_name,
        email,
        phone,

        company: value("company") || null,
        role: value("role") || null,
        country: value("country") || null,

        nda_version: "IMMONOVA_NDA_V1",
        nda_text_snapshot: NDA_TEXT_SNAPSHOT,

        ip_address: null,
        user_agent: navigator.userAgent
      };

      const { error: ndaError } = await client
        .from("nda_acceptances")
        .insert([ndaPayload]);

      if(ndaError){
        throw ndaError;
      }
    }

    if(ndaAccepted){
      setStatus(`
        <strong>Richiesta inviata correttamente.</strong><br>
        NDA accettato. Il team IMMONOVA potrà inviarti il dossier riservato relativo all'opportunità selezionata.
      `, "success");
    }else{
      setStatus(`
        <strong>Richiesta registrata.</strong><br>
        Non hai accettato l'NDA: il dossier non potrà essere inviato automaticamente.
        Il team IMMONOVA potrà ricontattarti per completare la procedura.
      `, "success");
    }

    form.reset();

  }catch(error){
    setStatus(error.message || "Errore durante l'invio della richiesta.", "error");
  }

  submitBtn.disabled = false;
  submitBtn.textContent = "Invia Richiesta";
});

loadOpportunity();
</script>

</body>
</html>
